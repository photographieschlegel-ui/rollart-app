<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
padding:0;
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
}

.app{
max-width:1800px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab{
background:#1e293b;
padding:12px 20px;
border-radius:14px;
cursor:pointer;
}

.tab:hover{
background:#334155;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:12px;
}

.runner{
border-left:5px solid #22c55e;
}

.category{
border-left:5px solid #3b82f6;
}

button,input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.success{
background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<div class="tab"
onclick="showTab('competitionTab')">
🏟 Wettbewerb
</div>

<div class="tab"
onclick="showTab('pdfTab')">
📄 PDF
</div>

<div class="tab"
onclick="showTab('categoryTab')">
🕒 Kategorien
</div>

<div class="tab"
onclick="showTab('runnerTab')">
👥 Läufer
</div>

</div>

<!-- Wettbewerb -->

<div id="competitionTab">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>
<input type="date"
id="competitionFrom">

<label>Bis</label>
<input type="date"
id="competitionTo">

<button class="success"
onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

<div id="competitionOutput"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfTab"
style="display:none;">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button onclick="readPDF()">

PDF analysieren

</button>

<button class="success"
onclick="saveImportedData()">

💾 Import speichern

</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Kategorien -->

<div id="categoryTab"
style="display:none;">

<div class="card">

<h2>🕒 Kategorien</h2>

<div id="categoryOutput"
class="grid"></div>

</div>

</div>

<!-- Läufer -->

<div id="runnerTab"
style="display:none;">

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerOutput"
class="grid"></div>

</div>

</div>

</div>

<script>

let runners = [];
let categories = [];

let competition = {
name:"",
place:"",
from:"",
to:""
};

function showTab(tabId){

const tabs = [
"competitionTab",
"pdfTab",
"categoryTab",
"runnerTab"
];

tabs.forEach(id=>{

document
.getElementById(id)
.style.display = "none";

});

document
.getElementById(tabId)
.style.display = "block";

}

function saveCompetition(){

competition = {

name:
document.getElementById("competitionName").value,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value

};

localStorage.setItem(
"rollart_competition",
JSON.stringify(competition)
);

document
.getElementById("competitionOutput")
.innerHTML = `

<div class="item">

🏆 ${competition.name}

<br><br>

📍 ${competition.place}

<br><br>

📅 ${competition.from}
bis
${competition.to}

<br><br>

✅ Gespeichert

</div>

`;

}

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");
return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let i=1;i<=pdf.numPages;i++){

const page =
await pdf.getPage(i);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item=>item.str)
.join(" ");

fullText += " " + text;

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

runners = [];
categories = [];

const cleaned =
text
.replace(/\n/g," ")
.replace(/\s+/g," ")
.trim();

const categoryRegex =
/([A-Za-zÄÖÜäöüß0-9\s\.]+?)\s(\d{2}:\d{2})\s(\d{2}:\d{2})\s(\d{2}:\d{2}:\d{2})/g;

const categoryMatches =
[...cleaned.matchAll(categoryRegex)];

categoryMatches.forEach(cat=>{

let name =
cat[1]
.replace(/30\.04\.2026/gi,"")
.replace(/Beginn Ende Dauer Einlaufzeit Einlaufgruppen TN Wettbewerb/gi,"")
.replace(/Startfolge Kür/gi,"")
.replace(/Westhofener Kürpokal/gi,"")
.replace(/\s+/g," ")
.trim();

if(name.length < 3) return;

categories.push({

id:Date.now()+Math.random(),

name:name,

begin:cat[2],

end:cat[3]

});

});

const runnerRegex =
/(\d+)\s([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\- ]+?)\s(SSG Ronsdorf|RRD Wuppertal|Wattenscheider RSC|TG Westhofen|TV Datteln 09|TV Walsum-Aldenrade 07)/g;

const foundRunners =
[...cleaned.matchAll(runnerRegex)];

let currentCategory = 0;
let count = 0;

foundRunners.forEach(runner=>{

if(
categories[currentCategory] &&
count >= 8
){

currentCategory++;
count = 0;

}

runners.push({

id:Date.now()+Math.random(),

start:runner[1],

name:runner[2],

club:runner[3],

category:
categories[currentCategory]
? categories[currentCategory].name
: "Keine Kategorie"

});

count++;

});

renderCategories();
renderRunners();

document
.getElementById("pdfInfo")
.innerHTML = `

<div class="item">

✅ PDF importiert

<br><br>

🕒 Kategorien:
${categories.length}

<br>

👥 Läufer:
${runners.length}

</div>

`;

}

function renderCategories(){

const output =
document.getElementById("categoryOutput");

output.innerHTML = "";

categories.forEach(cat=>{

output.innerHTML += `

<div class="item category">

<h3>
${cat.name}
</h3>

🕒 ${cat.begin} - ${cat.end}

</div>

`;

});

}

function renderRunners(){

const output =
document.getElementById("runnerOutput");

output.innerHTML = "";

runners.forEach(runner=>{

output.innerHTML += `

<div class="item runner">

<h3>
Start ${runner.start}
</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

</div>

`;

});

}

function saveImportedData(){

localStorage.setItem(
"rollart_runners",
JSON.stringify(runners)
);

localStorage.setItem(
"rollart_categories",
JSON.stringify(categories)
);

alert("✅ Import gespeichert");

}

window.onload = function(){

const savedCompetition =
localStorage.getItem("rollart_competition");

const savedRunners =
localStorage.getItem("rollart_runners");

const savedCategories =
localStorage.getItem("rollart_categories");

if(savedCompetition){

competition =
JSON.parse(savedCompetition);

document.getElementById("competitionName").value =
competition.name || "";

document.getElementById("competitionPlace").value =
competition.place || "";

document.getElementById("competitionFrom").value =
competition.from || "";

document.getElementById("competitionTo").value =
competition.to || "";

}

if(savedRunners){

runners =
JSON.parse(savedRunners);

}

if(savedCategories){

categories =
JSON.parse(savedCategories);

}

renderCategories();
renderRunners();

showTab("competitionTab");

};

</script>

</body>
</html>
