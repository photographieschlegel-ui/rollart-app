<script>

function showTab(tabId){

const tabs = [

"competitionsTab",
"skaterTab",
"scoreTab",
"resultTab",
"scheduleTab",
"pdfTab"

];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

}

showTab("competitionsTab");

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");

return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let pageNum = 1;
pageNum <= pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item => item.str)
.join(" ");

fullText += text + "\n";

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

const output =
document.getElementById("pdfOutput");

output.innerHTML = "";

const regex =
/(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+(.+?)(?=\d+\s+[A-ZÄÖÜ]|$)/gs;

let matches = [...text.matchAll(regex)];

if(matches.length === 0){

output.innerHTML = `

<div class="item">

Keine Wettkampfzeilen erkannt.

</div>

`;

return;

}

matches.forEach(match=>{

const begin = match[1];
const end = match[2];
const duration = match[3];
const warmup = match[4];
const groups = match[5];
const participants = match[6];

let category = match[7];

category = category

.replace(/\d{2}:\d{2}.*/,"")

.replace(/\d{2}:\d{2}:\d{2}.*/,"")

.replace(/\d+\s+[A-ZÄÖÜ][a-zäöüß]+.*$/,"")

.replace(/\s+/g," ")

.trim();

output.innerHTML += `

<div class="item">

<strong>
${category}
</strong>

<br><br>

🕒 ${begin} - ${end}

<br>

⏱ Dauer:
${duration}

<br>

🔥 Einlauf:
${warmup}

<br>

👥 Gruppen:
${groups}

<br>

🏃 Teilnehmer:
${participants}

</div>

`;

});

}

</script>
