<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
}

.app{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab{
  background:#1e293b;
  padding:12px 20px;
  border-radius:14px;
  cursor:pointer;
}

.tab:hover{
  background:#334155;
}

.live-banner{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.item{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
}

.runner{
  border-left:5px solid #22c55e;
}

.schedule{
  border-left:5px solid #3b82f6;
}

.hidden{
  display:none;
}

input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  font-weight:bold;
  cursor:pointer;
}

.success{
  background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.danger{
  background:linear-gradient(135deg,#dc2626,#ef4444)!important;
}

.categoryLabel{
  background:#2563eb;
  padding:6px 10px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:10px;
  font-size:14px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="live-banner">
LIVE WETTKAMPF IMPORTER
</div>

<div class="tabs">

<div class="tab"
onclick="showTab('competitionTab')">
🏟 Wettbewerb
</div>

<div class="tab"
onclick="showTab('pdfTab')">
📄 PDF Import
</div>

<div class="tab"
onclick="showTab('scheduleTab')">
🕒 Zeitplan
</div>

<div class="tab"
onclick="showTab('runnerTab')">
👥 Läufer
</div>

</div>

<!-- Wettbewerb -->

<div id="competitionTab">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label style="display:block;margin-top:15px;">
Von:
</label>

<input type="date"
id="competitionFrom">

<label style="display:block;margin-top:15px;">
Bis:
</label>

<input type="date"
id="competitionTo">

<button class="success"
onclick="saveCompetition()">
Wettbewerb speichern
</button>

<div id="competitionSaved"></div>

<div id="competitionList"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfTab" class="hidden">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button onclick="readPDF()">
PDF analysieren
</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Zeitplan -->

<div id="scheduleTab" class="hidden">

<div class="card">

<h2>🕒 Erkannte Kategorien</h2>

<div id="scheduleOutput"></div>

</div>

</div>

<!-- Läufer -->

<div id="runnerTab" class="hidden">

<div class="card">

<h2>👥 Erkannte Läufer</h2>

<div id="runnerOutput"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.showTab = function(tabId){

const tabs = [

"competitionTab",
"pdfTab",
"scheduleTab",
"runnerTab"

];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

};

showTab("competitionTab");

window.saveCompetition = async function(){

const name =
document.getElementById("competitionName").value;

const place =
document.getElementById("competitionPlace").value;

const from =
document.getElementById("competitionFrom").value;

const to =
document.getElementById("competitionTo").value;

if(
!name ||
!place ||
!from ||
!to
){

alert("Bitte alles ausfüllen");

return;

}

await addDoc(collection(db,"competitions"),{

name,
place,
from,
to,
created:new Date()

});

loadCompetitions();

};

async function loadCompetitions(){

const list =
document.getElementById("competitionList");

list.innerHTML = "";

const snapshot =
await getDocs(collection(db,"competitions"));

snapshot.forEach((d)=>{

const c = d.data();

list.innerHTML += `

<div class="item">

<strong>
${c.name}
</strong>

<br><br>

📍 ${c.place}

<br>

📅 ${c.from} bis ${c.to}

<br><br>

<button class="danger"
onclick="deleteCompetition('${d.id}')">

Wettbewerb löschen

</button>

</div>

`;

});

}

window.deleteCompetition = async function(id){

await deleteDoc(doc(db,"competitions",id));

loadCompetitions();

};

loadCompetitions();

window.readPDF = async function(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");

return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let pageNum = 1;
pageNum <= pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item => item.str)
.join(" ");

fullText += text + "\n";

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

};

function analyzePDF(text){

analyzeSchedules(text);

analyzeRunners(text);

}

function analyzeSchedules(text){

document
.getElementById("scheduleOutput")
.innerHTML = "";

const regex =
/(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+(.+?)(?=\d{2}:\d{2}|$)/gs;

let matches = [...text.matchAll(regex)];

matches.forEach((match,index)=>{

const begin = match[1];
const end = match[2];
const duration = match[3];
const warmup = match[4];
const groups = match[5];
const participants = match[6];

let category = match[7];

category = category

.replace(/\s+/g," ")

.replace(/\d+\s+[A-ZÄÖÜ].*/,"")

.replace(/Westhofener Kürpokal/gi,"")

.trim();

if(category.length < 3) return;

document
.getElementById("scheduleOutput")
.innerHTML += `

<div class="item schedule">

<h3>
${index+1}. ${category}
</h3>

🕒 ${begin} - ${end}

<br>

⏱ Dauer:
${duration}

<br>

🔥 Einlauf:
${warmup}

<br>

👥 Gruppen:
${groups}

<br>

🏃 Teilnehmer:
${participants}

</div>

`;

});

}

function analyzeRunners(text){

document
.getElementById("runnerOutput")
.innerHTML = "";

const categoryBlocks =
text.split(/(?=\d{2}:\d{2}\s+\d{2}:\d{2})/g);

let runnerCount = 0;

categoryBlocks.forEach(block=>{

const categoryMatch =
block.match(/([A-Za-zÄÖÜäöüß0-9\s\.]+)\s+\d+\s+[A-ZÄÖÜ]/);

if(!categoryMatch) return;

let category =
categoryMatch[1]
.replace(/\s+/g," ")
.trim();

category = category
.replace(/Westhofener Kürpokal/gi,"")
.trim();

const runnerRegex =
/(\d+)\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\-\s]+?)\s+(TV\s+[A-Za-zÄÖÜäöüß0-9\- ]+|SSG\s+[A-Za-zÄÖÜäöüß\- ]+|RRD\s+[A-Za-zÄÖÜäöüß\- ]+|Wattenscheider\s+RSC|TG\s+[A-Za-zÄÖÜäöüß\- ]+|ERC\s+[A-Za-zÄÖÜäöüß\- ]+|REV\s+[A-Za-zÄÖÜäöüß\- ]+|TuS\s+[A-Za-zÄÖÜäöüß\- ]+|SC\s+[A-Za-zÄÖÜäöüß\- ]+|SV\s+[A-Za-zÄÖÜäöüß\- ]+)/g;

let matches = [...block.matchAll(runnerRegex)];

matches.forEach(match=>{

const start = match[1];

const name = match[2]
.replace(/\s+/g," ")
.trim();

const club = match[3]
.replace(/\s+/g," ")
.trim();

if(
name.includes("Startfolge") ||
name.includes("Kürpokal") ||
name.length < 3
){
return;
}

runnerCount++;

document
.getElementById("runnerOutput")
.innerHTML += `

<div class="item runner">

<div class="categoryLabel">
${category}
</div>

<br>

<strong>
Start ${start}
</strong>

<br><br>

👤 ${name}

<br>

🏢 ${club}

</div>

`;

});

});

document.getElementById("pdfInfo").innerHTML = `

<div class="item">

✅ PDF analysiert

<br><br>

👥 Läufer erkannt:
${runnerCount}

</div>

`;

}

</script>

</body>
</html>
