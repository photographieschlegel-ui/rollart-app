<script>

function showTab(tabId){

const tabs = [

"competitionTab",
"pdfTab",
"scheduleTab",
"runnerTab",
"scoreTab"

];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

}

showTab("competitionTab");

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");

return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let pageNum = 1;
pageNum <= pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item => item.str)
.join(" ");

fullText += text + "\n";

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

analyzeSchedules(text);

analyzeRunners(text);

}

function analyzeSchedules(text){

const output =
document.getElementById("scheduleOutput");

output.innerHTML = "";

const regex =
/(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+(.+?)(?=\d+\s+[A-ZÄÖÜ]|$)/gs;

let matches = [...text.matchAll(regex)];

matches.forEach(match=>{

const begin = match[1];
const end = match[2];
const duration = match[3];
const warmup = match[4];
const groups = match[5];
const participants = match[6];

let category = match[7];

category = category

.replace(/\d{2}:\d{2}.*/,"")

.replace(/\d{2}:\d{2}:\d{2}.*/,"")

.replace(/\d+\s+[A-ZÄÖÜ][a-zäöüß]+.*$/,"")

.replace(/\s+/g," ")

.trim();

output.innerHTML += `

<div class="item schedule">

<strong>
${category}
</strong>

<br><br>

🕒 ${begin} - ${end}

<br>

⏱ Dauer:
${duration}

<br>

🔥 Einlauf:
${warmup}

<br>

👥 Gruppen:
${groups}

<br>

🏃 Teilnehmer:
${participants}

</div>

`;

});

}

function analyzeRunners(text){

const output =
document.getElementById("runnerOutput");

output.innerHTML = "";

const runnerRegex =
/(\d+)\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\-]+(?:\s+[A-ZÄÖÜ][A-Za-zÄÖÜäöüß\-]+)+)\s+(SSG\s+[A-Za-zÄÖÜäöüß\-]+|TV\s+[A-Za-zÄÖÜäöüß0-9\-]+|Wattenscheider\s+RSC|ERC\s+[A-Za-zÄÖÜäöüß\-]+|REV\s+[A-Za-zÄÖÜäöüß\-]+|TuS\s+[A-Za-zÄÖÜäöüß\-]+|SC\s+[A-Za-zÄÖÜäöüß\-]+|SV\s+[A-Za-zÄÖÜäöüß\-]+)/g;

let matches = [...text.matchAll(runnerRegex)];

if(matches.length === 0){

output.innerHTML = `

<div class="item">

Keine Läufer erkannt.

</div>

`;

return;

}

matches.forEach(match=>{

const start = match[1];

const name = match[2]
.replace(/\s+/g," ")
.trim();

const club = match[3]
.replace(/\s+/g," ")
.trim();

output.innerHTML += `

<div class="item runner">

<strong>
Start ${start}
</strong>

<br><br>

👤 ${name}

<br>

🏢 ${club}

</div>

`;

});

checkScoring(text);

}

function checkScoring(text){

const scoreInfo =
document.getElementById("scoreInfo");

if(

text.includes("Figurenläufer") ||
text.includes("Kunstläufer") ||
text.includes("Schüler") ||
text.includes("Jugend")

){

scoreInfo.innerHTML = `

<div class="item">

✅ Wertung aktiv

</div>

`;

}else{

scoreInfo.innerHTML = `

<div class="item">

❌ Keine Wertung nötig

</div>

`;

}

}

</script>
