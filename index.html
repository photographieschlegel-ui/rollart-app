<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Live</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1700px;
margin:auto;
padding:10px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:14px;
}

.title{
font-size:28px;
font-weight:bold;
}

.liveRunner{
font-size:30px;
font-weight:bold;
line-height:1.3;
}

.liveClub{
font-size:18px;
color:#cbd5e1;
margin-top:8px;
}

.liveCategory{
margin-top:8px;
font-size:18px;
color:#60a5fa;
font-weight:bold;
}

.scoreGrid{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:10px;
margin-top:18px;
}

.scoreCard{
background:#334155;
padding:12px;
border-radius:14px;
text-align:center;
}

.scoreLabel{
font-size:13px;
color:#cbd5e1;
margin-bottom:8px;
}

.scoreValue{
font-size:28px;
font-weight:bold;
}

.runnerGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));
gap:8px;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
font-size:12px;
line-height:1.5;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{
opacity:0.7;
}

.categoryTitle{
background:#1d4ed8;
padding:10px;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
}

.medal{
font-size:18px;
font-weight:bold;
}

.clock{
font-size:14px;
color:#cbd5e1;
margin-top:4px;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain:"rollart-score-5319a.firebaseapp.com",
projectId:"rollart-score-5319a",
storageBucket:"rollart-score-5319a.firebasestorage.app",
messagingSenderId:"658963624980",
appId:"1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let archiveData = [];

function medal(place){

if(place==1) return "🥇";
if(place==2) return "🥈";
if(place==3) return "🥉";

return "🏆";

}

function updateClock(){

const now = new Date();

document.getElementById(
"clock"
).innerHTML =

"🕒 " +

now.toLocaleTimeString(
"de-DE",
{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
}
);

}

function renderLive(data){

const competition =
data?.competition || null;

const runner =
data?.runner || null;

if(!competition){

document.getElementById(
"liveArea"
).innerHTML = `

<div class="card">

<h2>
🏁 Kein aktiver Wettbewerb
</h2>

</div>

`;

document.getElementById(
"allRunners"
).innerHTML = "";

return;

}

document.getElementById(
"liveArea"
).innerHTML = `

<div class="card">

<div class="title">

🏆 ${competition.name || "-"}

</div>

<div class="clock">

📍 ${competition.place || "-"}

<br>

📅 ${competition.from || "-"}
-
${competition.to || "-"}

</div>

<br>

<div class="liveRunner">

${runner?.name || "-"}

</div>

<div class="liveClub">

${runner?.club || "-"}

</div>

<div class="liveCategory">

📂 ${runner?.category || "-"}

</div>

<div class="scoreGrid">

<div class="scoreCard">

<div class="scoreLabel">
⭐ Technik
</div>

<div class="scoreValue">

${runner?.aScore || 0}

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
🎨 Kunst
</div>

<div class="scoreValue">

${runner?.bScore || 0}

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
🏆 Gesamt
</div>

<div class="scoreValue">

${runner?.total || 0}

</div>

</div>

</div>

</div>

`;

renderAllRunners(
competition
);

}

function renderAllRunners(
competition
){

const output =
document.getElementById(
"allRunners"
);

if(!competition?.runners){

output.innerHTML="";
return;

}

const categories = {};

competition.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

output.innerHTML="";

Object.keys(categories).forEach(cat=>{

output.innerHTML += `

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort((a,b)=>{

if(competition.finished){

return Number(a.place)-Number(b.place);

}

return Number(a.start)-Number(b.start);

})

.map(r=>`

<div class="resultItem

${r.liveActive?"live":""}
${r.confirmed?"done":""}

">

<div class="medal">

${medal(r.place)}

${r.place || r.start}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

<br>

`;

});

}

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML="";

archiveData.forEach(comp=>{

const categories = {};

comp.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

output.innerHTML += `

<div class="card">

<h3>

🏁 ${comp.name}

</h3>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<br><br>

${Object.keys(categories).map(cat=>`

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.map(r=>`

<div class="resultItem">

<div class="medal">

${medal(r.place)}

${r.place || "-"}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

`).join("")}

</div>

`;

});

}

onSnapshot(

doc(db,"rollart","live"),

(snapshot)=>{

if(snapshot.exists()){

renderLive(
snapshot.data()
);

}

}

);

onSnapshot(

doc(db,"rollart","database"),

(snapshot)=>{

if(snapshot.exists()){

archiveData =
snapshot.data()
.archivedCompetitions || [];

renderArchive();

}

}

);

setInterval(
updateClock,
1000
);

</script>

</head>

<body>

<div class="app">

<div class="header">

<div>

<div class="title">

🏆 RollArt Live

</div>

<div
id="clock"
class="clock">

🕒 --:--

</div>

</div>

</div>

<div id="liveArea"></div>

<div class="card">

<h2>

👥 Läufer & Ergebnisse

</h2>

<div id="allRunners"></div>

</div>

<div class="card">

<h2>

📂 Archiv

</h2>

<div id="archiveList"></div>

</div>

</div>

</body>
</html>
