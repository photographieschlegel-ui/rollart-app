<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Score Pro</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1800px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
color:white;
border:none;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
}

input,
textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}

textarea{
min-height:300px;
resize:vertical;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}

.saveButton{
width:100%;
margin-top:10px;
background:#2563eb;
color:white;
}

.confirmButton{
width:100%;
margin-top:10px;
background:#16a34a;
color:white;
}

.liveBox{
background:#0f766e;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.bigText{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.scoreGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
}

.scoreBox{
margin-top:15px;
padding:15px;
background:#1e293b;
border-radius:14px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
🏟 Wettbewerbe
</button>

<button onclick="showPage('detailPage')">
📂 Wettbewerb
</button>

<button onclick="showPage('livePage')">
⏱ Live
</button>

</div>

<!-- Wettbewerbe -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<input type="date"
id="competitionFrom">

<input type="date"
id="competitionTo">

<button class="mainButton"
onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div id="competitionList"
class="grid"></div>

</div>

</div>

<!-- Wettbewerb -->

<div id="detailPage" class="page">

<div class="card">

<h2>📋 Wettbewerbstext</h2>

<textarea
id="competitionText"
placeholder="Block aus PDF einfügen"></textarea>

<button class="mainButton"
onclick="parseCompetitionText()">

📥 Block importieren

</button>

</div>

<div class="card">

<h2>🕒 Kategorien</h2>

<div id="categoryList"
class="grid"></div>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList"
class="grid"></div>

</div>

</div>

<!-- LIVE -->

<div id="livePage" class="page">

<div class="liveBox">

<h2>⏱ Live Modus</h2>

<div id="liveClock"
class="bigText"></div>

<input
type="number"
id="timeOffset"
value="0"
placeholder="Zeitkorrektur Minuten">

<button class="mainButton"
onclick="updateLiveMode()">

🔄 Aktualisieren

</button>

</div>

<div class="liveBox">

<h2>🏁 Aktuelle Kategorie</h2>

<div id="liveCategory"
class="bigText">
-
</div>

</div>

<div class="liveBox">

<h2>👤 Aktueller Läufer</h2>

<div id="liveRunner"
class="bigText">
-
</div>

</div>

<div class="liveBox">

<h2>➡ Nächster Läufer</h2>

<div id="nextRunner"
class="bigText">
-
</div>

</div>

<button class="confirmButton"
onclick="confirmRunner()">

✅ Wertung bestätigen / Nächster Läufer

</button>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;

let currentRunnerIndex = 0;

const knownClubs = [

"SSG Ronsdorf",
"RRD Wuppertal",
"Wattenscheider RSC",
"TG Westhofen",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen",
"TV Walsum-Aldenrade 07"

];

const deductions = {

101:0.2,
102:0.3,
201:0.5,
205:0.5,
301:1.0

};

/* Seiten */

function showPage(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{
page.style.display="none";
});

document.getElementById(pageId)
.style.display="block";

if(pageId==="livePage"){

updateLiveMode();

}

}

/* Wettbewerb speichern */

function saveCompetition(){

const name =
document.getElementById("competitionName")
.value
.trim();

if(name===""){

alert("Bitte Wettbewerb eingeben");
return;

}

competitions.push({

id:Date.now(),

name:name,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value,

categories:[],
runners:[]

});

saveData();

renderCompetitions();

}

/* Wettbewerbe */

function renderCompetitions(){

const output =
document.getElementById("competitionList");

output.innerHTML="";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>${comp.name}</h3>

📍 ${comp.place}

<br><br>

📅 ${comp.from} bis ${comp.to}

<button class="mainButton"
onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

/* Wettbewerb öffnen */

function openCompetition(id){

activeCompetition =
competitions.find(c=>c.id===id);

currentRunnerIndex = 0;

renderCategories();
renderRunners();

showPage("detailPage");

saveData();

}

/* Wettbewerb löschen */

function deleteCompetition(id){

if(!confirm("Wirklich löschen?"))
return;

competitions =
competitions.filter(c=>c.id!==id);

/* LIVE RESET */

if(
activeCompetition &&
activeCompetition.id === id
){

activeCompetition = null;

currentRunnerIndex = 0;

document.getElementById("liveCategory").innerHTML = "-";
document.getElementById("liveRunner").innerHTML = "-";
document.getElementById("nextRunner").innerHTML = "-";

}

saveData();

renderCompetitions();

renderCategories();

renderRunners();

}

/* Parser */

function parseCompetitionText(){

if(!activeCompetition){

alert("Bitte Wettbewerb öffnen");
return;

}

const text =
document.getElementById("competitionText")
.value;

const lines =
text
.split("\n")
.map(l=>l.trim())
.filter(l=>l!== "");

let currentCategory = null;

lines.forEach(line=>{

/* Kategorie */

const categoryMatch =
line.match(
/(\d{2}:\d{2})\s+(\d{2}:\d{2}).*?([A-Za-zÄÖÜäöüß]+.*)$/
);

if(categoryMatch){

let categoryName =
categoryMatch[3]
.replace(/^\d+\s+\d+\s+\d+\s+/,"")
.replace(/• Startfolge Kür/gi,"")
.trim();

currentCategory = {

id:Date.now()+Math.random(),

begin:categoryMatch[1],

end:categoryMatch[2],

name:categoryName

};

const exists =
activeCompetition.categories.find(
c=>c.name===categoryName
);

if(!exists){

activeCompetition.categories.push(currentCategory);

}

return;

}

/* Läufer */

const runnerMatch =
line.match(/^(\d+)\s+(.+)$/);

if(runnerMatch && currentCategory){

let start = runnerMatch[1];

let rest = runnerMatch[2];

let club = "";
let name = rest;

for(let i=0;i<knownClubs.length;i++){

const currentClub =
knownClubs[i];

if(rest.endsWith(currentClub)){

club = currentClub;

name =
rest
.substring(
0,
rest.length-currentClub.length
)
.trim();

break;

}

}

if(club==="") return;

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:start,

name:name,

club:club,

category:currentCategory.name,

categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",

b1:"",
b2:"",
b3:"",

deductionNumber:"",
deduction:"0.00",

total:"0.00",

confirmed:false

});

}

});

saveData();

renderCategories();
renderRunners();

document.getElementById("competitionText").value="";

}

/* Kategorien */

function renderCategories(){

const output =
document.getElementById("categoryList");

if(!output) return;

output.innerHTML="";

if(!activeCompetition) return;

activeCompetition.categories.forEach(cat=>{

output.innerHTML += `

<div class="item">

<h3>${cat.name}</h3>

🕒 ${cat.begin} - ${cat.end}

</div>

`;

});

}

/* Wertung aktiv */

function scoringEnabled(category){

const scoringCategories = [

"Figurenläufer",
"Kunstläufer",
"Nachwuchs",
"Cup",
"Schüler",
"Jugend",
"Meisterklasse"

];

return scoringCategories.some(
c=>category.includes(c)
);

}

/* Läufer */

function renderRunners(){

const output =
document.getElementById("runnerList");

if(!output) return;

output.innerHTML="";

if(!activeCompetition) return;

activeCompetition.runners.forEach(runner=>{

let scoringHtml = "";

if(scoringEnabled(runner.category)){

scoringHtml = `

<div class="scoreBox">

<h4>🏅 Wertung A</h4>

<div class="scoreGrid">

<input id="a1_${runner.id}" type="number" step="0.01" placeholder="A1" value="${runner.a1}">
<input id="a2_${runner.id}" type="number" step="0.01" placeholder="A2" value="${runner.a2}">
<input id="a3_${runner.id}" type="number" step="0.01" placeholder="A3" value="${runner.a3}">

</div>

<h4>🏅 Wertung B</h4>

<div class="scoreGrid">

<input id="b1_${runner.id}" type="number" step="0.01" placeholder="B1" value="${runner.b1}">
<input id="b2_${runner.id}" type="number" step="0.01" placeholder="B2" value="${runner.b2}">
<input id="b3_${runner.id}" type="number" step="0.01" placeholder="B3" value="${runner.b3}">

</div>

<h4>➖ Abzug</h4>

<div class="scoreGrid">

<input
id="deductionNumber_${runner.id}"
type="number"
placeholder="Nr"
value="${runner.deductionNumber}">

<input
type="text"
disabled
value="Abzug: ${runner.deduction}">

<input
type="text"
disabled
value="Gesamt: ${runner.total}">

</div>

<button class="saveButton"
onclick="saveRunnerScore('${runner.id}')">

💾 Speichern

</button>

`;

if(runner.confirmed){

scoringHtml += `

<div style="margin-top:10px;color:#4ade80;font-weight:bold;">
✅ Bestätigt
</div>

`;

}

scoringHtml += `</div>`;

}

output.innerHTML += `

<div class="item">

<h3>Start ${runner.start}</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

${scoringHtml}

</div>

`;

});

}

/* Punkte */

function saveRunnerScore(id){

const runner =
activeCompetition.runners.find(
r=>r.id==id
);

runner.a1 =
parseFloat(document.getElementById("a1_"+id).value) || 0;

runner.a2 =
parseFloat(document.getElementById("a2_"+id).value) || 0;

runner.a3 =
parseFloat(document.getElementById("a3_"+id).value) || 0;

runner.b1 =
parseFloat(document.getElementById("b1_"+id).value) || 0;

runner.b2 =
parseFloat(document.getElementById("b2_"+id).value) || 0;

runner.b3 =
parseFloat(document.getElementById("b3_"+id).value) || 0;

/* ABZUGSNUMMER */

runner.deductionNumber =
document.getElementById(
"deductionNumber_"+id
).value;

/* ABZUG */

runner.deduction =
deductions[runner.deductionNumber]
? deductions[runner.deductionNumber]
: 0;

/* SUMME */

const total =

runner.a1 +
runner.a2 +
runner.a3 +

runner.b1 +
runner.b2 +
runner.b3 -

runner.deduction;

runner.total =
total.toFixed(2);

runner.confirmed = false;

saveData();

renderRunners();

updateLiveMode();

}

/* Bestätigen */

function confirmRunner(){

if(!activeCompetition) return;

const runners =
activeCompetition.runners;

if(runners.length===0) return;

const runner =
runners[currentRunnerIndex];

if(runner){

runner.confirmed = true;

}

currentRunnerIndex++;

saveData();

renderRunners();

updateLiveMode();

}

/* LIVE */

function updateLiveMode(){

if(!activeCompetition){

document.getElementById("liveCategory").innerHTML = "-";
document.getElementById("liveRunner").innerHTML = "-";
document.getElementById("nextRunner").innerHTML = "-";

return;

}

const now = new Date();

const offset =
parseInt(
document.getElementById("timeOffset").value
) || 0;

now.setMinutes(now.getMinutes()+offset);

const currentTime =
now
.toTimeString()
.substring(0,5);

document.getElementById("liveClock")
.innerHTML =
"🕒 "+currentTime;

let activeCategory = null;

activeCompetition.categories.forEach(cat=>{

if(
currentTime >= cat.begin &&
currentTime <= cat.end
){

activeCategory = cat;

}

});

if(!activeCategory){

document.getElementById("liveCategory")
.innerHTML =
"Keine aktive Kategorie";

document.getElementById("liveRunner")
.innerHTML = "-";

document.getElementById("nextRunner")
.innerHTML = "-";

return;

}

document.getElementById("liveCategory")
.innerHTML =
activeCategory.name;

const categoryRunners =
activeCompetition.runners.filter(
r=>r.categoryId===activeCategory.id
);

if(categoryRunners.length===0){

document.getElementById("liveRunner")
.innerHTML = "-";

document.getElementById("nextRunner")
.innerHTML = "-";

return;

}

const currentRunner =
categoryRunners[currentRunnerIndex]
|| categoryRunners[0];

const nextRunner =
categoryRunners[currentRunnerIndex+1]
|| null;

let liveScoring = "";

if(scoringEnabled(currentRunner.category)){

liveScoring = `

<div class="scoreBox">

<h3>🏅 LIVE WERTUNG</h3>

<div class="scoreGrid">

<input
id="a1_${currentRunner.id}"
type="number"
step="0.01"
placeholder="A1"
value="${currentRunner.a1 || ""}">

<input
id="a2_${currentRunner.id}"
type="number"
step="0.01"
placeholder="A2"
value="${currentRunner.a2 || ""}">

<input
id="a3_${currentRunner.id}"
type="number"
step="0.01"
placeholder="A3"
value="${currentRunner.a3 || ""}">

</div>

<div class="scoreGrid">

<input
id="b1_${currentRunner.id}"
type="number"
step="0.01"
placeholder="B1"
value="${currentRunner.b1 || ""}">

<input
id="b2_${currentRunner.id}"
type="number"
step="0.01"
placeholder="B2"
value="${currentRunner.b2 || ""}">

<input
id="b3_${currentRunner.id}"
type="number"
step="0.01"
placeholder="B3"
value="${currentRunner.b3 || ""}">

</div>

<div class="scoreGrid">

<input
id="deductionNumber_${currentRunner.id}"
type="number"
placeholder="Abzugsnummer"
value="${currentRunner.deductionNumber || ""}">

<input
type="text"
disabled
value="Abzug: ${currentRunner.deduction || 0}">

<input
type="text"
disabled
value="Gesamt: ${currentRunner.total || "0.00"}">

</div>

<button class="saveButton"
onclick="saveRunnerScore('${currentRunner.id}')">

💾 Wertung speichern

</button>

</div>

`;

}

document.getElementById("liveRunner")
.innerHTML =

`
Start ${currentRunner.start}
<br>
${currentRunner.name}
<br><br>
🏢 ${currentRunner.club}
<br><br>

${liveScoring}
`;

document.getElementById("nextRunner")
.innerHTML =

nextRunner ?

`
Start ${nextRunner.start}
<br>
${nextRunner.name}
`

:

"Kein nächster Läufer";

}

/* Speicher */

function saveData(){

localStorage.setItem(
"rollart_competitions",
JSON.stringify(competitions)
);

localStorage.setItem(
"rollart_active",
JSON.stringify(activeCompetition)
);

}

/* Laden */

function loadData(){

const saved =
localStorage.getItem(
"rollart_competitions"
);

if(saved){

competitions =
JSON.parse(saved);

}

const active =
localStorage.getItem(
"rollart_active"
);

if(active){

activeCompetition =
JSON.parse(active);

}

}

/* Start */

window.onload = function(){

loadData();

renderCompetitions();

showPage("competitionPage");

setInterval(updateLiveMode,1000);

};

</script>

</body>
</html>
