<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1700px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
flex-direction:row;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
align-items:center;
}

.tabs button{
width:auto !important;
display:inline-block;
background:#1e293b;
border:none;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
color:white;
font-size:16px;
white-space:nowrap;
flex:0 0 auto;
}

.tabs button:hover{
background:#334155;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.runner{
border-left:5px solid #22c55e;
}

.category{
border-left:5px solid #3b82f6;
}

button,input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
box-sizing:border-box;
background:#475569;
color:white;
font-size:16px;
}

.mainButton{
background:linear-gradient(135deg,#2563eb,#7c3aed);
cursor:pointer;
font-weight:bold;
}

.deleteButton{
background:#dc2626;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
рҹҸҶ RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
рҹҸҹ Wettbewerb
</button>

<button onclick="showPage('pdfPage')">
рҹ“„ PDF
</button>

<button onclick="showPage('categoryPage')">
рҹ•’ Kategorien
</button>

<button onclick="showPage('runnerPage')">
рҹ‘Ҙ LГӨufer
</button>

</div>

<!-- Wettbewerb -->

<div id="competitionPage" class="page">

<div class="card">

<h2>рҹҸҹ Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>

<input type="date"
id="competitionFrom">

<label>Bis</label>

<input type="date"
id="competitionTo">

<button class="mainButton"
onclick="saveCompetition()">

рҹ’ҫ Wettbewerb speichern

</button>

<button class="deleteButton"
onclick="deleteCompetition()">

рҹ—‘ Wettbewerb lГ¶schen

</button>

<div id="competitionOutput"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfPage" class="page">

<div class="card">

<h2>рҹ“„ PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button class="mainButton"
onclick="readPDF()">

PDF analysieren

</button>

<button class="mainButton"
onclick="saveImportedData()">

рҹ’ҫ PDF Daten speichern

</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Kategorien -->

<div id="categoryPage" class="page">

<div class="card">

<h2>рҹ•’ Kategorien</h2>

<div id="categoryOutput"
class="grid"></div>

</div>

</div>

<!-- LГӨufer -->

<div id="runnerPage" class="page">

<div class="card">

<h2>рҹ‘Ҙ LГӨufer</h2>

<div id="runnerOutput"
class="grid"></div>

</div>

</div>

</div>

<script>

let categories = [];
let runners = [];

function showPage(pageId){

const pages =
document.querySelectorAll(".page");

pages.forEach(page=>{
page.style.display = "none";
});

document.getElementById(pageId)
.style.display = "block";

}

function saveCompetition(){

const competition = {

name:
document.getElementById("competitionName").value,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value

};

localStorage.setItem(
"rollart_competition",
JSON.stringify(competition)
);

document.getElementById("competitionOutput")
.innerHTML = `

<div class="item">

вң… Wettbewerb gespeichert

<br><br>

рҹҸҶ ${competition.name}

<br><br>

рҹ“Қ ${competition.place}

<br><br>

рҹ“… ${competition.from}
bis
${competition.to}

</div>

`;

}

function deleteCompetition(){

localStorage.removeItem(
"rollart_competition"
);

location.reload();

}

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswГӨhlen");
return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let text = "";

for(let i=1;i<=pdf.numPages;i++){

const page =
await pdf.getPage(i);

const content =
await page.getTextContent();

text += " " +
content.items
.map(item=>item.str)
.join(" ");

}

analyzePDF(text);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

categories = [];
runners = [];

const cleaned =
text
.replace(/\n/g," ")
.replace(/\s+/g," ")
.trim();

/* KATEGORIEN */

const categoryRegex =
/((?:FreilГӨufer|FigurenlГӨufer|KunstlГӨufer|AnfГӨnger|Erstlinge|Minis|Nachwuchs|Neulinge|Jugend|SchГјler)[A-Za-zГ„Г–ГңГӨГ¶ГјГҹ 0-9\.\-]*)\s+(\d{2}:\d{2})\s+(\d{2}:\d{2})/g;

const categoryMatches =
[...cleaned.matchAll(categoryRegex)];

categoryMatches.forEach(match=>{

const name =
match[1]
.replace(/\s+/g," ")
.trim();

const exists =
categories.some(
c => c.name === name
);

if(!exists){

categories.push({

id:Date.now()+Math.random(),

name:name,

begin:match[2],

end:match[3]

});

}

});

/* LГ„UFER */

const runnerRegex =
/(\d+)\s([A-ZГ„Г–Гң][A-Za-zГ„Г–ГңГӨГ¶ГјГҹ\- ]+?)\s(SSG Ronsdorf|RRD Wuppertal|Wattenscheider RSC|TG Westhofen|TV Datteln 09|TV Walsum-Aldenrade 07)/g;

const runnerMatches =
[...cleaned.matchAll(runnerRegex)];

let currentCategory = 0;
let count = 0;

runnerMatches.forEach(runner=>{

if(count >= 8){

currentCategory++;

count = 0;

if(currentCategory >= categories.length){

currentCategory =
categories.length - 1;

}

}

runners.push({

id:Date.now()+Math.random(),

start:runner[1],

name:runner[2].trim(),

club:runner[3].trim(),

category:
categories[currentCategory]
? categories[currentCategory].name
: "Keine Kategorie"

});

count++;

});

renderCategories();
renderRunners();

document.getElementById("pdfInfo")
.innerHTML = `

<div class="item">

вң… PDF importiert

<br><br>

рҹ•’ Kategorien:
${categories.length}

<br>

рҹ‘Ҙ LГӨufer:
${runners.length}

</div>

`;

}

function renderCategories(){

const output =
document.getElementById("categoryOutput");

output.innerHTML = "";

categories.forEach(cat=>{

output.innerHTML += `

<div class="item category">

<h3>${cat.name}</h3>

рҹ•’ ${cat.begin} - ${cat.end}

<button class="deleteButton"
onclick="deleteCategory('${cat.id}')">

Kategorie lГ¶schen

</button>

</div>

`;

});

}

function renderRunners(){

const output =
document.getElementById("runnerOutput");

output.innerHTML = "";

runners.forEach(runner=>{

output.innerHTML += `

<div class="item runner">

<h3>
Start ${runner.start}
</h3>

рҹ‘Ө ${runner.name}

<br><br>

рҹҸў ${runner.club}

<br><br>

рҹ“Ӯ ${runner.category}

<button class="deleteButton"
onclick="deleteRunner('${runner.id}')">

LГӨufer lГ¶schen

</button>

</div>

`;

});

}

function deleteCategory(id){

categories =
categories.filter(cat=>cat.id != id);

renderCategories();

}

function deleteRunner(id){

runners =
runners.filter(runner=>runner.id != id);

renderRunners();

}

function saveImportedData(){

localStorage.setItem(
"rollart_categories",
JSON.stringify(categories)
);

localStorage.setItem(
"rollart_runners",
JSON.stringify(runners)
);

alert("вң… PDF Daten gespeichert");

}

window.onload = function(){

const savedCompetition =
localStorage.getItem("rollart_competition");

if(savedCompetition){

const competition =
JSON.parse(savedCompetition);

document.getElementById("competitionName").value =
competition.name || "";

document.getElementById("competitionPlace").value =
competition.place || "";

document.getElementById("competitionFrom").value =
competition.from || "";

document.getElementById("competitionTo").value =
competition.to || "";

}

const savedCategories =
localStorage.getItem("rollart_categories");

if(savedCategories){

categories =
JSON.parse(savedCategories);

renderCategories();

}

const savedRunners =
localStorage.getItem("rollart_runners");

if(savedRunners){

runners =
JSON.parse(savedRunners);

renderRunners();

}

showPage("competitionPage");

};

</script>

</body>
</html>
