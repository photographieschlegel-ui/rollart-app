```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollArt Score Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;
margin:auto;
padding:20px;
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
border:none;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.tabs button:hover{
background:#334155;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#475569;
color:white;
margin-top:10px;
box-sizing:border-box;
}

.mainButton{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">
<button type="button" onclick="showPage('competitionPage')">🏟 Wettbewerb</button>
<button type="button" onclick="showPage('pdfPage')">📄 PDF</button>
<button type="button" onclick="showPage('categoryPage')">🕒 Kategorien</button>
<button type="button" onclick="showPage('runnerPage')">👥 Läufer</button>
</div>

<!-- Wettbewerb -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text" id="competitionName" placeholder="Wettbewerb">

<input type="text" id="competitionPlace" placeholder="Ort">

<label>Von</label>
<input type="date" id="competitionFrom">

<label>Bis</label>
<input type="date" id="competitionTo">

<button type="button" class="mainButton" onclick="saveCompetition()">
💾 Wettbewerb speichern
</button>

<div id="competitionOutput"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfPage" class="page">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file" id="pdfUpload">

<button type="button" class="mainButton">
PDF analysieren
</button>

<div class="item">
PDF Import vorbereitet
</div>

</div>

</div>

<!-- Kategorien -->

<div id="categoryPage" class="page">
<div class="card">
<h2>🕒 Kategorien</h2>
<div class="item">Noch keine Kategorien</div>
</div>
</div>

<!-- Läufer -->

<div id="runnerPage" class="page">
<div class="card">
<h2>👥 Läufer</h2>
<div class="item">Noch keine Läufer</div>
</div>
</div>

</div>

<script>

function showPage(pageId){

const pages = document.querySelectorAll('.page');

pages.forEach(function(page){
page.style.display = 'none';
});

const activePage = document.getElementById(pageId);

if(activePage){
activePage.style.display = 'block';
}

}

function saveCompetition(){

const competition = {
name: document.getElementById('competitionName').value,
place: document.getElementById('competitionPlace').value,
from: document.getElementById('competitionFrom').value,
to: document.getElementById('competitionTo').value
};

localStorage.setItem(
'rollart_competition',
JSON.stringify(competition)
);

const output = document.getElementById('competitionOutput');

output.innerHTML = `
<div class="item">
✅ Wettbewerb gespeichert
<br><br>
🏆 ${competition.name}
<br><br>
📍 ${competition.place}
<br><br>
📅 ${competition.from} bis ${competition.to}
</div>
`;

alert('✅ Wettbewerb gespeichert');

}

window.onload = function(){

const savedCompetition = localStorage.getItem('rollart_competition');

if(savedCompetition){

const competition = JSON.parse(savedCompetition);

if(document.getElementById('competitionName')){
document.getElementById('competitionName').value = competition.name || '';
}

if(document.getElementById('competitionPlace')){
document.getElementById('competitionPlace').value = competition.place || '';
}

if(document.getElementById('competitionFrom')){
document.getElementById('competitionFrom').value = competition.from || '';
}

if(document.getElementById('competitionTo')){
document.getElementById('competitionTo').value = competition.to || '';
}

const output = document.getElementById('competitionOutput');

output.innerHTML = `
<div class="item">
🏆 ${competition.name}
<br><br>
📍 ${competition.place}
<br><br>
📅 ${competition.from} bis ${competition.to}
</div>
`;

}

showPage('competitionPage');

}

</script>

</body>
</html>
```
