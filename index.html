<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
}

.app{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab{
  background:#1e293b;
  padding:12px 20px;
  border-radius:14px;
  cursor:pointer;
}

.tab:hover{
  background:#334155;
}

.live-banner{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.item{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
}

.runner{
  border-left:5px solid #22c55e;
}

.schedule{
  border-left:5px solid #3b82f6;
}

.hidden{
  display:none;
}

input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  font-weight:bold;
  cursor:pointer;
}

.success{
  background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.warning{
  background:#f59e0b;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
  font-weight:bold;
}

h3{
  margin-top:30px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="live-banner">
LIVE WETTKAMPF IMPORTER
</div>

<div class="tabs">

<div class="tab"
onclick="showTab('competitionTab')">
🏟 Wettbewerb
</div>

<div class="tab"
onclick="showTab('pdfTab')">
📄 PDF Import
</div>

<div class="tab"
onclick="showTab('scheduleTab')">
🕒 Zeitplan
</div>

<div class="tab"
onclick="showTab('runnerTab')">
👥 Läufer
</div>

</div>

<!-- Wettbewerb -->

<div id="competitionTab">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label style="display:block;margin-top:15px;">
Von:
</label>

<input type="date"
id="competitionFrom">

<label style="display:block;margin-top:15px;">
Bis:
</label>

<input type="date"
id="competitionTo">

<button class="success"
onclick="saveCompetition()">
Wettbewerb speichern
</button>

<div id="competitionSaved"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfTab" class="hidden">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button onclick="readPDF()">
PDF analysieren
</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Zeitplan -->

<div id="scheduleTab" class="hidden">

<div class="card">

<h2>🕒 Erkannte Kategorien</h2>

<div id="scheduleOutput"></div>

</div>

</div>

<!-- Läufer -->

<div id="runnerTab" class="hidden">

<div class="card">

<h2>👥 Erkannte Läufer</h2>

<div id="runnerOutput"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.showTab = function(tabId){

const tabs = [

"competitionTab",
"pdfTab",
"scheduleTab",
"runnerTab"

];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

};

showTab("competitionTab");

window.saveCompetition = async function(){

const name =
document.getElementById("competitionName").value;

const place =
document.getElementById("competitionPlace").value;

const from =
document.getElementById("competitionFrom").value;

const to =
document.getElementById("competitionTo").value;

if(
!name ||
!place ||
!from ||
!to
){

alert("Bitte alles ausfüllen");

return;

}

try{

await addDoc(collection(db,"competitions"),{

name,
place,
from,
to,
created:new Date()

});

document.getElementById("competitionSaved").innerHTML = `

<div class="item">

✅ Wettbewerb gespeichert

<br><br>

🏆 ${name}

<br>

📍 ${place}

<br>

📅 ${from} bis ${to}

</div>

`;

}catch(error){

alert(error.message);

}

};

window.readPDF = async function(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");

return;

}

document.getElementById("pdfInfo").innerHTML = `

<div class="item">
📄 PDF wird analysiert...
</div>

`;

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let pages = [];

for(let pageNum = 1;
pageNum <= pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item => item.str)
.join(" ");

pages.push(text);

}

analyzePDF(pages);

};

reader.readAsArrayBuffer(file);

};

function analyzePDF(pages){

document.getElementById("scheduleOutput").innerHTML = "";
document.getElementById("runnerOutput").innerHTML = "";

let categoryCounter = 0;
let runnerCounter = 0;

pages.forEach(pageText=>{

const categoryRegex =
/(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+([A-Za-zÄÖÜäöüß0-9\s\.]+)/g;

let categoryMatches =
[...pageText.matchAll(categoryRegex)];

categoryMatches.forEach(match=>{

const begin = match[1];
const end = match[2];
const duration = match[3];
const warmup = match[4];
const groups = match[5];
const participants = match[6];

let category = match[7];

category = category

.replace(/\d{2}:\d{2}.*/,"")

.replace(/\d{2}:\d{2}:\d{2}.*/,"")

.replace(/\s+/g," ")

.trim();

if(category.length < 3) return;

categoryCounter++;

document
.getElementById("scheduleOutput")
.innerHTML += `

<div class="item schedule">

<h3>
${categoryCounter}. ${category}
</h3>

🕒 ${begin} - ${end}

<br>

⏱ Dauer:
${duration}

<br>

🔥 Einlauf:
${warmup}

<br>

👥 Gruppen:
${groups}

<br>

🏃 Teilnehmer:
${participants}

</div>

`;

});

const runnerRegex =
/(\d+)\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\-]+(?:\s+[A-ZÄÖÜ][A-Za-zÄÖÜäöüß\-]+)+)\s+(SSG\s+[A-Za-zÄÖÜäöüß\-]+|TV\s+[A-Za-zÄÖÜäöüß0-9\-]+|Wattenscheider\s+RSC|ERC\s+[A-Za-zÄÖÜäöüß\-]+|REV\s+[A-Za-zÄÖÜäöüß\-]+|TuS\s+[A-Za-zÄÖÜäöüß\-]+|SC\s+[A-Za-zÄÖÜäöüß\-]+|SV\s+[A-Za-zÄÖÜäöüß\-]+)/g;

let runnerMatches =
[...pageText.matchAll(runnerRegex)];

runnerMatches.forEach(match=>{

const start = match[1];

const name = match[2]
.replace(/\s+/g," ")
.trim();

const club = match[3]
.replace(/\s+/g," ")
.trim();

runnerCounter++;

document
.getElementById("runnerOutput")
.innerHTML += `

<div class="item runner">

<h3>
${runnerCounter}. Läufer
</h3>

<strong>
Start ${start}
</strong>

<br><br>

👤 ${name}

<br>

🏢 ${club}

</div>

`;

});

});

document.getElementById("pdfInfo").innerHTML = `

<div class="item">

✅ PDF erfolgreich analysiert

<br><br>

🕒 Kategorien:
${categoryCounter}

<br>

👥 Läufer:
${runnerCounter}

</div>

`;

}

</script>

</body>
</html>
