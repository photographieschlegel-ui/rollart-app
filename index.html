<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
}

.app{
  max-width:1700px;
  margin:auto;
  padding:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:20px;
}

.live-banner{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab{
  background:#1e293b;
  padding:12px 20px;
  border-radius:14px;
  cursor:pointer;
}

.tab:hover{
  background:#334155;
}

.card{
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.item{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
}

.runner{
  border-left:5px solid #22c55e;
}

.schedule{
  border-left:5px solid #3b82f6;
}

.score{
  border-left:5px solid #f59e0b;
}

.hidden{
  display:none;
}

button,input,select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#475569;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

button{
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.success{
  background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.danger{
  background:linear-gradient(135deg,#dc2626,#ef4444)!important;
}

.categoryLabel{
  background:#2563eb;
  display:inline-block;
  padding:6px 10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:15px;
}

.podium{
  display:flex;
  gap:15px;
  margin-top:20px;
  flex-wrap:wrap;
}

.place{
  flex:1;
  min-width:200px;
  border-radius:20px;
  padding:20px;
  text-align:center;
  font-weight:bold;
}

.gold{
  background:linear-gradient(135deg,#facc15,#ca8a04);
}

.silver{
  background:linear-gradient(135deg,#cbd5e1,#94a3b8);
}

.bronze{
  background:linear-gradient(135deg,#fb923c,#c2410c);
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="live-banner">
LIVE WERTUNG + PDF IMPORT
</div>

<div class="tabs">

<div class="tab"
onclick="showTab('runnerTab')">
👥 Läufer
</div>

<div class="tab"
onclick="showTab('scoreTab')">
⭐ Wertung
</div>

<div class="tab"
onclick="showTab('resultTab')">
🏆 Ergebnisse
</div>

</div>

<!-- Läufer -->

<div id="runnerTab">

<div class="card">

<h2>👥 Läufer</h2>

<button class="success"
onclick="addRunner()">

+ Läufer hinzufügen

</button>

<div id="runnerOutput"
class="grid"></div>

</div>

</div>

<!-- Wertung -->

<div id="scoreTab" class="hidden">

<div class="card">

<h2>⭐ Punkte & Abzüge</h2>

<div id="scoreOutput"
class="grid"></div>

</div>

</div>

<!-- Ergebnisse -->

<div id="resultTab" class="hidden">

<div class="card">

<h2>🏆 Platzierungen</h2>

<button class="success"
onclick="calculateRanking()">

🏆 Plätze berechnen

</button>

<div id="podium"
class="podium"></div>

<div id="resultOutput"></div>

</div>

</div>

</div>

<script>

let runners = [];

function showTab(tabId){

const tabs = [
"runnerTab",
"scoreTab",
"resultTab"
];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

}

showTab("runnerTab");

function addRunner(){

runners.push({

id:Date.now()+Math.random(),

name:"",

club:"",

category:"",

technik:0,
kunst:0,
abzug:0,
gesamt:0

});

renderRunners();
renderScores();

}

function renderRunners(){

const output =
document.getElementById("runnerOutput");

output.innerHTML = "";

runners.forEach((runner)=>{

output.innerHTML += `

<div class="item runner">

<label>Name</label>

<input
value="${runner.name}"
onchange="updateRunner(${runner.id},'name',this.value)">

<label>Verein</label>

<input
value="${runner.club}"
onchange="updateRunner(${runner.id},'club',this.value)">

<label>Kategorie</label>

<input
value="${runner.category}"
onchange="updateRunner(${runner.id},'category',this.value)">

<button class="danger"
onclick="deleteRunner(${runner.id})">

Läufer löschen

</button>

</div>

`;

});

}

function renderScores(){

const output =
document.getElementById("scoreOutput");

output.innerHTML = "";

runners.forEach((runner)=>{

runner.gesamt =
(
Number(runner.technik) +
Number(runner.kunst)
) -
Number(runner.abzug);

output.innerHTML += `

<div class="item score">

<div class="categoryLabel">
${runner.category || 'Keine Kategorie'}
</div>

<h3>
${runner.name || 'Unbekannt'}
</h3>

🏢 ${runner.club || '-'}

<label>⭐ Technik</label>

<input type="number"
step="0.1"
value="${runner.technik}"
onchange="updateRunner(${runner.id},'technik',this.value)">

<label>🎨 Kunst</label>

<input type="number"
step="0.1"
value="${runner.kunst}"
onchange="updateRunner(${runner.id},'kunst',this.value)">

<label>❌ Abzüge</label>

<input type="number"
step="0.1"
value="${runner.abzug}"
onchange="updateRunner(${runner.id},'abzug',this.value)">

<div style="
margin-top:15px;
padding:14px;
background:#0f172a;
border-radius:14px;
font-size:22px;
font-weight:bold;
text-align:center;
">

🏆 Gesamt:
${runner.gesamt.toFixed(2)}

</div>

</div>

`;

});

}

function calculateRanking(){

const output =
document.getElementById("resultOutput");

const podium =
document.getElementById("podium");

output.innerHTML = "";
podium.innerHTML = "";

const sorted =
[...runners]

.sort((a,b)=>

b.gesamt - a.gesamt

);

if(sorted[0]){

podium.innerHTML += `

<div class="place gold">

🥇 1. Platz

<br><br>

${sorted[0].name}

<br>

${sorted[0].gesamt.toFixed(2)}

</div>

`;

}

if(sorted[1]){

podium.innerHTML += `

<div class="place silver">

🥈 2. Platz

<br><br>

${sorted[1].name}

<br>

${sorted[1].gesamt.toFixed(2)}

</div>

`;

}

if(sorted[2]){

podium.innerHTML += `

<div class="place bronze">

🥉 3. Platz

<br><br>

${sorted[2].name}

<br>

${sorted[2].gesamt.toFixed(2)}

</div>

`;

}

sorted.forEach((runner,index)=>{

output.innerHTML += `

<div class="item">

<h3>
${index+1}. Platz
</h3>

👤 ${runner.name}

<br>

🏢 ${runner.club}

<br>

📂 ${runner.category}

<br><br>

⭐ Technik:
${runner.technik}

<br>

🎨 Kunst:
${runner.kunst}

<br>

❌ Abzüge:
${runner.abzug}

<br><br>

🏆 Gesamt:
<strong>
${runner.gesamt.toFixed(2)}
</strong>

</div>

`;

});

}

function updateRunner(id,field,value){

const runner =
runners.find(r=>r.id===id);

if(!runner) return;

runner[field] = value;

renderScores();

}

function deleteRunner(id){

runners =
runners.filter(r=>r.id!==id);

renderRunners();
renderScores();

}

</script>

</body>
</html>
