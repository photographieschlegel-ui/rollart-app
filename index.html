<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 RollArt Score Pro</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1800px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
color:white;
border:none;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
}

input,
textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}

textarea{
min-height:300px;
resize:vertical;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}

.saveButton{
width:100%;
margin-top:10px;
background:#2563eb;
color:white;
}

.confirmButton{
width:100%;
margin-top:10px;
background:#16a34a;
color:white;
}

.liveBox{
background:#0f766e;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.bigText{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.scoreGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
}

.scoreBox{
margin-top:15px;
padding:15px;
background:#1e293b;
border-radius:14px;
}

.ok{
color:#4ade80;
font-weight:bold;
margin-top:10px;
font-size:20px;
}

.place1{
color:gold;
}

.place2{
color:silver;
}

.place3{
color:#cd7f32;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
🏟 Wettbewerbe
</button>

<button onclick="showPage('detailPage')">
📂 Wettbewerb
</button>

<button onclick="showPage('livePage')">
⏱ Live
</button>

</div>

<!-- Wettbewerbe -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text" id="competitionName" placeholder="Wettbewerb">
<input type="text" id="competitionPlace" placeholder="Ort">
<input type="date" id="competitionFrom">
<input type="date" id="competitionTo">

<button class="mainButton" onclick="saveCompetition()">
💾 Wettbewerb speichern
</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div id="competitionList" class="grid"></div>

</div>

</div>

<!-- Wettbewerb -->

<div id="detailPage" class="page">

<div class="card">

<h2>📋 Wettbewerbstext</h2>

<textarea
id="competitionText"
placeholder="Block aus PDF einfügen"></textarea>

<button class="mainButton" onclick="parseCompetitionText()">
📥 Block importieren
</button>

</div>

<div class="card">

<h2>🕒 Kategorien</h2>

<div id="categoryList" class="grid"></div>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList" class="grid"></div>

</div>

</div>

<!-- LIVE -->

<div id="livePage" class="page">

<div class="liveBox">

<h2>⏱ Live Modus</h2>

<div id="liveClock" class="bigText"></div>

<input
type="number"
id="timeOffset"
value="0"
placeholder="Zeitkorrektur Minuten">

<button class="mainButton" onclick="renderLiveMode()">
🔄 Aktualisieren
</button>

</div>

<div class="liveBox">

<h2>🏁 Aktuelle Kategorie</h2>

<div id="liveCategory" class="bigText">-</div>

</div>

<div class="liveBox">

<h2>👤 Aktueller Läufer</h2>

<div id="liveRunner">-</div>

</div>

<div class="liveBox">

<h2>➡ Nächster Läufer</h2>

<div id="nextRunner" class="bigText">-</div>

</div>

<button class="confirmButton" onclick="confirmRunner()">
✅ Wertung bestätigen / Nächster Läufer
</button>

</div>

<script>

let competitions = [];
let activeCompetition = null;
let currentRunnerIndex = 0;

/* Vereine */

const knownClubs = [

"SSG Ronsdorf",
"RRD Wuppertal",
"Wattenscheider RSC",
"TG Westhofen",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen",

"TV Walsum-Aldenrade 07",
"Rollkunstlauf Akademie",
"ERC Westfalen",
"REV Gruga",
"TuS Wiehl",
"SC Fortuna Bonn"

];

/* Abzüge */

const deductions = {

"101":0.2,
"102":0.3,
"201":0.5,
"205":0.5,
"301":1.0

};

/* ========================================= */

function showPage(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{
page.style.display="none";
});

document.getElementById(pageId)
.style.display="block";

if(pageId==="livePage"){

renderLiveMode();

}

}

/* ========================================= */

function saveCompetition(){

const name =
document.getElementById("competitionName")
.value.trim();

if(name===""){
alert("Bitte Wettbewerb eingeben");
return;
}

competitions.push({

id:Date.now(),

name:name,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value,

categories:[],
runners:[]

});

saveData();

renderCompetitions();

}

function renderCompetitions(){

const output =
document.getElementById("competitionList");

output.innerHTML="";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>${comp.name}</h3>

📍 ${comp.place}

<br><br>

📅 ${comp.from} bis ${comp.to}

<button
class="mainButton"
onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

function openCompetition(id){

activeCompetition =
competitions.find(c=>c.id===id);

currentRunnerIndex = 0;

renderCategories();
renderRunners();

showPage("detailPage");

}

function deleteCompetition(id){

if(!confirm("Wirklich löschen?"))
return;

competitions =
competitions.filter(c=>c.id!==id);

if(
activeCompetition &&
activeCompetition.id===id
){

activeCompetition = null;

}

saveData();

renderCompetitions();

}

/* =========================================
PDF IMPORT
========================================= */

function parseCompetitionText(){

if(!activeCompetition){

alert("Bitte Wettbewerb öffnen");
return;

}

const text =
document.getElementById("competitionText").value;

const lines =
text
.split("\n")
.map(l=>l.trim())
.filter(l=>l!== "");

let currentCategory = null;

lines.forEach(line=>{

const categoryMatch =
line.match(
/(\d{2}:\d{2})\s+(\d{2}:\d{2}).*?([A-Za-zÄÖÜäöüß]+.*)$/
);

if(categoryMatch){

let categoryName =
categoryMatch[3]
.replace(/^\d+\s+\d+\s+\d+\s+/,"")
.replace(/• Startfolge Kür/gi,"")
.trim();

currentCategory = {

id:Date.now()+Math.random(),

begin:categoryMatch[1],

end:categoryMatch[2],

name:categoryName

};

const exists =
activeCompetition.categories.find(
c=>c.name===categoryName
);

if(!exists){

activeCompetition.categories.push(currentCategory);

}

return;

}

/* Läufer */

const runnerMatch =
line.match(/^(\d+)\s+(.+)$/);

if(runnerMatch && currentCategory){

let start = runnerMatch[1];
let rest = runnerMatch[2];

let club = "";
let name = rest;

for(let i=0;i<knownClubs.length;i++){

const currentClub =
knownClubs[i];

if(rest.endsWith(currentClub)){

club = currentClub;

name =
rest
.substring(
0,
rest.length-currentClub.length
)
.trim();

break;

}

}

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:start,

name:name,

club:club || "-",

category:currentCategory.name,

categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",

b1:"",
b2:"",
b3:"",

deductionNumber:"",
deduction:0,
total:0,

place:"",

confirmed:false

});

}

});

saveData();

renderCategories();
renderRunners();

document.getElementById("competitionText").value="";

}

/* ========================================= */

function renderCategories(){

const output =
document.getElementById("categoryList");

output.innerHTML="";

if(!activeCompetition) return;

activeCompetition.categories.forEach(cat=>{

output.innerHTML += `

<div class="item">

<h3>${cat.name}</h3>

🕒 ${cat.begin} - ${cat.end}

</div>

`;

});

}

/* ========================================= */

function scoringEnabled(category){

const scoringCategories = [

"Figurenläufer",
"Kunstläufer",
"Nachwuchs",
"Cup",
"Schüler",
"Jugend",
"Meisterklasse"

];

return scoringCategories.some(
c=>category.includes(c)
);

}

/* ========================================= */

function updateRanking(categoryId){

if(!activeCompetition) return;

const runners =
activeCompetition.runners
.filter(r=>r.categoryId===categoryId)
.filter(r=>!isNaN(parseFloat(r.total)));

runners.sort((a,b)=>{

return parseFloat(b.total) - parseFloat(a.total);

});

runners.forEach((runner,index)=>{

runner.place = index + 1;

});

saveData();

}

/* ========================================= */

function renderRunners(){

const output =
document.getElementById("runnerList");

output.innerHTML="";

if(!activeCompetition) return;

activeCompetition.runners.forEach(runner=>{

let rankingHtml = "";

if(runner.place){

let placeClass = "";

if(runner.place===1) placeClass="place1";
if(runner.place===2) placeClass="place2";
if(runner.place===3) placeClass="place3";

rankingHtml = `

<div class="ok ${placeClass}">

🏆 Platz ${runner.place}

</div>

`;

}

let scoringHtml = "";

if(scoringEnabled(runner.category)){

scoringHtml = `

<div class="scoreBox">

<div class="scoreGrid">

<input id="a1_${runner.id}" type="text" value="${runner.a1 || ""}">
<input id="a2_${runner.id}" type="text" value="${runner.a2 || ""}">
<input id="a3_${runner.id}" type="text" value="${runner.a3 || ""}">

</div>

<div class="scoreGrid">

<input id="b1_${runner.id}" type="text" value="${runner.b1 || ""}">
<input id="b2_${runner.id}" type="text" value="${runner.b2 || ""}">
<input id="b3_${runner.id}" type="text" value="${runner.b3 || ""}">

</div>

<div class="scoreGrid">

<input
id="deduction_${runner.id}"
type="text"
placeholder="Abzug"
value="${runner.deductionNumber || ""}">

<input
type="text"
disabled
value="-${runner.deduction || 0}">

<input
type="text"
disabled
value="${runner.total || 0}">

</div>

<button
class="saveButton"
onclick="saveRunnerScore('${runner.id}')">

💾 Speichern

</button>

${rankingHtml}

</div>

`;

}

output.innerHTML += `

<div class="item">

<h3>
Start ${runner.start}
</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

${scoringHtml}

</div>

`;

});

}

/* =========================================
SAVE SCORE
========================================= */

function saveRunnerScore(id,isLive=false){

const runner =
activeCompetition.runners.find(
r=>r.id==id
);

if(!runner) return;

const prefix =
isLive ? "live_" : "";

/* A */

runner.a1 =
parseFloat(
String(
document.getElementById(prefix+"a1_"+id).value
).replace(",",".")
) || 0;

runner.a2 =
parseFloat(
String(
document.getElementById(prefix+"a2_"+id).value
).replace(",",".")
) || 0;

runner.a3 =
parseFloat(
String(
document.getElementById(prefix+"a3_"+id).value
).replace(",",".")
) || 0;

/* B */

runner.b1 =
parseFloat(
String(
document.getElementById(prefix+"b1_"+id).value
).replace(",",".")
) || 0;

runner.b2 =
parseFloat(
String(
document.getElementById(prefix+"b2_"+id).value
).replace(",",".")
) || 0;

runner.b3 =
parseFloat(
String(
document.getElementById(prefix+"b3_"+id).value
).replace(",",".")
) || 0;

/* ABZUG */

runner.deductionNumber =
String(
document.getElementById(
prefix+"deduction_"+id
).value
)
.trim();

const deductionKey =
runner.deductionNumber;

if(
deductions[deductionKey] !== undefined
){

runner.deduction =
parseFloat(
deductions[deductionKey]
);

}else{

runner.deduction =
parseFloat(
runner.deductionNumber
.replace(",",".")
) || 0;

}

/* GESAMT */

const total =

runner.a1 +
runner.a2 +
runner.a3 +

runner.b1 +
runner.b2 +
runner.b3 -

runner.deduction;

runner.total =
parseFloat(
total.toFixed(2)
);

runner.confirmed = true;

/* Ranking */

updateRanking(
runner.categoryId
);

saveData();

renderRunners();

if(isLive){

renderLiveMode();

}

alert(
"Gesamt: " +
runner.total +
"\nAbzug: -" +
runner.deduction
);

}

/* ========================================= */

function confirmRunner(){

if(!activeCompetition) return;

const category =
getCurrentCategory();

if(!category) return;

const categoryRunners =
activeCompetition.runners.filter(
r=>r.categoryId===category.id
);

if(currentRunnerIndex < categoryRunners.length-1){

currentRunnerIndex++;

}

renderLiveMode();

}

/* ========================================= */

function getCurrentCategory(){

if(!activeCompetition) return null;

const now = new Date();

const offset =
parseInt(
document.getElementById("timeOffset").value
) || 0;

now.setMinutes(now.getMinutes()+offset);

const currentTime =
now.toTimeString().substring(0,5);

let activeCategory = null;

activeCompetition.categories.forEach(cat=>{

if(
currentTime >= cat.begin &&
currentTime <= cat.end
){

activeCategory = cat;

}

});

return activeCategory;

}

/* =========================================
LIVE
========================================= */

function renderLiveMode(){

if(!activeCompetition){

document.getElementById("liveCategory").innerHTML="-";
document.getElementById("liveRunner").innerHTML="-";
document.getElementById("nextRunner").innerHTML="-";

return;

}

const category =
getCurrentCategory();

if(!category){

document.getElementById("liveCategory")
.innerHTML =
"Keine aktive Kategorie";

return;

}

document.getElementById("liveCategory")
.innerHTML =
category.name;

const categoryRunners =
activeCompetition.runners.filter(
r=>r.categoryId===category.id
);

if(categoryRunners.length===0) return;

const currentRunner =
categoryRunners[currentRunnerIndex];

const nextRunner =
categoryRunners[currentRunnerIndex+1];

let liveHtml = `

<h3>
Start ${currentRunner.start}
</h3>

👤 ${currentRunner.name}

<br><br>

🏢 ${currentRunner.club}

`;

if(scoringEnabled(currentRunner.category)){

liveHtml += `

<div class="scoreBox">

<div class="scoreGrid">

<input id="live_a1_${currentRunner.id}" type="text" value="${currentRunner.a1 || ""}">
<input id="live_a2_${currentRunner.id}" type="text" value="${currentRunner.a2 || ""}">
<input id="live_a3_${currentRunner.id}" type="text" value="${currentRunner.a3 || ""}">

</div>

<div class="scoreGrid">

<input id="live_b1_${currentRunner.id}" type="text" value="${currentRunner.b1 || ""}">
<input id="live_b2_${currentRunner.id}" type="text" value="${currentRunner.b2 || ""}">
<input id="live_b3_${currentRunner.id}" type="text" value="${currentRunner.b3 || ""}">

</div>

<div class="scoreGrid">

<input
id="live_deduction_${currentRunner.id}"
type="text"
placeholder="Abzug"
value="${currentRunner.deductionNumber || ""}">

<input
type="text"
disabled
value="-${currentRunner.deduction || 0}">

<input
type="text"
disabled
value="${currentRunner.total || 0}">

</div>

<button
class="saveButton"
onclick="saveRunnerScore('${currentRunner.id}',true)">

💾 LIVE Wertung speichern

</button>

</div>

`;

}

document.getElementById("liveRunner")
.innerHTML =
liveHtml;

document.getElementById("nextRunner")
.innerHTML =

nextRunner ?

`
Start ${nextRunner.start}
<br>
${nextRunner.name}
`

:

"Kein nächster Läufer";

}

/* ========================================= */

function updateClock(){

const now = new Date();

const offset =
parseInt(
document.getElementById("timeOffset").value
) || 0;

now.setMinutes(now.getMinutes()+offset);

const currentTime =
now.toTimeString().substring(0,5);

document.getElementById("liveClock")
.innerHTML =
"🕒 "+currentTime;

}

/* ========================================= */

function saveData(){

localStorage.setItem(
"rollart_competitions",
JSON.stringify(competitions)
);

}

function loadData(){

const saved =
localStorage.getItem(
"rollart_competitions"
);

if(saved){

competitions =
JSON.parse(saved);

}

}

/* ========================================= */

window.onload = function(){

loadData();

renderCompetitions();

showPage("competitionPage");

setInterval(updateClock,1000);

};

</script>

</body>
</html>
