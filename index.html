<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Live</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#dc2626">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:900px;
margin:auto;
padding:20px;
}

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.logo{
width:90px;
height:90px;
object-fit:contain;
background:white;
padding:10px;
border-radius:20px;
}

.title{
font-size:34px;
font-weight:bold;
}

.liveClock{
font-size:22px;
margin-top:8px;
color:#cbd5e1;
}

.card{
background:#1e293b;
border-radius:28px;
padding:25px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.liveLabel{
font-size:18px;
color:#cbd5e1;
margin-bottom:10px;
}

.runnerName{
font-size:42px;
font-weight:bold;
line-height:1.2;
}

.runnerClub{
font-size:24px;
margin-top:10px;
color:#cbd5e1;
}

.category{
margin-top:18px;
font-size:26px;
font-weight:bold;
color:#60a5fa;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
margin-top:20px;
}

.scoreCard{
background:#334155;
padding:22px;
border-radius:22px;
text-align:center;
}

.scoreTitle{
font-size:18px;
color:#cbd5e1;
margin-bottom:10px;
}

.scoreValue{
font-size:42px;
font-weight:bold;
}

.totalCard{
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.totalCard .scoreValue{
font-size:54px;
}

.nextRunner{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

.placeBox{
margin-top:25px;
padding:18px;
border-radius:22px;
font-size:34px;
font-weight:bold;
text-align:center;
background:#16a34a;
}

.footer{
text-align:center;
margin-top:20px;
color:#94a3b8;
font-size:18px;
}

.liveButtons{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.liveButtons button{
flex:1;
padding:14px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

.prevButton{
background:#334155;
}

.currentButton{
background:#dc2626;
}

.nextButton{
background:#2563eb;
}

.rankingItem{
padding:14px;
background:#334155;
border-radius:16px;
margin-top:10px;
font-size:18px;
line-height:1.5;
}

.rankingTop{
background:#ca8a04;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<img
src="./icon-512.png"
class="logo">

<div>

<div class="title">
🏆 RollArt Live
</div>

<div
id="competitionInfo"
style="
font-size:18px;
color:#cbd5e1;
margin-top:8px;
">
Warte auf Wettbewerb...
</div>

<div id="clock" class="liveClock">
🕒 --:--
</div>

</div>

</div>

<div class="card">

<div class="liveLabel">
AKTUELLER LÄUFER
</div>

<div id="runnerName" class="runnerName">
Kein aktiver Wettbewerb
</div>

<div id="runnerClub" class="runnerClub">
-
</div>

<div id="runnerCategory" class="category">
-
</div>

<div class="scoreGrid">

<div class="scoreCard">

<div class="scoreTitle">
⭐ A Wert
</div>

<div id="scoreA" class="scoreValue">
0
</div>

</div>

<div class="scoreCard">

<div class="scoreTitle">
⭐ B Wert
</div>

<div id="scoreB" class="scoreValue">
0
</div>

</div>

<div class="scoreCard">

<div class="scoreTitle">
➖ Abzug
</div>

<div id="deduction" class="scoreValue">
0
</div>

</div>

<div class="scoreCard totalCard">

<div class="scoreTitle">
🏆 Gesamt
</div>

<div id="total" class="scoreValue">
0
</div>

</div>

</div>

<div id="placeBox" class="placeBox">
🏁 Wettbewerb beendet
</div>

<div class="liveButtons">

<button
onclick="showPreviousRunner()"
class="prevButton">

⬅ Zurück

</button>

<button
onclick="showCurrentRunner()"
class="currentButton">

🔴 Aktuell

</button>

<button
onclick="showNextRunner()"
class="nextButton">

➡ Weiter

</button>

</div>

</div>

<div class="card">

<div class="liveLabel">
➡ NÄCHSTER LÄUFER
</div>

<div id="nextRunner" class="nextRunner">
-
</div>

</div>

<div class="card">

<div class="liveLabel">
📋 AKTUELLE WERTUNG
</div>

<div id="rankingList"></div>

</div>

<div class="footer">
TV Walsum-Aldenrade 07
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301",
measurementId: "G-7DXHCKP3QZ"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let liveData = {};
let allRunners = [];
let currentViewIndex = -1;

function updateClock(){

const now = new Date();

const time =
now.toLocaleTimeString(
"de-DE",
{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
}
);

document.getElementById(
"clock"
).innerHTML =
"🕒 " + time;

}

function clearLive(){

document.getElementById(
"runnerName"
).innerHTML =
"Kein aktiver Wettbewerb";

document.getElementById(
"runnerClub"
).innerHTML =
"-";

document.getElementById(
"runnerCategory"
).innerHTML =
"-";

document.getElementById(
"scoreA"
).innerHTML =
"0";

document.getElementById(
"scoreB"
).innerHTML =
"0";

document.getElementById(
"deduction"
).innerHTML =
"0";

document.getElementById(
"total"
).innerHTML =
"0";

document.getElementById(
"placeBox"
).innerHTML =
"🏁 Wettbewerb beendet";

document.getElementById(
"nextRunner"
).innerHTML =
"-";

document.getElementById(
"rankingList"
).innerHTML =
"";

}

function renderRunner(runner){

if(!runner)return;

document.getElementById(
"runnerName"
).innerHTML =
runner.name || "-";

document.getElementById(
"runnerClub"
).innerHTML =
runner.club || "-";

document.getElementById(
"runnerCategory"
).innerHTML =
runner.category || "-";

const aValue =

Number(runner.a1 || 0) +
Number(runner.a2 || 0) +
Number(runner.a3 || 0);

const bValue =

Number(runner.b1 || 0) +
Number(runner.b2 || 0) +
Number(runner.b3 || 0);

document.getElementById(
"scoreA"
).innerHTML =
aValue.toFixed(1);

document.getElementById(
"scoreB"
).innerHTML =
bValue.toFixed(1);

document.getElementById(
"deduction"
).innerHTML =
"-" + Number(
runner.deduction || 0
).toFixed(1);

document.getElementById(
"total"
).innerHTML =
Number(
runner.total || 0
).toFixed(1);

document.getElementById(
"placeBox"
).innerHTML =
"🏆 Platz " +
(runner.place || "-");

}

function renderRanking(){

const output =
document.getElementById(
"rankingList"
);

if(!liveData?.competition?.runners)
return;

const runners =

[...liveData.competition.runners]

.sort((a,b)=>
Number(b.total)-Number(a.total)
);

output.innerHTML = "";

runners.forEach((runner,index)=>{

output.innerHTML += `

<div class="
rankingItem
${index===0 ? 'rankingTop' : ''}
">

${index+1}. ${runner.name}

<br>

🏆 ${Number(
runner.total || 0
).toFixed(1)}

</div>

`;

});

}

function render(data){

if(!data){

clearLive();

return;

}

if(!data.runner){

clearLive();

return;

}

liveData = data;

const runner =
data.runner || {};

const nextRunner =
data.nextRunner || {};

const competition =
data.competition || {};

allRunners =

[...(competition.runners || [])]

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

currentViewIndex =

allRunners.findIndex(
r=>String(r.id)===String(runner.id)
);

document.getElementById(
"competitionInfo"
).innerHTML =

`
📍 ${competition.place || "-"}
<br>
📅 ${competition.from || "-"}
bis
${competition.to || "-"}
`;

renderRunner(runner);

document.getElementById(
"nextRunner"
).innerHTML =

nextRunner?.name ?

`
${nextRunner.name}
<br>
${nextRunner.club || "-"}
`

:

"-";

renderRanking();

}

function showPreviousRunner(){

if(allRunners.length===0)
return;

if(currentViewIndex < 0){

currentViewIndex = 0;

}

if(currentViewIndex > 0){

currentViewIndex--;

}

const runner =
allRunners[currentViewIndex];

renderRunner(runner);

}

function showNextRunner(){

if(allRunners.length===0)
return;

if(currentViewIndex < 0){

currentViewIndex = 0;

}

if(currentViewIndex < allRunners.length-1){

currentViewIndex++;

}

const runner =
allRunners[currentViewIndex];

renderRunner(runner);

}

function showCurrentRunner(){

render(liveData);

}

onSnapshot(

doc(db,"rollart","live"),

(snapshot)=>{

if(snapshot.exists()){

const data =
snapshot.data();

render(data);

}else{

clearLive();

}

}

);

setInterval(
updateClock,
1000
);

updateClock();

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./service-worker.js"
);

}

</script>

</body>
</html>
