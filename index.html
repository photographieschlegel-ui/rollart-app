```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollArt Score Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}
.app{
max-width:1600px;
margin:auto;
padding:20px;
}
.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}
.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}
.tabs button{
background:#1e293b;
border:none;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}
.page{
display:none;
}
.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}
.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}
input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}
button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}
.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}
.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}
.openButton{
width:100%;
margin-top:10px;
background:#16a34a;
color:white;
}
.infoBox{
background:#1d4ed8;
padding:16px;
border-radius:16px;
margin-top:15px;
}
.placeholder{
border:2px dashed #64748b;
padding:20px;
border-radius:16px;
margin-top:15px;
text-align:center;
color:#cbd5e1;
}
</style>
</head>
<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">
<button onclick="showPage('competitionPage')">🏟 Wettbewerbe</button>
<button onclick="showPage('detailPage')">📂 Wettbewerb</button>
</div>

<div id="competitionPage" class="page">

<div class="card">
<h2>🏟 Neuer Wettbewerb</h2>

<input type="text" id="competitionName" placeholder="Wettbewerb">
<input type="text" id="competitionPlace" placeholder="Ort">

<label>Von</label>
<input type="date" id="competitionFrom">

<label>Bis</label>
<input type="date" id="competitionTo">

<button class="mainButton" onclick="addCompetition()">
💾 Wettbewerb speichern
</button>
</div>

<div class="card">
<h2>📋 Gespeicherte Wettbewerbe</h2>
<div id="competitionList" class="grid"></div>
</div>

</div>

<div id="detailPage" class="page">

<div class="card">
<h2>📂 Aktiver Wettbewerb</h2>
<div id="activeCompetition"></div>
</div>

<div class="card">
<h2>📄 PDF Import</h2>
<input type="file" id="pdfUpload" accept=".pdf">
<button class="mainButton" onclick="readPDF()">
PDF laden & analysieren
</button>
<div id="pdfInfo"></div>
</div>

<div class="card">
<h2>🕒 Kategorien</h2>
<div id="categoryList" class="grid"></div>
</div>

<div class="card">
<h2>👥 Läufer</h2>
<div id="runnerList" class="grid"></div>
</div>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;

function showPage(pageId){

 document.querySelectorAll('.page').forEach(page=>{
  page.style.display = 'none';
 });

 document.getElementById(pageId).style.display = 'block';
}

function addCompetition(){

 const name = document.getElementById('competitionName').value.trim();

 if(name === ''){
  alert('Bitte Wettbewerb eingeben');
  return;
 }

 const competition = {
  id: Date.now(),
  name: name,
  place: document.getElementById('competitionPlace').value,
  from: document.getElementById('competitionFrom').value,
  to: document.getElementById('competitionTo').value,
  categories: [],
  runners: [],
  pdfText: ''
 };

 competitions.push(competition);

 saveCompetitions();
 renderCompetitions();
 clearCompetitionForm();
}

function deleteCompetition(id){

 if(!confirm('Wettbewerb löschen?')) return;

 competitions = competitions.filter(c => c.id !== id);

 if(activeCompetition && activeCompetition.id === id){
  activeCompetition = null;
  localStorage.removeItem('rollart_active_competition');
 }

 saveCompetitions();
 renderCompetitions();
 renderActiveCompetition();
}

function openCompetition(id){

 const competition = competitions.find(c => c.id === id);
 if(!competition) return;

 activeCompetition = competition;

 saveCompetitions();
 renderActiveCompetition();
 showPage('detailPage');
}

function renderCompetitions(){

 const output = document.getElementById('competitionList');
 output.innerHTML = '';

 if(competitions.length === 0){
  output.innerHTML = '<div class="item">Noch keine Wettbewerbe gespeichert</div>';
  return;
 }

 competitions.forEach(comp=>{

  output.innerHTML += `
  <div class="item">
   <h3>🏆 ${comp.name}</h3>
   📍 ${comp.place || '-'}
   <br><br>
   📅 ${comp.from || '-'} bis ${comp.to || '-'}

   <button class="openButton" onclick="openCompetition(${comp.id})">
   📂 Öffnen
   </button>

   <button class="deleteButton" onclick="deleteCompetition(${comp.id})">
   🗑 Löschen
   </button>
  </div>
  `;

 });
}

function renderActiveCompetition(){

 const output = document.getElementById('activeCompetition');

 if(!activeCompetition){
  output.innerHTML = '<div class="item">Kein Wettbewerb ausgewählt</div>';
  return;
 }

 output.innerHTML = `
 <div class="infoBox">
 <h2>🏆 ${activeCompetition.name}</h2>
 📍 ${activeCompetition.place || '-'}
 <br><br>
 📅 ${activeCompetition.from || '-'} bis ${activeCompetition.to || '-'}
 </div>
 `;

 renderCategories();
 renderRunners();
}

async function readPDF(){

 if(!activeCompetition){
  alert('Bitte Wettbewerb öffnen');
  return;
 }

 const file = document.getElementById('pdfUpload').files[0];

 if(!file){
  alert('Bitte PDF auswählen');
  return;
 }

 const reader = new FileReader();

 reader.onload = async function(){

  const typedarray = new Uint8Array(this.result);

  const pdf = await pdfjsLib.getDocument(typedarray).promise;

  let text = '';

  for(let i=1;i<=pdf.numPages;i++){

   const page = await pdf.getPage(i);
   const content = await page.getTextContent();

   text += ' ' + content.items.map(item => item.str).join(' ');
  }

  parsePDF(text);
 };

 reader.readAsArrayBuffer(file);
}

function parsePDF(text){

 activeCompetition.categories = [];
 activeCompetition.runners = [];

 const cleaned = text.replace(/\s+/g,' ').trim();

 const categoryRegex = /(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+\d{2}:\d{2}:\d{2}\s+\d{2}:\d{2}:\d{2}\s+\d+\s+\d+\s+([A-Za-zÄÖÜäöüß0-9\.\- ]+)/g;

 let match;

 while((match = categoryRegex.exec(cleaned)) !== null){

  let categoryName = match[3]
   .split(/\s+\d+\s+/)[0]
   .replace('• Startfolge Kür','')
   .trim();

  activeCompetition.categories.push({
   id: Date.now() + Math.random(),
   begin: match[1],
   end: match[2],
   name: categoryName
  });
 }

 const runnerRegex = /(\d+)\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\- ]+?)\s+(SSG Ronsdorf|RRD Wuppertal|Wattenscheider RSC|TG Westhofen|TV Datteln 09|RESG Walsum|1\. RC Recklinghausen|TV Walsum-Aldenrade 07)/g;

 let runnerMatch;
 let categoryIndex = 0;
 let runnerCounter = 0;

 while((runnerMatch = runnerRegex.exec(cleaned)) !== null){

  if(runnerCounter >= 8){
   categoryIndex++;
   runnerCounter = 0;
  }

  activeCompetition.runners.push({
   id: Date.now() + Math.random(),
   start: runnerMatch[1],
   name: runnerMatch[2].trim(),
   club: runnerMatch[3].trim(),
   category: activeCompetition.categories[categoryIndex]
    ? activeCompetition.categories[categoryIndex].name
    : 'Keine Kategorie'
  });

  runnerCounter++;
 }

 saveCompetitions();
 renderCategories();
 renderRunners();

 document.getElementById('pdfInfo').innerHTML = `
 <div class="item">
 ✅ PDF analysiert
 <br><br>
 🕒 Kategorien: ${activeCompetition.categories.length}
 <br>
 👥 Läufer: ${activeCompetition.runners.length}
 </div>
 `;
}

function renderCategories(){

 const output = document.getElementById('categoryList');
 output.innerHTML = '';

 if(activeCompetition.categories.length === 0){
  output.innerHTML = '<div class="placeholder">Keine Kategorien</div>';
  return;
 }

 activeCompetition.categories.forEach(cat=>{

  output.innerHTML += `
  <div class="item">
   <h3>${cat.name}</h3>
   🕒 ${cat.begin} - ${cat.end}
  </div>
  `;
 });
}

function renderRunners(){

 const output = document.getElementById('runnerList');
 output.innerHTML = '';

 if(activeCompetition.runners.length === 0){
  output.innerHTML = '<div class="placeholder">Keine Läufer</div>';
  return;
 }

 activeCompetition.runners.forEach(runner=>{

  output.innerHTML += `
  <div class="item">
   <h3>Start ${runner.start}</h3>
   👤 ${runner.name}
   <br><br>
   🏢 ${runner.club}
   <br><br>
   📂 ${runner.category}
  </div>
  `;
 });
}

function saveCompetitions(){

 localStorage.setItem('rollart_competitions',JSON.stringify(competitions));
 localStorage.setItem('rollart_active_competition',JSON.stringify(activeCompetition));
}

function loadCompetitions(){

 const saved = localStorage.getItem('rollart_competitions');
 if(saved){
  competitions = JSON.parse(saved);
 }

 const savedActive = localStorage.getItem('rollart_active_competition');
 if(savedActive){
  activeCompetition = JSON.parse(savedActive);
 }
}

function clearCompetitionForm(){

 document.getElementById('competitionName').value = '';
 document.getElementById('competitionPlace').value = '';
 document.getElementById('competitionFrom').value = '';
 document.getElementById('competitionTo').value = '';
}

window.onload = function(){

 loadCompetitions();
 renderCompetitions();
 renderActiveCompetition();
 showPage('competitionPage');
}

</script>

</body>
</html>
```
