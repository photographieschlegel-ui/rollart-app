<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
border:none;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.tabs button:hover{
background:#334155;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}

.openButton{
width:100%;
margin-top:10px;
background:#16a34a;
color:white;
}

.infoBox{
background:#1d4ed8;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.placeholder{
border:2px dashed #64748b;
padding:20px;
border-radius:16px;
margin-top:15px;
text-align:center;
color:#cbd5e1;
}

pre{
white-space:pre-wrap;
word-break:break-word;
}

</style>
</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
🏟 Wettbewerbe
</button>

<button onclick="showPage('detailPage')">
📂 Wettbewerb
</button>

</div>

<!-- Wettbewerbe -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Neuer Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>

<input type="date"
id="competitionFrom">

<label>Bis</label>

<input type="date"
id="competitionTo">

<button class="mainButton"
onclick="addCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Gespeicherte Wettbewerbe</h2>

<div id="competitionList"
class="grid"></div>

</div>

</div>

<!-- Wettbewerb Detail -->

<div id="detailPage" class="page">

<div class="card">

<h2>📂 Aktiver Wettbewerb</h2>

<div id="activeCompetition"></div>

</div>

<!-- PDF -->

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button class="mainButton"
onclick="readPDF()">

PDF laden

</button>

<div id="pdfInfo"></div>

</div>

<!-- Kategorien -->

<div class="card">

<h2>🕒 Kategorien</h2>

<div id="categoryList"></div>

</div>

<!-- Läufer -->

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList"></div>

</div>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;

/* Seiten */

function showPage(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{

page.style.display = "none";

});

document.getElementById(pageId)
.style.display = "block";

}

/* Wettbewerb hinzufügen */

function addCompetition(){

const name =
document.getElementById("competitionName").value.trim();

if(name === ""){

alert("Bitte Wettbewerb eingeben");
return;

}

const competition = {

id:Date.now(),

name:name,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value,

categories:[],
runners:[],
scores:[],
pdfText:""

};

competitions.push(competition);

saveCompetitions();

renderCompetitions();

clearCompetitionForm();

}

/* Wettbewerb löschen */

function deleteCompetition(id){

const confirmDelete =
confirm("Wettbewerb löschen?");

if(!confirmDelete) return;

competitions =
competitions.filter(c => c.id !== id);

if(
activeCompetition &&
activeCompetition.id === id
){

activeCompetition = null;

localStorage.removeItem(
"rollart_active_competition"
);

}

saveCompetitions();

renderCompetitions();

renderActiveCompetition();

}

/* Wettbewerb öffnen */

function openCompetition(id){

const competition =
competitions.find(c => c.id === id);

if(!competition) return;

activeCompetition = competition;

saveCompetitions();

renderActiveCompetition();

showPage("detailPage");

}

/* Wettbewerbe anzeigen */

function renderCompetitions(){

const output =
document.getElementById("competitionList");

output.innerHTML = "";

if(competitions.length === 0){

output.innerHTML = `

<div class="item">

Noch keine Wettbewerbe gespeichert

</div>

`;

return;

}

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>
🏆 ${comp.name}
</h3>

📍 ${comp.place || "-"}

<br><br>

📅 ${comp.from || "-"}
bis
${comp.to || "-"}

<button class="openButton"
onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

/* Aktiver Wettbewerb */

function renderActiveCompetition(){

const output =
document.getElementById("activeCompetition");

if(!activeCompetition){

output.innerHTML = `

<div class="item">

Kein Wettbewerb ausgewählt

</div>

`;

return;

}

output.innerHTML = `

<div class="infoBox">

<h2>
🏆 ${activeCompetition.name}
</h2>

📍 ${activeCompetition.place || "-"}

<br><br>

📅 ${activeCompetition.from || "-"}
bis
${activeCompetition.to || "-"}

</div>

`;

renderCategories();
renderRunners();

}

/* PDF lesen */

async function readPDF(){

if(!activeCompetition){

alert("Bitte Wettbewerb öffnen");
return;

}

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");
return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let i=1;i<=pdf.numPages;i++){

const page =
await pdf.getPage(i);

const content =
await page.getTextContent();

const text =
content.items
.map(item=>item.str)
.join(" ");

fullText += "\n" + text;

}

/* NUR SPEICHERN */

activeCompetition.pdfText =
fullText;

saveCompetitions();

document.getElementById("pdfInfo")
.innerHTML = `

<div class="item">

✅ PDF geladen

<br><br>

📄 Zeichen:
${fullText.length}

</div>

<div class="item">

<h3>PDF Vorschau</h3>

<pre>

${fullText.substring(0,3000)}

</pre>

</div>

`;

};

reader.readAsArrayBuffer(file);

}

/* Kategorien */

function renderCategories(){

const output =
document.getElementById("categoryList");

if(
!activeCompetition ||
activeCompetition.categories.length === 0
){

output.innerHTML = `

<div class="placeholder">

Noch keine Kategorien

</div>

`;

return;

}

output.innerHTML = "";

}

/* Läufer */

function renderRunners(){

const output =
document.getElementById("runnerList");

if(
!activeCompetition ||
activeCompetition.runners.length === 0
){

output.innerHTML = `

<div class="placeholder">

Noch keine Läufer

</div>

`;

return;

}

output.innerHTML = "";

}

/* Speichern */

function saveCompetitions(){

localStorage.setItem(
"rollart_competitions",
JSON.stringify(competitions)
);

localStorage.setItem(
"rollart_active_competition",
JSON.stringify(activeCompetition)
);

}

/* Laden */

function loadCompetitions(){

const saved =
localStorage.getItem(
"rollart_competitions"
);

if(saved){

competitions =
JSON.parse(saved);

}

const savedActive =
localStorage.getItem(
"rollart_active_competition"
);

if(savedActive){

activeCompetition =
JSON.parse(savedActive);

}

}

/* Formular leeren */

function clearCompetitionForm(){

document.getElementById("competitionName").value = "";
document.getElementById("competitionPlace").value = "";
document.getElementById("competitionFrom").value = "";
document.getElementById("competitionTo").value = "";

}

/* Start */

window.onload = function(){

loadCompetitions();

renderCompetitions();

renderActiveCompetition();

showPage("competitionPage");

};

</script>

</body>
</html>
