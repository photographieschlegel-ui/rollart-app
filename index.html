<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveCompetition = async function(){

const name =
document.getElementById("competitionName").value;

const place =
document.getElementById("competitionPlace").value;

const from =
document.getElementById("competitionFrom").value;

const to =
document.getElementById("competitionTo").value;

if(
!name ||
!place ||
!from ||
!to
){
alert("Bitte alles ausfüllen");
return;
}

await addDoc(collection(db,"competitions"),{

name,
place,
from,
to,
created:new Date()

});

document.getElementById("competitionName").value="";
document.getElementById("competitionPlace").value="";
document.getElementById("competitionFrom").value="";
document.getElementById("competitionTo").value="";

loadCompetitions();

};

window.deleteCompetition = async function(id){

await deleteDoc(
doc(db,"competitions",id)
);

loadCompetitions();

};

window.loadCompetitions = async function(){

const list =
document.getElementById("competitionList");

list.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"competitions")
);

snapshot.forEach((d)=>{

const c = d.data();

list.innerHTML += `

<div class="item">

<strong>
${c.name}
</strong>

<br><br>

📍 ${c.place}

<br>

📅 ${c.from} bis ${c.to}

<br><br>

<button class="danger"
onclick="deleteCompetition('${d.id}')">

Löschen

</button>

</div>

`;

});

};

window.onload = ()=>{

loadCompetitions();

};

</script>

<style>

body{
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.app{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab{
  background:#1e293b;
  padding:12px 20px;
  border-radius:14px;
  cursor:pointer;
}

.tab:hover{
  background:#334155;
}

.live-banner{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.item{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
}

.runner{
  border-left:5px solid #22c55e;
}

.schedule{
  border-left:5px solid #3b82f6;
}

.hidden{
  display:none;
}

button,input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  cursor:pointer;
  font-weight:bold;
}

.success{
  background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.danger{
  background:linear-gradient(135deg,#dc2626,#ef4444)!important;
}

.categoryLabel{
  background:#2563eb;
  display:inline-block;
  padding:6px 10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:14px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="live-banner">
LIVE WETTKAMPF IMPORTER
</div>

<div class="tabs">

<div class="tab"
onclick="showTab('competitionTab')">
🏟 Wettbewerb
</div>

<div class="tab"
onclick="showTab('pdfTab')">
📄 PDF Import
</div>

<div class="tab"
onclick="showTab('scheduleTab')">
🕒 Kategorien
</div>

<div class="tab"
onclick="showTab('runnerTab')">
👥 Läufer
</div>

</div>

<!-- Wettbewerb -->

<div id="competitionTab">

<div class="card">

<h2>🏟 Wettbewerb erstellen</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label style="display:block;margin-top:15px;">
Von:
</label>

<input type="date"
id="competitionFrom">

<label style="display:block;margin-top:15px;">
Bis:
</label>

<input type="date"
id="competitionTo">

<button class="success"
onclick="saveCompetition()">

Wettbewerb speichern

</button>

<div id="competitionList"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfTab" class="hidden">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button onclick="readPDF()">
PDF analysieren
</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Kategorien -->

<div id="scheduleTab" class="hidden">

<div class="card">

<h2>🕒 Erkannte Wettbewerbe</h2>

<div id="scheduleOutput"></div>

</div>

</div>

<!-- Läufer -->

<div id="runnerTab" class="hidden">

<div class="card">

<h2>👥 Erkannte Läufer</h2>

<div id="runnerOutput"></div>

</div>

</div>

</div>

<script>

function showTab(tabId){

const tabs = [
"competitionTab",
"pdfTab",
"scheduleTab",
"runnerTab"
];

tabs.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById(tabId)
.classList.remove("hidden");

}

showTab("competitionTab");

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");
return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let pageNum=1;
pageNum<=pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item=>item.str)
.join(" ");

fullText += "\n" + text;

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

document
.getElementById("scheduleOutput")
.innerHTML = "";

document
.getElementById("runnerOutput")
.innerHTML = "";

const blockRegex =
/(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+([\s\S]*?)(?=\d{2}:\d{2}\s+\d{2}:\d{2}|$)/g;

const blocks =
[...text.matchAll(blockRegex)];

let runnerCount = 0;

blocks.forEach((block,index)=>{

const begin = block[1];
const end = block[2];
const duration = block[3];
const warmup = block[4];
const groups = block[5];
const participants = block[6];

let content = block[7]
.replace(/\s+/g," ")
.trim();

const categoryMatch =
content.match(
/^(.*?)(?=\d+\s+[A-ZÄÖÜ])/
);

if(!categoryMatch) return;

let category =
categoryMatch[1]

.replace(/Startfolge Kür/gi,"")

.replace(/Westhofener Kürpokal/gi,"")

.trim();

document
.getElementById("scheduleOutput")
.innerHTML += `

<div class="item schedule">

<h3>
${category}
</h3>

🕒 Beginn:
${begin}

<br>

🕒 Ende:
${end}

<br>

⏱ Dauer:
${duration}

<br>

🔥 Einlaufzeit:
${warmup}

<br>

👥 Einlaufgruppen:
${groups}

<br>

🏃 Teilnehmer:
${participants}

</div>

`;

const runnerRegex =
/(\d+)\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\- ]+?)\s+(SSG\sRonsdorf|RRD\sWuppertal|Wattenscheider\sRSC|TG\sWesthofen|TV\sDatteln\s09|TV\sWalsum-Aldenrade\s07|TV\sWalsum\s-\sAldenrade)/g;

const runners =
[...content.matchAll(runnerRegex)];

runners.forEach(runner=>{

const start = runner[1];

const name = runner[2]
.replace(/\s+/g," ")
.trim();

const club = runner[3]
.replace(/\s+/g," ")
.trim();

if(
name.length < 3 ||
name.includes("Startfolge") ||
name.includes("Kürpokal")
){
return;
}

runnerCount++;

document
.getElementById("runnerOutput")
.innerHTML += `

<div class="item runner">

<div class="categoryLabel">
${category}
</div>

<br>

<strong>
Start ${start}
</strong>

<br><br>

👤 ${name}

<br>

🏢 ${club}

</div>

`;

});

});

document
.getElementById("pdfInfo")
.innerHTML = `

<div class="item">

✅ PDF analysiert

<br><br>

🕒 Wettbewerbe:
${blocks.length}

<br>

👥 Läufer:
${runnerCount}

<br><br>

ℹ Fehlende Läufer können später manuell ergänzt werden.

</div>

`;

}

</script>

</body>
</html>
