<!-- NUR DIESE 2 FUNKTIONEN ERSETZEN -->

<script>

/* Punkte speichern */

function saveRunnerScore(id){

const runner =
activeCompetition.runners.find(
r => r.id == id
);

if(!runner) return;

/* A Wertungen */

runner.a1 =
Number(document.getElementById("a1_"+id).value) || 0;

runner.a2 =
Number(document.getElementById("a2_"+id).value) || 0;

runner.a3 =
Number(document.getElementById("a3_"+id).value) || 0;

/* B Wertungen */

runner.b1 =
Number(document.getElementById("b1_"+id).value) || 0;

runner.b2 =
Number(document.getElementById("b2_"+id).value) || 0;

runner.b3 =
Number(document.getElementById("b3_"+id).value) || 0;

/* Abzug */

runner.deduction =
Number(document.getElementById("deduction_"+id).value) || 0;

/* Durchschnitt */

const avgA =
(runner.a1 + runner.a2 + runner.a3) / 3;

const avgB =
(runner.b1 + runner.b2 + runner.b3) / 3;

/* Gesamt */

runner.total =
(avgA + avgB - runner.deduction)
.toFixed(2);

saveCompetitions();

renderRunners();

}


/* Läufer anzeigen */

function renderRunners(){

const output =
document.getElementById("runnerList");

output.innerHTML = "";

if(
!activeCompetition ||
activeCompetition.runners.length === 0
){

output.innerHTML =
`<div class="placeholder">
Keine Läufer
</div>`;

return;

}

activeCompetition.runners.forEach(runner=>{

output.innerHTML += `

<div class="item">

<h3>
Start ${runner.start}
</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

<div class="scoreBox">

<h4>🏅 Wertung A</h4>

<div class="scoreGrid">

<input
id="a1_${runner.id}"
type="number"
step="0.01"
placeholder="A1"
value="${runner.a1 || ""}">

<input
id="a2_${runner.id}"
type="number"
step="0.01"
placeholder="A2"
value="${runner.a2 || ""}">

<input
id="a3_${runner.id}"
type="number"
step="0.01"
placeholder="A3"
value="${runner.a3 || ""}">

</div>

<h4>🏅 Wertung B</h4>

<div class="scoreGrid">

<input
id="b1_${runner.id}"
type="number"
step="0.01"
placeholder="B1"
value="${runner.b1 || ""}">

<input
id="b2_${runner.id}"
type="number"
step="0.01"
placeholder="B2"
value="${runner.b2 || ""}">

<input
id="b3_${runner.id}"
type="number"
step="0.01"
placeholder="B3"
value="${runner.b3 || ""}">

</div>

<h4>➖ Abzug</h4>

<input
id="deduction_${runner.id}"
type="number"
step="0.01"
placeholder="Abzug"
value="${runner.deduction || ""}">

<h4>🏆 Gesamt</h4>

<input
type="text"
disabled
value="${runner.total || "0.00"}">

<button class="saveScoreButton"
onclick="saveRunnerScore('${runner.id}')">

💾 Punkte speichern

</button>

</div>

<button class="deleteButton"
onclick="deleteRunner('${runner.id}')">

🗑 Läufer löschen

</button>

</div>

`;

});

}

</script>
