```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
}

.app{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tab{
  background:#1e293b;
  padding:12px 20px;
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
}

.tab:hover{
  background:#334155;
  transform:translateY(-2px);
}

.live-banner{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.01);}
  100%{transform:scale(1);}
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1,h2,h3{
  color:white;
}

input,button,select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
  opacity:0.9;
}

.success{
  background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.danger{
  background:linear-gradient(135deg,#dc2626,#ef4444)!important;
}

.item{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
  transition:0.3s;
}

.item:hover{
  transform:translateY(-2px);
}

.podium{
  display:flex;
  gap:20px;
  align-items:flex-end;
  margin-top:30px;
}

.medal{
  flex:1;
  text-align:center;
  border-radius:20px;
  color:white;
  font-weight:bold;
  padding:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  animation:pop 0.6s ease;
}

@keyframes pop{
  0%{
    transform:scale(0.8);
    opacity:0;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

.gold{
  background:linear-gradient(135deg,#facc15,#eab308);
  height:260px;
  font-size:30px;
}

.silver{
  background:linear-gradient(135deg,#cbd5e1,#94a3b8);
  height:220px;
  font-size:24px;
}

.bronze{
  background:linear-gradient(135deg,#fb923c,#ea580c);
  height:190px;
  font-size:22px;
}

@media(max-width:700px){

  .podium{
    flex-direction:column;
    align-items:stretch;
  }

  .gold,.silver,.bronze{
    height:auto;
  }

}

</style>
</head>

<body>

<div class="app">

<div class="topbar">

<div class="logo">
🏆 RollArt Score Pro
</div>

</div>

<div class="live-banner">
LIVE WETTKAMPF SYSTEM
</div>

<div class="tabs">

<div class="tab">🏟 Wettbewerbe</div>
<div class="tab">👥 Läufer</div>
<div class="tab">📊 Wertung</div>
<div class="tab">🏆 Ergebnisse</div>
<div class="tab">⚙ Verwaltung</div>

</div>

<div class="grid">

<div>

<div class="card">

<h2>Wettbewerb</h2>

<input type="text" id="competitionName" placeholder="Wettbewerb">
<input type="text" id="competitionPlace" placeholder="Ort">

<input type="date" id="competitionDateFrom">
<input type="date" id="competitionDateTo">

<button onclick="saveCompetition()">
Wettbewerb speichern
</button>

<select id="competitionSelect"></select>

<div id="competitionList"></div>

</div>

<div class="card">

<h2>Kategorien</h2>

<input type="text" id="categoryName" placeholder="Kategorie">

<button onclick="saveCategory()">
Kategorie speichern
</button>

<div id="categoryList"></div>

</div>

<div class="card">

<h2>Läufer</h2>

<select id="skaterCategory"></select>

<input type="number" id="skaterStart" placeholder="Startnummer">

<input type="text" id="skaterName" placeholder="Name">

<select id="clubSelect"></select>

<input type="text" id="skaterClub" placeholder="Neuer Verein">

<button onclick="saveSkater()">
Läufer speichern
</button>

<div id="skaterList"></div>

</div>

</div>

<div>

<div class="card">

<h2>Wertung</h2>

<select id="scoreSkater"></select>

<h3>Richter 1</h3>

<input type="number" step="0.1" id="a1" placeholder="A">
<input type="number" step="0.1" id="b1" placeholder="B">
<select id="d1"></select>

<h3>Richter 2</h3>

<input type="number" step="0.1" id="a2" placeholder="A">
<input type="number" step="0.1" id="b2" placeholder="B">
<select id="d2"></select>

<h3>Richter 3</h3>

<input type="number" step="0.1" id="a3" placeholder="A">
<input type="number" step="0.1" id="b3" placeholder="B">
<select id="d3"></select>

<button class="success"
onclick="saveScore()">

Wertung speichern

</button>

</div>

<div class="card">

<h2>🏆 Live Ergebnisse</h2>

<button onclick="downloadPDF()">
PDF Ergebnisliste
</button>

<div id="podium"></div>

<div id="resultList"></div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",

authDomain: "rollart-score-5319a.firebaseapp.com",

projectId: "rollart-score-5319a",

storageBucket: "rollart-score-5319a.firebasestorage.app",

messagingSenderId: "658963624980",

appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const deductions = {

0:{text:"Kein Abzug",value:0.0},
1:{text:"Knien oder Liegen",value:0.3},
2:{text:"Kostümverstoß",value:0.2},
3:{text:"Programmfehler",value:0.2},
4:{text:"Musikverstoß",value:0.3},
5:{text:"Fläche verlassen",value:0.3},
6:{text:"Fehlendes Element",value:0.5}

};

function fillDeductionDropdowns(){

["d1","d2","d3"].forEach(id=>{

const el=document.getElementById(id);

el.innerHTML="";

Object.keys(deductions).forEach(k=>{

el.innerHTML += `

<option value="${k}">
${deductions[k].text}
(-${deductions[k].value})
</option>

`;

});

});

}

window.saveCompetition = async function(){

const name=document.getElementById("competitionName").value;
const place=document.getElementById("competitionPlace").value;
const from=document.getElementById("competitionDateFrom").value;
const to=document.getElementById("competitionDateTo").value;

await addDoc(collection(db,"competitions"),{
name,place,from,to
});

loadCompetitions();

};

window.saveCategory = async function(){

const competitionId=
document.getElementById("competitionSelect").value;

const category=
document.getElementById("categoryName").value;

await addDoc(collection(db,"categories"),{
competitionId,
category
});

loadCategories();

};

window.saveSkater = async function(){

const competitionId=
document.getElementById("competitionSelect").value;

const category=
document.getElementById("skaterCategory").value;

const start=
document.getElementById("skaterStart").value;

const name=
document.getElementById("skaterName").value;

let club=
document.getElementById("clubSelect").value;

const newClub=
document.getElementById("skaterClub").value;

if(newClub){

club=newClub;

await addDoc(collection(db,"clubs"),{
name:newClub
});

}

await addDoc(collection(db,"skaters"),{
competitionId,
category,
start,
name,
club
});

loadSkaters();

};

window.saveScore = async function(){

const skater=
document.getElementById("scoreSkater").value;

const total=

(+a1.value + +b1.value - deductions[d1.value].value)

+

(+a2.value + +b2.value - deductions[d2.value].value)

+

(+a3.value + +b3.value - deductions[d3.value].value);

await addDoc(collection(db,"scores"),{
skater,
total:Number(total.toFixed(2))
});

loadResults();

};

async function loadCompetitions(){

const select=document.getElementById("competitionSelect");
const list=document.getElementById("competitionList");

select.innerHTML="";
list.innerHTML="";

const snapshot=
await getDocs(collection(db,"competitions"));

snapshot.forEach((d)=>{

const c=d.data();

select.innerHTML += `

<option value="${d.id}">
${c.name}
</option>

`;

list.innerHTML += `

<div class="item">

<strong>${c.name}</strong>

<br>

${c.place}

<br>

${c.from} bis ${c.to}

</div>

`;

});

loadCategories();
loadSkaters();
loadResults();

}

async function loadCategories(){

const competitionId=
document.getElementById("competitionSelect").value;

const list=document.getElementById("categoryList");
const select=document.getElementById("skaterCategory");

list.innerHTML="";
select.innerHTML="";

const q=query(
collection(db,"categories"),
where("competitionId","==",competitionId)
);

const snapshot=await getDocs(q);

snapshot.forEach((d)=>{

const c=d.data();

list.innerHTML += `

<div class="item">
${c.category}
</div>

`;

select.innerHTML += `

<option value="${c.category}">
${c.category}
</option>

`;

});

}

async function loadSkaters(){

const competitionId=
document.getElementById("competitionSelect").value;

const list=document.getElementById("skaterList");
const select=document.getElementById("scoreSkater");

list.innerHTML="";
select.innerHTML="";

const q=query(
collection(db,"skaters"),
where("competitionId","==",competitionId)
);

const snapshot=await getDocs(q);

snapshot.forEach((d)=>{

const s=d.data();

list.innerHTML += `

<div class="item">

${s.start} - ${s.name}

<br>

${s.club}

<br>

${s.category}

</div>

`;

select.innerHTML += `

<option value="${s.name}">
${s.start} - ${s.name}
</option>

`;

});

}

async function loadResults(){

const competitionId=
document.getElementById("competitionSelect").value;

const list=document.getElementById("resultList");
const podium=document.getElementById("podium");

list.innerHTML="";
podium.innerHTML="";

const skaterQuery=query(
collection(db,"skaters"),
where("competitionId","==",competitionId)
);

const skaterSnapshot=
await getDocs(skaterQuery);

let skaterNames=[];

skaterSnapshot.forEach((d)=>{

skaterNames.push(d.data().name);

});

const scoreSnapshot=
await getDocs(collection(db,"scores"));

let results=[];

scoreSnapshot.forEach((d)=>{

const r=d.data();

if(skaterNames.includes(r.skater)){

results.push(r);

}

});

results.sort((a,b)=>b.total-a.total);

results.forEach((r,i)=>{

list.innerHTML += `

<div class="item"
style="border-left:6px solid #22c55e;">

<strong>
Platz ${i+1}
</strong>

<br><br>

${r.skater}

<br>

${r.total}

</div>

`;

});

if(results.length){

podium.innerHTML=`

<div class="podium">

<div class="medal silver">
🥈<br>
${results[1] ? results[1].skater : "-"}
</div>

<div class="medal gold">
🥇<br>
${results[0] ? results[0].skater : "-"}
</div>

<div class="medal bronze">
🥉<br>
${results[2] ? results[2].skater : "-"}
</div>

</div>

`;

}

}

window.downloadPDF = async function(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

let y = 20;

doc.setFontSize(18);

doc.text("RollArt Ergebnisse",20,y);

y += 20;

document
.querySelectorAll("#resultList .item")
.forEach((item)=>{

doc.text(item.innerText,20,y);

y += 20;

});

doc.save("RollArt-Ergebnisse.pdf");

};

async function loadClubs(){

const select=
document.getElementById("clubSelect");

select.innerHTML=`

<option value="">
Verein auswählen
</option>

`;

const snapshot=
await getDocs(collection(db,"clubs"));

snapshot.forEach((d)=>{

const c=d.data();

select.innerHTML += `

<option value="${c.name}">
${c.name}
</option>

`;

});

}

document
.getElementById("competitionSelect")
.addEventListener("change",()=>{

loadCategories();
loadSkaters();
loadResults();

});

fillDeductionDropdowns();

loadCompetitions();

loadClubs();

loadResults();

setInterval(()=>{

loadResults();
loadSkaters();

},3000);

</script>

</body>
</html>
```
