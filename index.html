<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Live</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color"
content="#dc2626">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1700px;
margin:auto;
padding:10px;
}

.header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:14px;
}

.logo{
width:60px;
height:60px;
background:white;
padding:6px;
border-radius:14px;
}

.title{
font-size:26px;
font-weight:bold;
}

.clock{
font-size:14px;
color:#cbd5e1;
margin-top:4px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.liveTitle{
font-size:14px;
color:#cbd5e1;
margin-bottom:10px;
}

.runnerName{
font-size:28px;
font-weight:bold;
line-height:1.2;
}

.runnerClub{
font-size:16px;
margin-top:6px;
color:#cbd5e1;
}

.runnerCategory{
margin-top:8px;
font-size:16px;
font-weight:bold;
color:#60a5fa;
}

.scoreGrid{
display:grid;
grid-template-columns:
repeat(4,1fr);
gap:10px;
margin-top:16px;
}

.scoreCard{
background:#334155;
padding:10px;
border-radius:14px;
text-align:center;
}

.scoreLabel{
font-size:12px;
color:#cbd5e1;
margin-bottom:6px;
}

.scoreValue{
font-size:24px;
font-weight:bold;
}

.totalCard{
background:
linear-gradient(
135deg,
#2563eb,
#7c3aed
);
}

.placeBox{
margin-top:12px;
padding:10px;
border-radius:14px;
font-size:22px;
font-weight:bold;
text-align:center;
background:#16a34a;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
font-size:12px;
line-height:1.4;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{
opacity:0.7;
}

.runnerGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));
gap:8px;
}

.categoryTitle{
background:#1e40af;
padding:10px;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
line-height:1.5;
}

.medal{
font-size:18px;
font-weight:bold;
}

.archiveItem{
background:#1e293b;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

@media(max-width:700px){

.scoreGrid{
grid-template-columns:
repeat(2,1fr);
}

.runnerGrid{
grid-template-columns:
repeat(2,1fr);
}

.runnerName{
font-size:22px;
}

}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",

authDomain:
"rollart-score-5319a.firebaseapp.com",

projectId:
"rollart-score-5319a",

storageBucket:
"rollart-score-5319a.firebasestorage.app",

messagingSenderId:
"658963624980",

appId:
"1:658963624980:web:2e4d153f5df087c4f42301"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let archiveData = [];

function updateClock(){

const now = new Date();

document.getElementById(
"clock"
).innerHTML =

"🕒 " +

now.toLocaleTimeString(
"de-DE",
{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
}
);

}

function medal(place){

if(place==1)
return "🥇";

if(place==2)
return "🥈";

if(place==3)
return "🥉";

return "🏆";

}

function renderLive(data){

const competition =
data?.competition || {};

const runner =
data?.runner || {};

document.getElementById(
"competitionInfo"
).innerHTML =

`
📍 ${competition.place || "-"}
<br>
📅 ${competition.from || "-"}
 -
${competition.to || "-"}
`;

if(runner?.id){

document.getElementById(
"runnerName"
).innerHTML =
runner.name || "-";

document.getElementById(
"runnerClub"
).innerHTML =
runner.club || "-";

document.getElementById(
"runnerCategory"
).innerHTML =
runner.category || "-";

document.getElementById(
"scoreA"
).innerHTML =
runner.aScore || 0;

document.getElementById(
"scoreB"
).innerHTML =
runner.bScore || 0;

document.getElementById(
"total"
).innerHTML =
runner.total || 0;

document.getElementById(
"placeBox"
).innerHTML =

medal(runner.place)
+
" Platz "
+
(runner.place || "-");

}else{

document.getElementById(
"runnerName"
).innerHTML =
competition.finished
?

"🏁 Wettbewerb beendet"

:

"Kein aktiver Läufer";

}

renderAllRunners(
competition
);

}

function renderAllRunners(
competition
){

const output =
document.getElementById(
"allRunners"
);

if(!competition.runners){

output.innerHTML =
"Keine Läufer";

return;

}

const categories = {};

competition.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

output.innerHTML = "";

Object.keys(categories).forEach(cat=>{

output.innerHTML += `

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort((a,b)=>{

if(competition.finished){

return Number(a.place)-Number(b.place);

}

return Number(a.start)-Number(b.start);

})

.map(r=>`

<div class="resultItem

${r.liveActive?"live":""}

${r.confirmed?"done":""}

">

<div class="medal">

${medal(r.place)}

${r.place || r.start}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

<br>

`;

});

}

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML = "";

archiveData.forEach(comp=>{

const winners =

[...comp.runners]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.slice(0,3);

output.innerHTML += `

<div class="archiveItem">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<br><br>

${winners.map(w=>`

${medal(w.place)}
${w.name}
(${w.total})

<br>

`).join("")}

</div>

`;

});

}

onSnapshot(

doc(db,"rollart","live"),

(snapshot)=>{

if(snapshot.exists()){

renderLive(
snapshot.data()
);

}

}

);

onSnapshot(

doc(db,"rollart","database"),

(snapshot)=>{

if(snapshot.exists()){

archiveData =
snapshot.data()
.archivedCompetitions || [];

renderArchive();

}

}

);

setInterval(
updateClock,
1000
);

updateClock();

</script>

</head>

<body>

<div class="app">

<div class="header">

<img
src="./icon-512.png"
class="logo">

<div>

<div class="title">
🏆 RollArt Live
</div>

<div
id="competitionInfo"
class="clock">

Kein Wettbewerb

</div>

<div
id="clock"
class="clock">

🕒 --:--

</div>

</div>

</div>

<div class="card">

<div class="liveTitle">
🔴 AKTUELLER LÄUFER
</div>

<div
id="runnerName"
class="runnerName">

-

</div>

<div
id="runnerClub"
class="runnerClub">

-

</div>

<div
id="runnerCategory"
class="runnerCategory">

-

</div>

<div class="scoreGrid">

<div class="scoreCard">

<div class="scoreLabel">
⭐ Technik
</div>

<div
id="scoreA"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
🎨 Kunst
</div>

<div
id="scoreB"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard totalCard">

<div class="scoreLabel">
🏆 Gesamt
</div>

<div
id="total"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
🏅 Platz
</div>

<div
id="placeBox"
class="scoreValue">

-

</div>

</div>

</div>

</div>

<div class="card">

<div class="liveTitle">
👥 Kategorien & Ergebnisse
</div>

<div id="allRunners"></div>

</div>

<div class="card">

<div class="liveTitle">
📂 Archivierte Wettbewerbe
</div>

<div id="archiveList"></div>

</div>

</div>

</body>
</html>
