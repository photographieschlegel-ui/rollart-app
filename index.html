<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
padding:0;
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
}

.app{
max-width:1800px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.live-banner{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:20px;
border-radius:20px;
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab{
background:#1e293b;
padding:12px 20px;
border-radius:14px;
cursor:pointer;
user-select:none;
}

.tab:hover{
background:#334155;
}

.card{
background:#1e293b;
border-radius:20px;
padding:20px;
margin-top:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:12px;
}

.runner{
border-left:5px solid #22c55e;
}

.category{
border-left:5px solid #3b82f6;
}

.score{
border-left:5px solid #f59e0b;
}

button,input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:none;
background:#475569;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.success{
background:linear-gradient(135deg,#16a34a,#22c55e)!important;
}

.danger{
background:linear-gradient(135deg,#dc2626,#ef4444)!important;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

.categoryLabel{
background:#2563eb;
display:inline-block;
padding:6px 10px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="live-banner">
LIVE WETTKAMPF SYSTEM
</div>

<div class="tabs">

<div class="tab" onclick="showTab('competitionTab')">
🏟 Wettbewerb
</div>

<div class="tab" onclick="showTab('pdfTab')">
📄 PDF Import
</div>

<div class="tab" onclick="showTab('categoryTab')">
🕒 Kategorien
</div>

<div class="tab" onclick="showTab('runnerTab')">
👥 Läufer
</div>

<div class="tab" onclick="showTab('scoreTab')">
⭐ Wertung
</div>

<div class="tab" onclick="showTab('resultTab')">
🏆 Ergebnisse
</div>

</div>

<!-- Wettbewerb -->

<div id="competitionTab">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>

<input type="date"
id="competitionFrom">

<label>Bis</label>

<input type="date"
id="competitionTo">

<button class="success"
onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

<div id="competitionOutput"></div>

</div>

</div>

<!-- PDF -->

<div id="pdfTab" style="display:none;">

<div class="card">

<h2>📄 PDF Import</h2>

<input type="file"
id="pdfUpload"
accept=".pdf">

<button onclick="readPDF()">
PDF analysieren
</button>

<button class="success"
onclick="saveImportedData()">

💾 Import speichern

</button>

<div id="pdfInfo"></div>

</div>

</div>

<!-- Kategorien -->

<div id="categoryTab" style="display:none;">

<div class="card">

<h2>🕒 Kategorien</h2>

<button class="success"
onclick="addCategory()">

+ Kategorie hinzufügen

</button>

<div id="categoryOutput"
class="grid"></div>

</div>

</div>

<!-- Läufer -->

<div id="runnerTab" style="display:none;">

<div class="card">

<h2>👥 Läufer</h2>

<button class="success"
onclick="addRunner()">

+ Läufer hinzufügen

</button>

<div id="runnerOutput"
class="grid"></div>

</div>

</div>

<!-- Wertung -->

<div id="scoreTab" style="display:none;">

<div class="card">

<h2>⭐ Punkte & Abzüge</h2>

<div id="scoreOutput"
class="grid"></div>

</div>

</div>

<!-- Ergebnisse -->

<div id="resultTab" style="display:none;">

<div class="card">

<h2>🏆 Ergebnisse</h2>

<button class="success"
onclick="calculateRanking()">

🏆 Plätze berechnen

</button>

<button class="success"
onclick="exportPDF()">

📄 Ergebnisse als PDF speichern

</button>

<div id="resultOutput"></div>

</div>

</div>

</div>

<script>

let runners = [];
let categories = [];

let competition = {
name:"",
place:"",
from:"",
to:""
};

function showTab(tabId){

const tabs = [
"competitionTab",
"pdfTab",
"categoryTab",
"runnerTab",
"scoreTab",
"resultTab"
];

for(let i=0;i<tabs.length;i++){

const el =
document.getElementById(tabs[i]);

if(el){
el.style.display = "none";
}

}

const active =
document.getElementById(tabId);

if(active){
active.style.display = "block";
}

}

function saveCompetition(){

competition = {

name:
document.getElementById("competitionName").value || "",

place:
document.getElementById("competitionPlace").value || "",

from:
document.getElementById("competitionFrom").value || "",

to:
document.getElementById("competitionTo").value || ""

};

localStorage.setItem(
"rollart_competition",
JSON.stringify(competition)
);

document.getElementById("competitionOutput").innerHTML = `

<div class="item">

<h3>
🏆 ${competition.name}
</h3>

📍 ${competition.place}

<br><br>

📅 ${competition.from} bis ${competition.to}

<br><br>

✅ Wettbewerb gespeichert

</div>

`;

alert("✅ Wettbewerb gespeichert");

}

async function readPDF(){

const file =
document.getElementById("pdfUpload").files[0];

if(!file){

alert("Bitte PDF auswählen");
return;

}

const reader = new FileReader();

reader.onload = async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let fullText = "";

for(let pageNum=1;
pageNum<=pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item=>item.str)
.join(" ");

fullText += " " + text;

}

analyzePDF(fullText);

};

reader.readAsArrayBuffer(file);

}

function analyzePDF(text){

runners = [];
categories = [];

document.getElementById("pdfInfo").innerHTML = `

<div class="item">

✅ PDF importiert

<br><br>

⚠ PDF Parser aktivieren

</div>

`;

renderCategories();
renderRunners();
renderScores();

}

function addCategory(){

categories.push({

id:Date.now()+Math.random(),
name:"",
begin:"",
end:""

});

renderCategories();
renderRunners();

}

function renderCategories(){

const output =
document.getElementById("categoryOutput");

output.innerHTML = "";

categories.forEach(cat=>{

output.innerHTML += `

<div class="item category">

<label>Name</label>

<input
value="${cat.name}"
onchange="updateCategory(${cat.id},'name',this.value)">

<label>Beginn</label>

<input
value="${cat.begin || ''}"
onchange="updateCategory(${cat.id},'begin',this.value)">

<label>Ende</label>

<input
value="${cat.end || ''}"
onchange="updateCategory(${cat.id},'end',this.value)">

<button class="danger"
onclick="deleteCategory(${cat.id})">

Kategorie löschen

</button>

</div>

`;

});

}

function addRunner(){

runners.push({

id:Date.now()+Math.random(),
start:"",
name:"",
club:"",
category:"",
technik:0,
kunst:0,
abzug:0,
gesamt:0

});

renderRunners();
renderScores();

}

function renderRunners(){

const output =
document.getElementById("runnerOutput");

output.innerHTML = "";

runners.forEach(runner=>{

output.innerHTML += `

<div class="item runner">

<label>Startnummer</label>

<input
value="${runner.start}"
onchange="updateRunner(${runner.id},'start',this.value)">

<label>Name</label>

<input
value="${runner.name}"
onchange="updateRunner(${runner.id},'name',this.value)">

<label>Verein</label>

<input
value="${runner.club}"
onchange="updateRunner(${runner.id},'club',this.value)">

<label>Kategorie</label>

<select
onchange="updateRunner(${runner.id},'category',this.value)">

<option value="">
Keine Kategorie
</option>

${categories.map(cat=>`

<option
value="${cat.name}"
${runner.category===cat.name ? "selected" : ""}>

${cat.name}

</option>

`).join("")}

</select>

<button class="danger"
onclick="deleteRunner(${runner.id})">

Läufer löschen

</button>

</div>

`;

});

}

function renderScores(){

const output =
document.getElementById("scoreOutput");

output.innerHTML = "";

runners.forEach(runner=>{

runner.gesamt =
(
Number(runner.technik) +
Number(runner.kunst)
) -
Number(runner.abzug);

output.innerHTML += `

<div class="item score">

<div class="categoryLabel">
${runner.category || 'Keine Kategorie'}
</div>

<h3>${runner.name}</h3>

🏢 ${runner.club}

<label>⭐ Technik</label>

<input type="number"
step="0.1"
value="${runner.technik}"
onchange="updateRunner(${runner.id},'technik',this.value)">

<label>🎨 Kunst</label>

<input type="number"
step="0.1"
value="${runner.kunst}"
onchange="updateRunner(${runner.id},'kunst',this.value)">

<label>❌ Abzüge</label>

<input type="number"
step="0.1"
value="${runner.abzug}"
onchange="updateRunner(${runner.id},'abzug',this.value)">

<div class="item">

🏆 Gesamt:
${runner.gesamt.toFixed(2)}

</div>

</div>

`;

});

}

function calculateRanking(){

const output =
document.getElementById("resultOutput");

output.innerHTML = "";

const sorted =
[...runners]
.sort((a,b)=>b.gesamt-a.gesamt);

sorted.forEach((runner,index)=>{

output.innerHTML += `

<div class="item">

<h3>${index+1}. Platz</h3>

👤 ${runner.name}

<br>

🏢 ${runner.club}

<br>

📂 ${runner.category}

<br><br>

🏆 ${runner.gesamt.toFixed(2)} Punkte

</div>

`;

});

}

function exportPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

let y = 20;

doc.text(
competition.name || "RollArt Wettbewerb",
20,
y
);

y += 10;

const sorted =
[...runners]
.sort((a,b)=>b.gesamt-a.gesamt);

sorted.forEach((runner,index)=>{

doc.text(
`${index+1}. ${runner.name} - ${runner.gesamt.toFixed(2)} Punkte`,
20,
y
);

y += 10;

if(y > 270){

doc.addPage();
y = 20;

}

});

doc.save("RollArt-Ergebnisse.pdf");

}

function saveImportedData(){

localStorage.setItem(
"rollart_runners",
JSON.stringify(runners)
);

localStorage.setItem(
"rollart_categories",
JSON.stringify(categories)
);

alert("✅ Import gespeichert");

}

window.onload = function(){

const savedCompetition =
localStorage.getItem("rollart_competition");

const savedRunners =
localStorage.getItem("rollart_runners");

const savedCategories =
localStorage.getItem("rollart_categories");

if(savedCompetition){

competition =
JSON.parse(savedCompetition);

document.getElementById("competitionName").value =
competition.name || "";

document.getElementById("competitionPlace").value =
competition.place || "";

document.getElementById("competitionFrom").value =
competition.from || "";

document.getElementById("competitionTo").value =
competition.to || "";

}

if(savedRunners){
runners = JSON.parse(savedRunners);
}

if(savedCategories){
categories = JSON.parse(savedCategories);
}

renderCategories();
renderRunners();
renderScores();

showTab("competitionTab");

};

function updateCategory(id,field,value){

const cat =
categories.find(c=>c.id===id);

if(!cat) return;

cat[field] = value;

renderRunners();

}

function deleteCategory(id){

categories =
categories.filter(c=>c.id!==id);

renderCategories();
renderRunners();

}

function updateRunner(id,field,value){

const runner =
runners.find(r=>r.id===id);

if(!runner) return;

runner[field] = value;

renderScores();

}

function deleteRunner(id){

runners =
runners.filter(r=>r.id!==id);

renderRunners();
renderScores();

}

</script>

</body>
</html>
