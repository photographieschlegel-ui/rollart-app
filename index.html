<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Score Pro</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1800px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
border:none;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

input,
select,
textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}

textarea{
min-height:350px;
resize:vertical;
}

.scoreGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}

.openButton{
width:100%;
margin-top:10px;
background:#16a34a;
color:white;
}

.editButton{
width:100%;
margin-top:10px;
background:#ca8a04;
color:white;
}

.saveScoreButton{
width:100%;
margin-top:15px;
background:#2563eb;
color:white;
}

.liveBox{
background:#0f766e;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.bigText{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.infoBox{
background:#1d4ed8;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.placeholder{
border:2px dashed #64748b;
padding:20px;
border-radius:16px;
margin-top:15px;
text-align:center;
color:#cbd5e1;
}

.scoreBox{
margin-top:15px;
padding:15px;
background:#1e293b;
border-radius:14px;
}

</style>

</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
🏟 Wettbewerbe
</button>

<button onclick="showPage('detailPage')">
📂 Wettbewerb
</button>

<button onclick="showPage('livePage')">
⏱ Live
</button>

</div>

<!-- Wettbewerbe -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Wettbewerb</h2>

<input type="hidden" id="editCompetitionId">

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>

<input type="date"
id="competitionFrom">

<label>Bis</label>

<input type="date"
id="competitionTo">

<button class="mainButton"
onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Gespeicherte Wettbewerbe</h2>

<div id="competitionList"
class="grid"></div>

</div>

</div>

<!-- Wettbewerb -->

<div id="detailPage" class="page">

<div class="card">

<h2>📂 Aktiver Wettbewerb</h2>

<div id="activeCompetition"></div>

</div>

<div class="card">

<h2>📋 Wettbewerbstext einfügen</h2>

<textarea
id="competitionText"
placeholder="Block aus PDF hier einfügen..."></textarea>

<button class="mainButton"
onclick="parseCompetitionText()">

📥 Block importieren

</button>

<div id="importInfo"></div>

</div>

<div class="card">

<h2>🕒 Kategorien</h2>

<input type="text"
id="newCategoryName"
placeholder="Neue Kategorie">

<button class="mainButton"
onclick="addCategory()">

➕ Kategorie hinzufügen

</button>

<div id="categoryList"
class="grid"></div>

</div>

<div class="card">

<h2>👥 Läufer & Wertung</h2>

<div id="runnerList"
class="grid"></div>

</div>

</div>

<!-- LIVE -->

<div id="livePage" class="page">

<div class="liveBox">

<h2>⏱ Live Wettbewerbsmodus</h2>

<div id="liveClock"></div>

<label>Zeitkorrektur Minuten</label>

<input
type="number"
id="timeOffset"
value="0">

<button class="mainButton"
onclick="updateLiveMode()">

🔄 Live aktualisieren

</button>

</div>

<div class="liveBox">

<h2>🏁 Aktuelle Kategorie</h2>

<div id="liveCategory"
class="bigText">
-
</div>

</div>

<div class="liveBox">

<h2>👤 Aktueller Läufer</h2>

<div id="liveRunner"
class="bigText">
-
</div>

</div>

<div class="liveBox">

<h2>➡ Nächster Läufer</h2>

<div id="nextRunner"
class="bigText">
-
</div>

</div>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;
let liveRunnerIndex = 0;

/* Seiten */

function showPage(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{
page.style.display = "none";
});

document.getElementById(pageId)
.style.display = "block";

if(pageId === "livePage"){

updateLiveMode();

}

}

/* Wettbewerb speichern */

function saveCompetition(){

const editId =
document.getElementById("editCompetitionId").value;

const name =
document.getElementById("competitionName")
.value
.trim();

if(name === ""){

alert("Bitte Wettbewerb eingeben");
return;

}

if(editId){

const competition =
competitions.find(c => c.id == editId);

competition.name = name;
competition.place =
document.getElementById("competitionPlace").value;

competition.from =
document.getElementById("competitionFrom").value;

competition.to =
document.getElementById("competitionTo").value;

}else{

competitions.push({

id:Date.now(),

name:name,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value,

categories:[],
runners:[]

});

}

saveCompetitions();

renderCompetitions();

clearCompetitionForm();

}

/* Wettbewerb */

function openCompetition(id){

activeCompetition =
competitions.find(c => c.id === id);

saveCompetitions();

renderCompetitions();

renderActiveCompetition();

showPage("detailPage");

}

function editCompetition(id){

const competition =
competitions.find(c => c.id === id);

if(!competition) return;

document.getElementById("editCompetitionId").value =
competition.id;

document.getElementById("competitionName").value =
competition.name;

document.getElementById("competitionPlace").value =
competition.place;

document.getElementById("competitionFrom").value =
competition.from;

document.getElementById("competitionTo").value =
competition.to;

}

function deleteCompetition(id){

if(!confirm("Wettbewerb löschen?"))
return;

competitions =
competitions.filter(c => c.id !== id);

saveCompetitions();

renderCompetitions();

}

/* Anzeigen */

function renderCompetitions(){

const output =
document.getElementById("competitionList");

output.innerHTML = "";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>${comp.name}</h3>

📍 ${comp.place || "-"}

<br><br>

📅 ${comp.from || "-"} bis ${comp.to || "-"}

<button class="openButton"
onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button class="editButton"
onclick="editCompetition(${comp.id})">

✏ Bearbeiten

</button>

<button class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

function renderActiveCompetition(){

const output =
document.getElementById("activeCompetition");

if(!activeCompetition){

output.innerHTML =
`<div class="placeholder">
Kein Wettbewerb ausgewählt
</div>`;

return;

}

output.innerHTML = `

<div class="infoBox">

<h2>${activeCompetition.name}</h2>

📍 ${activeCompetition.place || "-"}

<br><br>

📅 ${activeCompetition.from || "-"}
bis
${activeCompetition.to || "-"}

</div>

`;

renderCategories();
renderRunners();

}

/* TEXT IMPORT */

function parseCompetitionText(){

if(!activeCompetition){

alert("Bitte Wettbewerb öffnen");
return;

}

const text =
document.getElementById("competitionText").value;

const lines =
text
.split("\n")
.map(line=>line.trim())
.filter(line=>line !== "");

let currentCategory = null;

const knownClubs = [

"SSG Ronsdorf",
"RRD Wuppertal",
"Wattenscheider RSC",
"TG Westhofen",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen"

];

lines.forEach(line=>{

const categoryMatch =
line.match(
/(\d{2}:\d{2})\s+(\d{2}:\d{2}).+?([A-Za-zÄÖÜäöüß0-9\.\- ]+)$/
);

if(categoryMatch){

const name =
categoryMatch[3]
.replace(/• Startfolge Kür/gi,"")
.trim();

let existing =
activeCompetition.categories.find(
c => c.name === name
);

if(existing){

currentCategory = existing;

}else{

currentCategory = {

id:Date.now()+Math.random(),

begin:categoryMatch[1],
end:categoryMatch[2],
name:name

};

activeCompetition.categories.push(currentCategory);

}

return;

}

const runnerMatch =
line.match(/^(\d+)\s+(.+)$/);

if(runnerMatch && currentCategory){

let start = runnerMatch[1];
let rest = runnerMatch[2];

let club = "";
let name = rest;

knownClubs.forEach(c=>{

if(rest.includes(c)){

club = c;

name =
rest
.replace(c,"")
.trim();

}

});

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:start,
name:name,
club:club,

category:currentCategory.name,
categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",
b1:"",
b2:"",
b3:"",
deductionNumber:"",
deduction:"",
total:""

});

}

});

saveCompetitions();

renderCategories();
renderRunners();

document.getElementById("competitionText").value = "";

document.getElementById("importInfo").innerHTML = `

<div class="item">

✅ Block importiert

<br><br>

🕒 Kategorien:
${activeCompetition.categories.length}

<br>

👥 Läufer:
${activeCompetition.runners.length}

</div>

`;

}

/* Kategorien */

function addCategory(){

const name =
document.getElementById("newCategoryName")
.value
.trim();

if(name === "") return;

activeCompetition.categories.push({

id:Date.now()+Math.random(),

name:name,
begin:"--:--",
end:"--:--"

});

saveCompetitions();

renderCategories();

}

function renderCategories(){

const output =
document.getElementById("categoryList");

output.innerHTML = "";

if(!activeCompetition) return;

activeCompetition.categories.forEach(cat=>{

output.innerHTML += `

<div class="item">

<h3>${cat.name}</h3>

🕒 ${cat.begin} - ${cat.end}

</div>

`;

});

}

/* Wertung aktiv? */

function scoringEnabled(category){

const scoringCategories = [

"Figurenläufer",
"Kunstläufer",
"Nachwuchs",
"Cup",
"Schüler",
"Jugend",
"Meisterklasse"

];

return scoringCategories.some(c =>
category.includes(c)
);

}

/* Läufer */

function renderRunners(){

const output =
document.getElementById("runnerList");

output.innerHTML = "";

if(!activeCompetition) return;

activeCompetition.runners.forEach(runner=>{

let scoringHtml = "";

if(scoringEnabled(runner.category)){

scoringHtml = `

<div class="scoreBox">

<h4>🏅 Wertung A</h4>

<div class="scoreGrid">

<input id="a1_${runner.id}" type="number" step="0.01" placeholder="A1" value="${runner.a1 || ""}">
<input id="a2_${runner.id}" type="number" step="0.01" placeholder="A2" value="${runner.a2 || ""}">
<input id="a3_${runner.id}" type="number" step="0.01" placeholder="A3" value="${runner.a3 || ""}">

</div>

<h4>🏅 Wertung B</h4>

<div class="scoreGrid">

<input id="b1_${runner.id}" type="number" step="0.01" placeholder="B1" value="${runner.b1 || ""}">
<input id="b2_${runner.id}" type="number" step="0.01" placeholder="B2" value="${runner.b2 || ""}">
<input id="b3_${runner.id}" type="number" step="0.01" placeholder="B3" value="${runner.b3 || ""}">

</div>

<h4>➖ Abzug</h4>

<div class="scoreGrid">

<input
id="deductionNumber_${runner.id}"
type="text"
placeholder="Abzugsnummer"
value="${runner.deductionNumber || ""}">

<input
id="deduction_${runner.id}"
type="number"
step="0.01"
placeholder="Abzug"
value="${runner.deduction || ""}">

<input
type="text"
disabled
placeholder="Gesamt"
value="${runner.total || "0.00"}">

</div>

<button class="saveScoreButton"
onclick="saveRunnerScore('${runner.id}')">

💾 Punkte speichern

</button>

</div>

`;

}

output.innerHTML += `

<div class="item">

<h3>Start ${runner.start}</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

${scoringHtml}

</div>

`;

});

}

/* Punkte */

function saveRunnerScore(id){

const runner =
activeCompetition.runners.find(
r => r.id == id
);

runner.a1 =
Number(document.getElementById("a1_"+id).value) || 0;

runner.a2 =
Number(document.getElementById("a2_"+id).value) || 0;

runner.a3 =
Number(document.getElementById("a3_"+id).value) || 0;

runner.b1 =
Number(document.getElementById("b1_"+id).value) || 0;

runner.b2 =
Number(document.getElementById("b2_"+id).value) || 0;

runner.b3 =
Number(document.getElementById("b3_"+id).value) || 0;

runner.deductionNumber =
document.getElementById("deductionNumber_"+id).value;

runner.deduction =
Number(document.getElementById("deduction_"+id).value) || 0;

const avgA =
(runner.a1 + runner.a2 + runner.a3) / 3;

const avgB =
(runner.b1 + runner.b2 + runner.b3) / 3;

runner.total =
(avgA + avgB - runner.deduction)
.toFixed(2);

saveCompetitions();

renderRunners();

}

/* LIVE */

function updateLiveMode(){

if(!activeCompetition) return;

const now = new Date();

const offset =
Number(document.getElementById("timeOffset").value) || 0;

now.setMinutes(now.getMinutes() + offset);

const currentTime =
now.toTimeString().substring(0,5);

document.getElementById("liveClock").innerHTML =
"🕒 " + currentTime;

let activeCategory = null;

activeCompetition.categories.forEach(cat=>{

if(
currentTime >= cat.begin &&
currentTime <= cat.end
){

activeCategory = cat;

}

});

if(!activeCategory){

document.getElementById("liveCategory").innerHTML =
"Keine aktive Kategorie";

return;

}

document.getElementById("liveCategory").innerHTML =
activeCategory.name;

const runners =
activeCompetition.runners.filter(
r => r.categoryId == activeCategory.id
);

if(runners.length === 0) return;

const currentRunner =
runners[liveRunnerIndex] || runners[0];

const nextRunner =
runners[liveRunnerIndex + 1] || null;

document.getElementById("liveRunner").innerHTML =

`
Start ${currentRunner.start}
<br>
${currentRunner.name}
`;

document.getElementById("nextRunner").innerHTML =

nextRunner ?

`
Start ${nextRunner.start}
<br>
${nextRunner.name}
`

:

"Kein nächster Läufer";

}

/* Speicher */

function saveCompetitions(){

localStorage.setItem(
"rollart_competitions",
JSON.stringify(competitions)
);

localStorage.setItem(
"rollart_active_competition",
JSON.stringify(activeCompetition)
);

}

/* Laden */

function loadCompetitions(){

const saved =
localStorage.getItem(
"rollart_competitions"
);

if(saved){

competitions =
JSON.parse(saved);

}

const savedActive =
localStorage.getItem(
"rollart_active_competition"
);

if(savedActive){

activeCompetition =
JSON.parse(savedActive);

}

}

/* Formular */

function clearCompetitionForm(){

document.getElementById("editCompetitionId").value = "";
document.getElementById("competitionName").value = "";
document.getElementById("competitionPlace").value = "";
document.getElementById("competitionFrom").value = "";
document.getElementById("competitionTo").value = "";

}

/* Start */

window.onload = function(){

loadCompetitions();

renderCompetitions();

renderActiveCompetition();

showPage("competitionPage");

setInterval(updateLiveMode,1000);

};

</script>

</body>
</html>
