<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Live</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#dc2626">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1400px;
margin:auto;
padding:12px;
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:18px;
}

.logo{
width:70px;
height:70px;
object-fit:contain;
background:white;
padding:8px;
border-radius:16px;
}

.title{
font-size:28px;
font-weight:bold;
}

.clock{
font-size:16px;
margin-top:4px;
color:#cbd5e1;
}

.card{
background:#1e293b;
padding:16px;
border-radius:22px;
margin-bottom:16px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.liveTitle{
font-size:16px;
color:#cbd5e1;
margin-bottom:12px;
}

.runnerName{
font-size:30px;
font-weight:bold;
line-height:1.2;
}

.runnerClub{
font-size:18px;
margin-top:8px;
color:#cbd5e1;
}

.runnerCategory{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#60a5fa;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:18px;
}

.scoreCard{
background:#334155;
padding:14px;
border-radius:16px;
text-align:center;
}

.scoreLabel{
font-size:14px;
color:#cbd5e1;
margin-bottom:8px;
}

.scoreValue{
font-size:28px;
font-weight:bold;
}

.totalCard{
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.totalCard .scoreValue{
font-size:40px;
}

.placeBox{
margin-top:16px;
padding:14px;
border-radius:16px;
font-size:24px;
font-weight:bold;
text-align:center;
background:#16a34a;
}

.nextRunner{
font-size:20px;
font-weight:bold;
line-height:1.5;
}

.navButtons{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:18px;
}

.navButtons button{
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
}

.prevBtn{
background:#334155;
}

.currentBtn{
background:#dc2626;
}

.nextBtn{
background:#2563eb;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
line-height:1.4;
font-size:13px;
}

.runnerGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

.categoryBlock{
margin-bottom:20px;
}

.categoryTitle{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#60a5fa;
}

.footer{
text-align:center;
margin-top:24px;
font-size:14px;
color:#94a3b8;
}

@media(max-width:700px){

.header{
flex-direction:column;
text-align:center;
}

.scoreGrid{
grid-template-columns:1fr;
}

.navButtons{
grid-template-columns:1fr;
}

.runnerGrid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let liveData = {};
let allRunners = [];
let currentViewIndex = -1;

function updateClock(){

const now = new Date();

document.getElementById(
"clock"
).innerHTML =
"🕒 " +
now.toLocaleTimeString(
"de-DE",
{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
}
);

}

function clearLive(){

document.getElementById(
"competitionInfo"
).innerHTML =
"Kein aktiver Wettbewerb";

document.getElementById(
"runnerName"
).innerHTML =
"-";

document.getElementById(
"runnerClub"
).innerHTML =
"-";

document.getElementById(
"runnerCategory"
).innerHTML =
"-";

document.getElementById(
"scoreA"
).innerHTML = "0";

document.getElementById(
"scoreB"
).innerHTML = "0";

document.getElementById(
"deduction"
).innerHTML = "0";

document.getElementById(
"total"
).innerHTML = "0";

document.getElementById(
"placeBox"
).innerHTML =
"🏁 Kein aktiver Wettbewerb";

document.getElementById(
"nextRunner"
).innerHTML =
"-";

document.getElementById(
"allRunners"
).innerHTML =
"";

}

function renderRunner(runner){

if(!runner)return;

document.getElementById(
"runnerName"
).innerHTML =
runner.name || "-";

document.getElementById(
"runnerClub"
).innerHTML =
runner.club || "-";

document.getElementById(
"runnerCategory"
).innerHTML =
runner.category || "-";

const aValue =

Number(runner.a1 || 0) +
Number(runner.a2 || 0) +
Number(runner.a3 || 0);

const bValue =

Number(runner.b1 || 0) +
Number(runner.b2 || 0) +
Number(runner.b3 || 0);

document.getElementById(
"scoreA"
).innerHTML =
aValue.toFixed(1);

document.getElementById(
"scoreB"
).innerHTML =
bValue.toFixed(1);

document.getElementById(
"deduction"
).innerHTML =
"-" +
Number(
runner.deduction || 0
).toFixed(1);

document.getElementById(
"total"
).innerHTML =
Number(
runner.total || 0
).toFixed(1);

document.getElementById(
"placeBox"
).innerHTML =
"🏆 Platz " +
(runner.place || "-");

}

function renderAllRunners(){

const output =
document.getElementById(
"allRunners"
);

if(
!liveData?.competition?.runners
){

output.innerHTML =
"Keine Läufer";

return;

}

const runners =
[...liveData.competition.runners]

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const categories = {};

runners.forEach(runner=>{

if(!categories[runner.category]){

categories[runner.category] = [];

}

categories[runner.category].push(
runner
);

});

output.innerHTML = "";

Object.keys(categories).forEach(category=>{

output.innerHTML += `

<div class="categoryBlock">

<div class="categoryTitle">

📂 ${category}

</div>

<div class="runnerGrid">

${categories[category].map(runner=>`

<div class="resultItem">

🕒 Start ${runner.start}

<br><br>

👤 ${runner.name}

<br>

🏢 ${runner.club}

<br><br>

🏆 Platz:
${runner.place || "-"}

<br>

⭐ ${runner.total || 0}

</div>

`).join("")}

</div>

</div>

`;

});

}

function render(data){

if(!data || !data.runner){

clearLive();

return;

}

liveData = data;

const runner =
data.runner || {};

const nextRunner =
data.nextRunner || {};

const competition =
data.competition || {};

allRunners =
[...(competition.runners || [])]

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

currentViewIndex =
allRunners.findIndex(
r=>String(r.id)===String(runner.id)
);

document.getElementById(
"competitionInfo"
).innerHTML =

`
📍 ${competition.place || "-"}
<br>
📅 ${competition.from || "-"}
`;

renderRunner(runner);

document.getElementById(
"nextRunner"
).innerHTML =

nextRunner?.name ?

`
${nextRunner.name}
<br>
${nextRunner.club || "-"}
`

:

"🏁 Letzter Läufer";

renderAllRunners();

}

window.showPreviousRunner = function(){

if(allRunners.length===0)
return;

if(currentViewIndex > 0){

currentViewIndex--;

renderRunner(
allRunners[currentViewIndex]
);

}

}

window.showNextRunner = function(){

if(allRunners.length===0)
return;

if(currentViewIndex < allRunners.length-1){

currentViewIndex++;

renderRunner(
allRunners[currentViewIndex]
);

}

}

window.showCurrentRunner = function(){

render(liveData);

}

onSnapshot(

doc(db,"rollart","live"),

(snapshot)=>{

if(snapshot.exists()){

render(snapshot.data());

}else{

clearLive();

}

}

);

setInterval(
updateClock,
1000
);

updateClock();

</script>

</head>

<body>

<div class="app">

<div class="header">

<img
src="./icon-512.png"
class="logo">

<div>

<div class="title">
🏆 RollArt Live
</div>

<div
id="competitionInfo"
class="clock">

Kein aktiver Wettbewerb

</div>

<div
id="clock"
class="clock">

🕒 --:--

</div>

</div>

</div>

<div class="card">

<div class="liveTitle">
AKTUELLER LÄUFER
</div>

<div
id="runnerName"
class="runnerName">

-

</div>

<div
id="runnerClub"
class="runnerClub">

-

</div>

<div
id="runnerCategory"
class="runnerCategory">

-

</div>

<div class="scoreGrid">

<div class="scoreCard">

<div class="scoreLabel">
⭐ A Wert
</div>

<div
id="scoreA"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
⭐ B Wert
</div>

<div
id="scoreB"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard">

<div class="scoreLabel">
➖ Abzug
</div>

<div
id="deduction"
class="scoreValue">

0

</div>

</div>

<div class="scoreCard totalCard">

<div class="scoreLabel">
🏆 Gesamt
</div>

<div
id="total"
class="scoreValue">

0

</div>

</div>

</div>

<div
id="placeBox"
class="placeBox">

🏆 Platz -

</div>

<div class="navButtons">

<button
onclick="showPreviousRunner()"
class="prevBtn">

⬅ Zurück

</button>

<button
onclick="showCurrentRunner()"
class="currentBtn">

🔴 Aktuell

</button>

<button
onclick="showNextRunner()"
class="nextBtn">

➡ Weiter

</button>

</div>

</div>

<div class="card">

<div class="liveTitle">
➡ NÄCHSTER LÄUFER
</div>

<div
id="nextRunner"
class="nextRunner">

-

</div>

</div>

<div class="card">

<div class="liveTitle">
👥 Alle Kategorien & Läufer
</div>

<div id="allRunners"></div>

</div>

<div class="footer">
TV Walsum-Aldenrade 07
</div>

</div>

</body>
</html>
