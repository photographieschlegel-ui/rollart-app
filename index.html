<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollArt Score Pro</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1400px;
margin:auto;
padding:20px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#1e293b;
border:none;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:16px;
}

.tabs button:hover{
background:#334155;
}

.page{
display:none;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.item{
background:#334155;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:15px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#475569;
color:white;
box-sizing:border-box;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.mainButton{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.deleteButton{
width:100%;
margin-top:10px;
background:#dc2626;
color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="logo">
🏆 RollArt Score Pro
</div>

<div class="tabs">

<button onclick="showPage('competitionPage')">
🏟 Wettbewerbe
</button>

<button onclick="showPage('futurePage')">
📄 Später
</button>

</div>

<!-- Wettbewerbe -->

<div id="competitionPage" class="page">

<div class="card">

<h2>🏟 Neuer Wettbewerb</h2>

<input type="text"
id="competitionName"
placeholder="Wettbewerb">

<input type="text"
id="competitionPlace"
placeholder="Ort">

<label>Von</label>
<input type="date"
id="competitionFrom">

<label>Bis</label>
<input type="date"
id="competitionTo">

<button class="mainButton"
onclick="addCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Gespeicherte Wettbewerbe</h2>

<div id="competitionList"
class="grid"></div>

</div>

</div>

<!-- Platzhalter -->

<div id="futurePage" class="page">

<div class="card">

<h2>📄 Weitere Funktionen</h2>

<div class="item">

Hier kommen später:
<br><br>

• PDF Import
<br>
• Kategorien
<br>
• Läufer
<br>
• Wertung

</div>

</div>

</div>

</div>

<script>

let competitions = [];

function showPage(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{

page.style.display = "none";

});

document.getElementById(pageId)
.style.display = "block";

}

function addCompetition(){

const name =
document.getElementById("competitionName").value.trim();

if(name === ""){

alert("Bitte Wettbewerb eingeben");
return;

}

const competition = {

id:Date.now(),

name:name,

place:
document.getElementById("competitionPlace").value,

from:
document.getElementById("competitionFrom").value,

to:
document.getElementById("competitionTo").value

};

competitions.push(competition);

saveCompetitions();

renderCompetitions();

clearCompetitionForm();

}

function deleteCompetition(id){

const confirmDelete =
confirm("Wettbewerb löschen?");

if(!confirmDelete) return;

competitions =
competitions.filter(c => c.id !== id);

saveCompetitions();

renderCompetitions();

}

function renderCompetitions(){

const output =
document.getElementById("competitionList");

output.innerHTML = "";

if(competitions.length === 0){

output.innerHTML = `

<div class="item">

Noch keine Wettbewerbe gespeichert

</div>

`;

return;

}

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>
🏆 ${comp.name}
</h3>

📍 ${comp.place || "-"}

<br><br>

📅 ${comp.from || "-"}
bis
${comp.to || "-"}

<button class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

function saveCompetitions(){

localStorage.setItem(
"rollart_competitions",
JSON.stringify(competitions)
);

}

function loadCompetitions(){

const saved =
localStorage.getItem(
"rollart_competitions"
);

if(saved){

competitions =
JSON.parse(saved);

}

}

function clearCompetitionForm(){

document.getElementById("competitionName").value = "";
document.getElementById("competitionPlace").value = "";
document.getElementById("competitionFrom").value = "";
document.getElementById("competitionTo").value = "";

}

window.onload = function(){

loadCompetitions();

renderCompetitions();

showPage("competitionPage");

};

</script>

</body>
</html>
