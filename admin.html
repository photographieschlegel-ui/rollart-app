<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;
margin:auto;
padding:20px;
}

.logo{
width:120px;
height:120px;
object-fit:contain;
background:white;
padding:10px;
border-radius:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
}

.item{
background:#334155;
padding:15px;
border-radius:16px;
}

input,
textarea,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
box-sizing:border-box;
}

input,
textarea{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.deleteButton{
background:#dc2626;
}

.nextButton{
background:#16a34a;
}

.resetButton{
background:#dc2626;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.liveRunner{
margin-top:20px;
padding:20px;
background:#334155;
border-radius:20px;
font-size:20px;
line-height:1.8;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveOnline = async function(data){

await setDoc(
doc(db,"rollart","main"),
{
updated:Date.now(),
competitions:data
}
);

};

window.loadOnline = async function(){

const snap =
await getDoc(
doc(db,"rollart","main")
);

if(snap.exists()){

return snap.data().competitions || [];

}

return [];

};

window.saveLive = async function(data){

await setDoc(
doc(db,"rollart","live"),
data
);

};

</script>

</head>

<body>

<div class="app">

<img
src="./icon-512.png"
class="logo">

<div class="card">

<h2>🏆 Wettbewerb</h2>

<input
type="text"
id="competitionName"
placeholder="Wettbewerb">

<input
type="text"
id="competitionPlace"
placeholder="Ort">

<input
type="date"
id="competitionFrom">

<input
type="date"
id="competitionTo">

<button onclick="saveCompetition()">
💾 Wettbewerb speichern
</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div
id="competitionList"
class="grid">
</div>

</div>

<div class="card">

<h2>📥 PDF Import</h2>

<textarea
id="competitionText"
rows="14">
</textarea>

<button onclick="parseCompetitionText()">
📥 Importieren
</button>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div
id="runnerList"
class="grid">
</div>

</div>

<div class="card">

<h2>🔴 Live Status</h2>

<div id="liveInfo"></div>

<div id="liveScoring"></div>

<div
style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
margin-top:20px;
">

<button
class="nextButton"
onclick="startCompetition()">

▶ Wettbewerb starten

</button>

<button
class="nextButton"
onclick="nextRunner()">

➡ Nächster Läufer

</button>

<button
class="resetButton"
onclick="resetCompetition()">

🔄 Wettbewerb zurücksetzen

</button>

</div>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;

const deductions = {
"1":0.3,
"2":0.2,
"3":0.3,
"4":0.2,
"5":0.3,
"6":0.3,
"7":0.3,
"8":0.3,
"9":0.5,
"10":0.5
};

const knownClubs = [

"TV Walsum-Aldenrade 07",
"TG Westhofen",
"RRD Wuppertal",
"Wattenscheider RSC",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen",
"SSG Ronsdorf"

];

async function saveData(){

await saveOnline(competitions);

await updateLive();

}

async function updateLive(){

if(!activeCompetition)
return;

const runners =

activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const currentRunner =
runners.find(
r=>r.liveActive===true
);

if(!currentRunner){

await saveLive({

updated:Date.now(),
runner:null,
nextRunner:null,
competition:activeCompetition

});

return;

}

const currentIndex =
runners.findIndex(
r=>r.id===currentRunner.id
);

await saveLive({

updated:Date.now(),

competition:activeCompetition,

runner:currentRunner,

nextRunner:
runners[currentIndex+1] || null

});

}

async function loadData(){

competitions =
await loadOnline();

renderCompetitions();

}

window.saveCompetition = function(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

from:
document.getElementById(
"competitionFrom"
).value,

to:
document.getElementById(
"competitionTo"
).value,

categories:[],
runners:[]

});

saveData();

renderCompetitions();

};

window.deleteCompetition = async function(id){

competitions =
competitions.filter(
c=>c.id!==id
);

if(
activeCompetition &&
activeCompetition.id===id
){

activeCompetition = null;

await saveLive({

runner:null,
nextRunner:null,
competition:null

});

}

await saveData();

renderCompetitions();

renderRunners();

};

window.openCompetition = function(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();

renderLiveInfo();

renderLiveScoring();

};

window.parseCompetitionText = function(){

if(!activeCompetition)return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

let currentCategory = null;

lines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =
line.match(
/^\d{2}:\d{2}\s+\d{2}:\d{2}/
);

if(categoryMatch){

const parts =
line.split(/\s+/);

const categoryName =
parts.slice(6).join(" ");

const alreadyExists =
activeCompetition.categories.find(
c=>c.name===categoryName
);

if(alreadyExists){

currentCategory = alreadyExists;
return;

}

currentCategory = {

id:Date.now()+Math.random(),

begin: parts[0],
end: parts[1],

duration: parts[2],
warmup: parts[3],

groups: parts[4],
participants: parts[5],

name: categoryName

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(
/^(\d+)\s+(.+)$/
);

if(runnerMatch && currentCategory){

let rest = runnerMatch[2];

let club = "-";
let name = rest;

knownClubs.forEach(c=>{

if(rest.endsWith(c)){

club = c;

name =
rest.replace(c,"").trim();

}

});

const alreadyRunner =
activeCompetition.runners.find(
r=>
r.start===runnerMatch[1] &&
r.categoryId===currentCategory.id
);

if(alreadyRunner)
return;

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:runnerMatch[1],

name:name,
club:club,

category:currentCategory.name,
categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",
b1:"",
b2:"",
b3:"",

deductionNumber:"",
deduction:0,
total:0,
place:"",
confirmed:false,
liveActive:false

});

}

});

saveData();

renderRunners();

};

function updateRanking(categoryId){

const ranking =

activeCompetition.runners

.filter(
r=>r.categoryId===categoryId
)

.sort(
(a,b)=>
Number(b.total)-Number(a.total)
);

ranking.forEach((runner,index)=>{

runner.place = index+1;

});

}

window.saveLiveScore = function(){

const runner =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner)return;

runner.a1 =
parseFloat(
document.getElementById("live_a1").value
) || 0;

runner.a2 =
parseFloat(
document.getElementById("live_a2").value
) || 0;

runner.a3 =
parseFloat(
document.getElementById("live_a3").value
) || 0;

runner.b1 =
parseFloat(
document.getElementById("live_b1").value
) || 0;

runner.b2 =
parseFloat(
document.getElementById("live_b2").value
) || 0;

runner.b3 =
parseFloat(
document.getElementById("live_b3").value
) || 0;

runner.deductionNumber =
document.getElementById(
"live_deduction"
).value;

runner.deduction =
deductions[
runner.deductionNumber
] || 0;

runner.total = Number((

runner.a1 +
runner.a2 +
runner.a3 +

runner.b1 +
runner.b2 +
runner.b3 -

runner.deduction

).toFixed(2));

updateRanking(
runner.categoryId
);

saveData();

renderRunners();

renderLiveInfo();

};

window.startCompetition = function(){

if(!activeCompetition)
return;

const runners =

activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

if(runners.length===0)
return;

activeCompetition.runners.forEach(r=>{
r.liveActive=false;
});

runners[0].liveActive = true;

saveData();

renderLiveInfo();

renderLiveScoring();

renderRunners();

};

window.nextRunner = function(){

if(!activeCompetition)
return;

const runners =
activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

let currentRunner =
runners.find(
r=>r.liveActive===true
);

if(!currentRunner)
return;

currentRunner.confirmed = true;
currentRunner.liveActive = false;

const nextRunner =
runners.find(
r=>!r.confirmed
);

if(nextRunner){

nextRunner.liveActive = true;

}

saveData();

renderLiveInfo();

renderLiveScoring();

renderRunners();

};

window.resetCompetition = function(){

if(!activeCompetition)
return;

activeCompetition.runners.forEach(
runner=>{

runner.confirmed = false;
runner.liveActive = false;

runner.place = "";

runner.total = 0;

runner.a1 = "";
runner.a2 = "";
runner.a3 = "";

runner.b1 = "";
runner.b2 = "";
runner.b3 = "";

runner.deduction = 0;
runner.deductionNumber = "";

}
);

saveData();

renderRunners();

renderLiveInfo();

renderLiveScoring();

};

function renderLiveScoring(){

const output =
document.getElementById(
"liveScoring"
);

if(!activeCompetition){

output.innerHTML =
"Kein Wettbewerb";

return;

}

const runner =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner){

output.innerHTML =
"🏁 Kein aktiver Läufer";

return;

}

output.innerHTML = `

<div class="item">

<h3>${runner.name}</h3>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

<div class="scoreGrid">

<input id="live_a1" placeholder="A1">
<input id="live_a2" placeholder="A2">
<input id="live_a3" placeholder="A3">

</div>

<div class="scoreGrid">

<input id="live_b1" placeholder="B1">
<input id="live_b2" placeholder="B2">
<input id="live_b3" placeholder="B3">

</div>

<input
id="live_deduction"
placeholder="Abzugsschlüssel">

<button onclick="saveLiveScore()">

💾 Live Wertung speichern

</button>

</div>

`;

}

function renderLiveInfo(){

const output =
document.getElementById(
"liveInfo"
);

if(!activeCompetition){

output.innerHTML =
"Kein Wettbewerb";

return;

}

const current =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!current){

output.innerHTML =
"🏁 Wettbewerb beendet";

return;

}

output.innerHTML = `

<div class="liveRunner">

👤 ${current.name}

<br>

🏢 ${current.club}

<br>

📂 ${current.category}

<br><br>

🏆 Platz:
${current.place || "-"}

<br>

⭐ Gesamt:
${current.total || 0}

</div>

`;

}

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

output.innerHTML = "";

if(!activeCompetition)return;

const sorted =
[...activeCompetition.runners]

.sort(
(a,b)=>{

if(a.category !== b.category){

return a.category.localeCompare(
b.category
);

}

return Number(a.start)-Number(b.start);

});

sorted.forEach(
runner=>{

output.innerHTML += `

<div class="item">

<h3>
🕒 Start ${runner.start}
</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

<br><br>

🏆 Platz:
${runner.place || "-"}

<br>

⭐ Gesamt:
${runner.total || 0}

</div>

`;

});

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML = "";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>${comp.name}</h3>

📍 ${comp.place}

<br><br>

📅 ${comp.from}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

window.onload =
async function(){

await loadData();

};

</script>

</body>
</html>
