<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1700px;
margin:auto;
padding:12px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

.runnerGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));
gap:8px;
}

.scoreGrid{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:8px;
margin-top:8px;
}

input,
button,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:14px;
box-sizing:border-box;
}

input,
textarea,
select{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.nextButton{
background:#16a34a;
}

.finishButton{
background:#ea580c;
}

.resetButton{
background:#7c3aed;
}

.deleteButton{
background:#dc2626;
}

.archiveButton{
background:#0891b2;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
font-size:12px;
line-height:1.5;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{
opacity:0.7;
}

.categoryTitle{
background:#1d4ed8;
padding:10px;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
}

.medal{
font-size:18px;
font-weight:bold;
}

summary{
cursor:pointer;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain:"rollart-score-5319a.firebaseapp.com",
projectId:"rollart-score-5319a",
storageBucket:"rollart-score-5319a.firebasestorage.app",
messagingSenderId:"658963624980",
appId:"1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let competitions = [];
let archivedCompetitions = [];
let activeCompetition = null;

const deductionTable = {

1:0.3,
2:0.2,
3:0.3,
4:0.2,
5:0.3,
6:0.3,
7:0.3,
8:0.3,

9:0.5,
10:0.5,
11:0.3,
12:0.3,
13:0.3,
14:0.3,
15:0.3,
16:0.5,
17:0.2,

18:0.5,
19:0.5,
20:0.5,
21:0.3,
22:0.5,
23:0.2

};

async function saveDatabase(){

await setDoc(
doc(db,"rollart","database"),
{
competitions,
archivedCompetitions
}
);

await updateLive();

}

async function loadDatabase(){

const snap =
await getDoc(
doc(db,"rollart","database")
);

if(snap.exists()){

competitions =
snap.data().competitions || [];

archivedCompetitions =
snap.data().archivedCompetitions || [];

}

renderCompetitions();
renderArchive();

}

async function updateLive(){

if(!activeCompetition)
return;

const currentRunner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

await setDoc(
doc(db,"rollart","live"),
{
competition:
activeCompetition.finished
? null
: activeCompetition,

runner:
currentRunner || null
}
);

}

function medal(place){

if(place==1) return "🥇";
if(place==2) return "🥈";
if(place==3) return "🥉";

return "🏆";

}

function average(a,b,c){

return Number(
(
(a+b+c)/3
).toFixed(2)
);

}

window.saveCompetition =
async function(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

from:
document.getElementById(
"competitionFrom"
).value,

to:
document.getElementById(
"competitionTo"
).value,

defaultScoringSystem:
document.getElementById(
"defaultScoringSystem"
).value,

finished:false,

categories:[],
runners:[]

});

await saveDatabase();

renderCompetitions();

};

window.deleteCompetition =
async function(id){

if(!confirm(
"Wettbewerb wirklich löschen?"
)) return;

competitions =
competitions.filter(
c=>c.id!==id
);

await setDoc(
doc(db,"rollart","live"),
{
competition:null,
runner:null
}
);

await saveDatabase();

renderCompetitions();

};

window.openCompetition =
function(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();
renderLiveScoring();

};

window.archiveCompetition =
async function(id){

const comp =
competitions.find(
c=>c.id===id
);

if(!comp)return;

comp.finished = true;

archivedCompetitions.push(comp);

competitions =
competitions.filter(
c=>c.id!==id
);

await setDoc(
doc(db,"rollart","live"),
{
competition:null,
runner:null
}
);

await saveDatabase();

renderCompetitions();
renderArchive();

};

window.deleteArchiveCompetition =
async function(id){

if(!confirm(
"Archiv wirklich löschen?"
)) return;

archivedCompetitions =
archivedCompetitions.filter(
c=>c.id!==id
);

await saveDatabase();

renderArchive();

};

window.parseCompetitionText =
function(){

if(!activeCompetition)
return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

const fixedLines = [];

let skipNext = false;

for(let i=0;i<lines.length;i++){

if(skipNext){

skipNext = false;
continue;

}

let current =
lines[i].trim();

if(!current) continue;

const next =
lines[i+1]
? lines[i+1].trim()
: "";

if(

current.match(/^\d+\s+/)

&&

next

&&

!next.match(/^\d+\s+/)

&&

!next.match(/^\d{2}:\d{2}/)

){

current =
current + " " + next;

skipNext = true;

}

fixedLines.push(current);

}

let currentCategory = null;
let globalStart = 1;

fixedLines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =
line.match(/^\d{2}:\d{2}/);

if(categoryMatch){

const parts =
line.split(/\s+/);

currentCategory = {

id:Date.now()+Math.random(),

begin:parts[0],
end:parts[1],

name:
parts.slice(6).join(" "),

scoringSystem:
activeCompetition
.defaultScoringSystem || "rollart"

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(/^(\d+)\s+(.+)$/);

if(runnerMatch && currentCategory){

const runnerText =
runnerMatch[2];

let words =
runnerText.split(" ");

let clubStart = -1;

const clubKeywords = [

"TV",
"TG",
"TSV",
"TuS",
"VfL",
"SSC",
"ERC",
"RSC",
"REV",
"RSV",
"ESG",
"RC",
"RRD",
"RESG",
"SSG"

];

for(let i=0;i<words.length;i++){

const w = words[i];

if(

clubKeywords.includes(w)

||

(
i < words.length-1
&&
clubKeywords.includes(
words[i+1]
)
)

||

(
w==="1."
&&
words[i+1]==="RC"
)

){

clubStart = i;
break;

}

}

let name = runnerText;
let club = "-";

if(clubStart > 0){

name =
words
.slice(0,clubStart)
.join(" ");

club =
words
.slice(clubStart)
.join(" ");

}

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:globalStart++,

name:name,

club:club,

category:
currentCategory.name,

categoryId:
currentCategory.id,

scoringSystem:
currentCategory.scoringSystem,

a1:0,
a2:0,
a3:0,

b1:0,
b2:0,
b3:0,

aScore:0,
bScore:0,

deductionNumbers:"",

deduction:0,

total:0,

place:"",

confirmed:false,
liveActive:false

});

}

});

document.getElementById(
"competitionText"
).value="";

saveDatabase();

renderRunners();

};

window.changeCategorySystem =
function(categoryId,value){

const cat =

activeCompetition.categories.find(
c=>c.id==categoryId
);

if(!cat)return;

cat.scoringSystem = value;

activeCompetition.runners.forEach(r=>{

if(r.categoryId==categoryId){

r.scoringSystem = value;

}

});

saveDatabase();

renderRunners();

};

function updateRanking(categoryId){

const ranking =

activeCompetition.runners

.filter(
r=>r.categoryId===categoryId
)

.sort(
(a,b)=>
Number(b.total)-Number(a.total)
);

ranking.forEach((r,i)=>{

r.place = i+1;

});

}

window.saveLiveScore =
function(){

const runner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner)return;

if(runner.scoringSystem==="gesamt"){

runner.total =
parseFloat(
document.getElementById(
"live_total"
).value
) || 0;

}else{

runner.a1 =
parseFloat(
document.getElementById("a1").value
) || 0;

runner.a2 =
parseFloat(
document.getElementById("a2").value
) || 0;

runner.a3 =
parseFloat(
document.getElementById("a3").value
) || 0;

runner.b1 =
parseFloat(
document.getElementById("b1").value
) || 0;

runner.b2 =
parseFloat(
document.getElementById("b2").value
) || 0;

runner.b3 =
parseFloat(
document.getElementById("b3").value
) || 0;

runner.aScore =
average(
runner.a1,
runner.a2,
runner.a3
);

runner.bScore =
average(
runner.b1,
runner.b2,
runner.b3
);

const deductionInput =
document.getElementById(
"deductionNumbers"
).value;

runner.deductionNumbers =
deductionInput;

const deductionNumbers =
deductionInput
.split(",")

.map(n=>parseInt(n.trim()))

.filter(n=>!isNaN(n));

let deduction = 0;

deductionNumbers.forEach(n=>{

if(deductionTable[n]){

deduction +=
deductionTable[n];

}

});

runner.deduction =
Number(
deduction.toFixed(2)
);

runner.total =
Number(
(
runner.aScore +
runner.bScore -
runner.deduction
).toFixed(2)
);

}

updateRanking(
runner.categoryId
);

renderRunners();

nextRunner();

saveDatabase();

};

window.startCompetition =
function(){

if(!activeCompetition)
return;

activeCompetition.runners.forEach(r=>{

r.liveActive=false;

});

const first =

activeCompetition.runners

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
)[0];

if(first){

first.liveActive=true;

}

saveDatabase();

renderRunners();
renderLiveScoring();

};

window.nextRunner =
function(){

if(!activeCompetition)
return;

const runners =

activeCompetition.runners

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const currentIndex =

runners.findIndex(
r=>r.liveActive===true
);

if(currentIndex === -1)
return;

runners[currentIndex].confirmed = true;
runners[currentIndex].liveActive = false;

const nextIndex =
currentIndex + 1;

if(nextIndex < runners.length){

runners[nextIndex].liveActive = true;

}else{

activeCompetition.finished = true;

activeCompetition.runners.forEach(r=>{

r.liveActive = false;

});

}

saveDatabase();

renderRunners();
renderLiveScoring();

};

window.finishCompetition =
async function(){

if(!activeCompetition)
return;

activeCompetition.finished = true;

activeCompetition.runners.forEach(r=>{

r.liveActive = false;

});

await setDoc(
doc(db,"rollart","live"),
{
competition:null,
runner:null
}
);

await saveDatabase();

renderRunners();

renderLiveScoring();

};

window.resetCompetition =
async function(){

if(!confirm(
"Alle Wertungen zurücksetzen?"
)) return;

if(!activeCompetition)
return;

activeCompetition.finished = false;

activeCompetition.runners.forEach(r=>{

r.confirmed=false;
r.liveActive=false;

r.place="";

r.a1=0;
r.a2=0;
r.a3=0;

r.b1=0;
r.b2=0;
r.b3=0;

r.aScore=0;
r.bScore=0;

r.deduction=0;
r.deductionNumbers="";

r.total=0;

});

await setDoc(
doc(db,"rollart","live"),
{
competition:null,
runner:null
}
);

await saveDatabase();

renderRunners();

};

function renderLiveScoring(){

const output =
document.getElementById(
"liveScoring"
);

if(!activeCompetition){

output.innerHTML=
"Kein Wettbewerb";

return;

}

const runner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner){

output.innerHTML=
"🏁 Kein aktiver Läufer";

return;

}

if(runner.scoringSystem==="gesamt"){

output.innerHTML = `

<div class="card">

<b>${runner.name}</b>

<br>

${runner.club || "-"}

<input
id="live_total"
placeholder="Gesamtwertung">

<button onclick="saveLiveScore()">

💾 Speichern

</button>

</div>

`;

return;

}

output.innerHTML = `

<div class="card">

<b>${runner.name}</b>

<br>

${runner.club || "-"}

<br><br>

⭐ Technik

<div class="scoreGrid">

<input id="a1" placeholder="A1">
<input id="a2" placeholder="A2">
<input id="a3" placeholder="A3">

</div>

<br>

🎨 Kunst

<div class="scoreGrid">

<input id="b1" placeholder="B1">
<input id="b2" placeholder="B2">
<input id="b3" placeholder="B3">

</div>

<br>

⚠ Abzugsnummern

<input
id="deductionNumbers"
placeholder="z.B. 1,4,15">

<button onclick="saveLiveScore()">

💾 Speichern

</button>

</div>

`;

}

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

output.innerHTML="";

if(!activeCompetition)
return;

const categories = {};

activeCompetition.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

Object.keys(categories).forEach(cat=>{

output.innerHTML += `

<div class="categoryTitle">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
">

<div>

📂 ${cat}

</div>

<select
style="
max-width:220px;
margin-top:0;
background:#0f172a;
color:white;
"

onchange="changeCategorySystem(
'${categories[cat][0].categoryId}',
this.value
)">

<option
value="rollart"
${categories[cat][0].scoringSystem==="rollart"
?"selected":""}>

RollArt

</option>

<option
value="gesamt"
${categories[cat][0].scoringSystem==="gesamt"
?"selected":""}>

Gesamtwertung

</option>

</select>

</div>

</div>

<div class="runnerGrid">

${categories[cat]

.sort((a,b)=>{

if(
a.place &&
b.place
){

return Number(a.place)-Number(b.place);

}

return Number(a.start)-Number(b.start);

})

.map(r=>`

<div class="resultItem
${r.liveActive?"live":""}
${r.confirmed?"done":""}
">

<div class="medal">

${medal(r.place)}
${r.place || r.start}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

📋 ${r.scoringSystem}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

⚠ Nummern:
${r.deductionNumbers || "-"}

<br>

⚠ Abzug:
${r.deduction || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

<br>

`;

});

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML="";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="resultItem">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<br><br>

📋 ${comp.defaultScoringSystem}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="archiveButton"
onclick="archiveCompetition(${comp.id})">

🏁 Archivieren

</button>

<button
class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML="";

archivedCompetitions.forEach(comp=>{

const categories = {};

comp.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

output.innerHTML += `

<details class="card">

<summary style="
font-size:18px;
font-weight:bold;
">

🏁 ${comp.name}

</summary>

<br>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<br><br>

${Object.keys(categories).map(cat=>`

<details
style="
margin-bottom:12px;
background:#1e293b;
padding:10px;
border-radius:12px;
">

<summary style="
font-weight:bold;
">

📂 ${cat}

</summary>

<br>

<div class="runnerGrid">

${categories[cat]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.map(r=>`

<div class="resultItem">

<div class="medal">

${medal(r.place)}

${r.place || "-"}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

📋 ${r.scoringSystem}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

⚠ Nummern:
${r.deductionNumbers || "-"}

<br>

⚠ Abzug:
${r.deduction || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

</details>

`).join("")}

<br>

<button
class="deleteButton"
onclick="deleteArchiveCompetition(${comp.id})">

🗑 Archiv löschen

</button>

</details>

`;

});

}

window.onload =
async function(){

await loadDatabase();

};

</script>

</head>

<body>

<div class="app">

<div class="card">

<h2>🏆 Wettbewerb</h2>

<input
type="text"
id="competitionName"
placeholder="Wettbewerb">

<input
type="text"
id="competitionPlace"
placeholder="Ort">

<input
type="date"
id="competitionFrom">

<input
type="date"
id="competitionTo">

<select id="defaultScoringSystem">

<option value="rollart">
RollArt
</option>

<option value="gesamt">
Gesamtwertung
</option>

</select>

<button onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div
id="competitionList"
class="grid">
</div>

</div>

<div class="card">

<h2>📥 PDF Import</h2>

<textarea
id="competitionText"
rows="12"
placeholder="PDF Text hier einfügen">
</textarea>

<button onclick="parseCompetitionText()">

📥 Wettbewerb importieren

</button>

</div>

<div class="card">

<h2>🔴 Live Steuerung</h2>

<div id="liveScoring"></div>

<div class="grid">

<button
class="nextButton"
onclick="startCompetition()">

▶ Start

</button>

<button
class="finishButton"
onclick="finishCompetition()">

🏁 Abschließen

</button>

<button
class="resetButton"
onclick="resetCompetition()">

🧪 Reset

</button>

</div>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList"></div>

</div>

<div class="card">

<h2>📂 Archiv</h2>

<div id="archiveList"></div>

</div>

</div>

</body>
</html>
