<!-- ADMIN ARCHIV ANZEIGE KOMPLETT ERSETZEN -->

<div class="card">

<h2>📂 Archiv</h2>

<div
id="archiveList"
class="grid">
</div>

</div>

<script>

window.openArchiveCompetition =
function(id){

const comp =
archivedCompetitions.find(
c=>c.id===id
);

if(!comp)return;

activeCompetition = comp;

renderRunners();

document.getElementById(
"liveScoring"
).innerHTML = `

<div class="card">

🏁 Archivmodus

<br><br>

Dieser Wettbewerb ist abgeschlossen
und kann nicht verändert werden.

</div>

`;

};

window.deleteArchiveCompetition =
async function(id){

if(!confirm(
"Archiv wirklich löschen?"
)) return;

archivedCompetitions =
archivedCompetitions.filter(
c=>c.id!==id
);

await saveDatabase();

renderArchive();

};

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML = "";

archivedCompetitions.forEach(comp=>{

const categories = {};

comp.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category] = [];

}

categories[r.category].push(r);

});

output.innerHTML += `

<div class="card">

<h3>

🏁 ${comp.name}

</h3>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<br><br>

${Object.keys(categories).map(cat=>`

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.map(r=>`

<div class="resultItem">

<div class="medal">

${medal(r.place)}

${r.place || "-"}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

<br>

`).join("")}

<button
class="archiveButton"
onclick="openArchiveCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="archiveButton"
onclick="exportResults(${comp.id})">

📄 Export

</button>

<button
class="deleteButton"
onclick="deleteArchiveCompetition(${comp.id})">

🗑 Archiv löschen

</button>

</div>

`;

});

}

</script>
