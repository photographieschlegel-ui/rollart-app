<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#2563eb">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;

}

.logo{
width:70px;
height:70px;
object-fit:contain;
background:white;
padding:6px;

margin-bottom:14px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
box-shadow:0 0 18px rgba(0,0,0,0.25);
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:10px;
}

.item{
background:#334155;
padding:10px;
border-radius:12px;
font-size:13px;
line-height:1.4;
}

input,
textarea,
button,
select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:14px;
box-sizing:border-box;
}

input,
textarea,
select{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.deleteButton{
background:#dc2626;
}

.nextButton{
background:#16a34a;
}

.finishButton{
background:#ea580c;
}

.resetButton{
background:#7c3aed;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:8px;
}

.liveRunner{
margin-top:10px;
padding:14px;
background:#334155;
border-radius:16px;
font-size:16px;
line-height:1.6;
}

.resultItem{

padding:6px;
border-radius:10px;
line-height:1.3;
font-size:12px;
transition:0.2s;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{

}

.runnerGrid{

.categoryTitle{

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let competitions = [];
let activeCompetition = null;

const deductions = {
"1":0.3,
"2":0.2,
"3":0.3,
"4":0.2,
"5":0.3,
"6":0.3,
"7":0.3,
"8":0.3,
"9":0.5,
"10":0.5
};

const knownClubs = [

"TV Walsum-Aldenrade 07",
"TG Westhofen",
"RRD Wuppertal",
"Wattenscheider RSC",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen",
"SSG Ronsdorf"

];

async function saveOnline(data){

await setDoc(
doc(db,"rollart","main"),
{
updated:Date.now(),
competitions:data
}
);

}

async function loadOnline(){

const snap =
await getDoc(
doc(db,"rollart","main")
);

if(snap.exists()){

return snap.data().competitions || [];

}

return [];

}

async function saveLive(data){

await setDoc(
doc(db,"rollart","live"),
data
);

}

async function saveData(){

await saveOnline(competitions);

await updateLive();

}

async function updateLive(){

if(!activeCompetition)
return;

const runners =

activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const currentRunner =
runners.find(
r=>r.liveActive===true
);

await saveLive({

updated:Date.now(),

competition:activeCompetition,

runner:currentRunner || null,

nextRunner:
currentRunner
?

runners[
runners.findIndex(
r=>r.id===currentRunner.id
)+1
] || null

:

null

});

}

async function loadData(){

competitions =
await loadOnline();

renderCompetitions();

}

window.saveCompetition = function(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

from:
document.getElementById(
"competitionFrom"
).value,

to:
document.getElementById(
"competitionTo"
).value,

finished:false,

categories:[],
runners:[]

});

saveData();

renderCompetitions();

};

window.openCompetition = function(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();

renderLiveInfo();

renderLiveScoring();

};

window.deleteCompetition = async function(id){

competitions =
competitions.filter(
c=>c.id!==id
);

if(
activeCompetition &&
activeCompetition.id===id
){

activeCompetition = null;

await saveLive({

runner:null,
nextRunner:null,
competition:null

});

}

await saveData();

renderCompetitions();

document.getElementById(
"runnerList"
).innerHTML = "";

};

window.finishCompetition =
function(){

if(!activeCompetition)
return;

activeCompetition.finished = true;

activeCompetition.runners.forEach(r=>{

r.liveActive = false;

});

saveData();

renderRunners();

renderLiveInfo();

renderLiveScoring();

};

window.parseCompetitionText = function(){

if(!activeCompetition)return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

let currentCategory = null;

lines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =
line.match(
/^\d{2}:\d{2}\s+\d{2}:\d{2}/
);

if(categoryMatch){

const parts =
line.split(/\s+/);

const categoryName =
parts.slice(6).join(" ");

const alreadyExists =
activeCompetition.categories.find(
c=>c.name===categoryName
);

if(alreadyExists){

currentCategory = alreadyExists;
return;

}

currentCategory = {

id:Date.now()+Math.random(),

begin: parts[0],
end: parts[1],

duration: parts[2],
warmup: parts[3],

groups: parts[4],
participants: parts[5],

name: categoryName

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(
/^(\d+)\s+(.+)$/
);

if(runnerMatch && currentCategory){

let rest = runnerMatch[2];

let club = "-";
let name = rest;

knownClubs.forEach(c=>{

if(rest.endsWith(c)){

club = c;

name =
rest.replace(c,"").trim();

}

});

const alreadyRunner =
activeCompetition.runners.find(
r=>
r.start===runnerMatch[1] &&
r.categoryId===currentCategory.id
);

if(alreadyRunner)
return;

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:runnerMatch[1],

name:name,
club:club,

category:currentCategory.name,
categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",
b1:"",
b2:"",
b3:"",

deductionNumber:"",
deduction:0,
total:0,
place:"",
confirmed:false,
liveActive:false

});

}

});

document.getElementById(
"competitionText"
).value = "";

saveData();

renderRunners();

};

function updateRanking(categoryId){

const ranking =

activeCompetition.runners

.filter(
r=>r.categoryId===categoryId
)

.sort(
(a,b)=>
Number(b.total)-Number(a.total)
);

ranking.forEach((runner,index)=>{

runner.place = index+1;

});

}

window.saveLiveScore = function(){

const runner =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner)return;

runner.a1 =
parseFloat(
document.getElementById("live_a1").value
) || 0;

runner.a2 =
parseFloat(
document.getElementById("live_a2").value
) || 0;

runner.a3 =
parseFloat(
document.getElementById("live_a3").value
) || 0;

runner.b1 =
parseFloat(
document.getElementById("live_b1").value
) || 0;

runner.b2 =
parseFloat(
document.getElementById("live_b2").value
) || 0;

runner.b3 =
parseFloat(
document.getElementById("live_b3").value
) || 0;

runner.deductionNumber =
document.getElementById(
"live_deduction"
).value;

runner.deduction =
deductions[
runner.deductionNumber
] || 0;

runner.total = Number((

runner.a1 +
runner.a2 +
runner.a3 +

runner.b1 +
runner.b2 +
runner.b3 -

runner.deduction

).toFixed(2));

updateRanking(
runner.categoryId
);

saveData();

renderRunners();

renderLiveInfo();

};

window.startCompetition = function(){

if(!activeCompetition)
return;

activeCompetition.finished = false;

const runners =

activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

if(runners.length===0)
return;

activeCompetition.runners.forEach(r=>{

r.liveActive=false;

});

runners[0].liveActive = true;

saveData();

renderLiveInfo();

renderLiveScoring();

renderRunners();

};

window.nextRunner = function(){

if(!activeCompetition)
return;

const runners =
activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

let currentRunner =
runners.find(
r=>r.liveActive===true
);

if(!currentRunner)
return;

currentRunner.confirmed = true;
currentRunner.liveActive = false;

const nextRunner =
runners.find(
r=>!r.confirmed
);

if(nextRunner){

nextRunner.liveActive = true;

}else{

activeCompetition.finished = true;

}

saveData();

renderLiveInfo();

renderLiveScoring();

renderRunners();

};

window.resetCompetition = function(){

if(!confirm(
"Wirklich Testdaten löschen?"
))return;

if(!activeCompetition)
return;

activeCompetition.finished = false;

activeCompetition.runners.forEach(
runner=>{

runner.confirmed = false;
runner.liveActive = false;

runner.place = "";

runner.total = 0;

runner.a1 = "";
runner.a2 = "";
runner.a3 = "";

runner.b1 = "";
runner.b2 = "";
runner.b3 = "";

runner.deduction = 0;
runner.deductionNumber = "";

}
);

saveData();

renderRunners();

renderLiveInfo();

renderLiveScoring();

};

function renderLiveScoring(){

const output =
document.getElementById(
"liveScoring"
);

if(!activeCompetition){

output.innerHTML =
"Kein Wettbewerb";

return;

}

if(activeCompetition.finished){

output.innerHTML =
"🏁 Wettbewerb abgeschlossen";

return;

}

const runner =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner){

output.innerHTML =
"🏁 Kein aktiver Läufer";

return;

}

output.innerHTML = `

<div class="item">

<b>${runner.name}</b>

<br>

${runner.club}

<br><br>

${runner.category}

<div class="scoreGrid">

<input id="live_a1" placeholder="A1">
<input id="live_a2" placeholder="A2">
<input id="live_a3" placeholder="A3">

</div>

<div class="scoreGrid">

<input id="live_b1" placeholder="B1">
<input id="live_b2" placeholder="B2">
<input id="live_b3" placeholder="B3">

</div>

<input
id="live_deduction"
placeholder="Abzug">

<button onclick="saveLiveScore()">

💾 Live Wertung speichern

</button>

</div>

`;

}

function renderLiveInfo(){

const output =
document.getElementById(
"liveInfo"
);

if(!activeCompetition){

output.innerHTML =
"Kein Wettbewerb";

return;

}

if(activeCompetition.finished){

output.innerHTML =

`
<div class="liveRunner">

🏁 Wettbewerb abgeschlossen

</div>
`;

return;

}

const current =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!current){

output.innerHTML =
"🏁 Kein aktiver Läufer";

return;

}

output.innerHTML = `

<div class="liveRunner">

👤 ${current.name}

<br>

🏢 ${current.club}

<br>

📂 ${current.category}

<br><br>

🏆 Platz:
${current.place || "-"}

<br>

⭐ Gesamt:
${current.total || 0}

</div>

`;

}

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

output.innerHTML = "";

if(!activeCompetition)return;

const runners =
[...activeCompetition.runners]

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const categories = {};

const categoryInfos = {};

(activeCompetition.categories || [])
.forEach(cat=>{

categoryInfos[cat.name] = cat;

});

runners.forEach(runner=>{

if(!categories[runner.category]){

categories[runner.category] = [];

}

categories[runner.category].push(
runner
);

categories[runner.category].info =
categoryInfos[runner.category];

});

Object.keys(categories).forEach(category=>{

output.innerHTML += `

<div class="categoryBlock">

<div class="categoryTitle">

📂 ${category}

<br>

🕒 ${categories[category].info?.begin || "--:--"}
 -
${categories[category].info?.end || "--:--"}

<br>

👥 ${categories[category].info?.participants || "-"}

 Teilnehmer

</div>

<div class="runnerGrid">

${categories[category].map(runner=>`

<div class="resultItem

${runner.liveActive ? "live" : ""}

${runner.confirmed ? "done" : ""}

">

<b>
${runner.start}
</b>

—

${runner.name}

<br>

${runner.club}

<br><br>

⭐ ${runner.total || 0}

|

🏆 ${runner.place || "-"}

</div>

`).join("")}

</div>

</div>

`;

});

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML = "";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.from}

<br><br>

${comp.finished ? "🏁 Abgeschlossen" : "🟢 Aktiv"}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

window.onload =
async function(){

await loadData();

};

</script>

</head>
