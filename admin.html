<script>

window.saveLiveScore = function(){

const scrollPos = window.scrollY;

const runner =
activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner)return;

const scoringSystem =
activeCompetition.scoringSystem;

if(scoringSystem==="rollart"){

runner.a1 =
validateScore(
document.getElementById(
"live_a1"
).value
);

runner.a2 =
validateScore(
document.getElementById(
"live_a2"
).value
);

runner.a3 =
validateScore(
document.getElementById(
"live_a3"
).value
);

runner.b1 =
validateScore(
document.getElementById(
"live_b1"
).value
);

runner.b2 =
validateScore(
document.getElementById(
"live_b2"
).value
);

runner.b3 =
validateScore(
document.getElementById(
"live_b3"
).value
);

runner.deduction =
deductions[
document.getElementById(
"live_deduction"
).value
] || 0;

runner.aScore =
calculateAverage([
runner.a1,
runner.a2,
runner.a3
]);

runner.bScore =
calculateAverage([
runner.b1,
runner.b2,
runner.b3
]);

runner.bScore =
Number(
(
runner.bScore -
runner.deduction
).toFixed(2)
);

runner.total =
Number(
(
runner.aScore +
runner.bScore
).toFixed(2)
);

}else{

runner.total =
validateScore(
document.getElementById(
"live_total"
).value
);

}

updateRanking(
runner.categoryId
);

saveData();

renderRunners();

renderLiveScoring();

window.scrollTo({
top: scrollPos,
behavior: "instant"
});

};

</script>
