<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color"
content="#2563eb">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1700px;
margin:auto;
padding:12px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

.runnerGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));
gap:8px;
}

input,
button,
select,
textarea{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:14px;
box-sizing:border-box;
}

input,
textarea,
select{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.nextButton{
background:#16a34a;
}

.finishButton{
background:#ea580c;
}

.resetButton{
background:#7c3aed;
}

.deleteButton{
background:#dc2626;
}

.archiveButton{
background:#0891b2;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
font-size:12px;
line-height:1.5;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{
opacity:0.7;
}

.categoryTitle{
background:#1d4ed8;
padding:10px;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
line-height:1.5;
}

.scoreGrid{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:8px;
margin-top:8px;
}

.medal{
font-size:18px;
font-weight:bold;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",

authDomain:
"rollart-score-5319a.firebaseapp.com",

projectId:
"rollart-score-5319a",

storageBucket:
"rollart-score-5319a.firebasestorage.app",

messagingSenderId:
"658963624980",

appId:
"1:658963624980:web:2e4d153f5df087c4f42301"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let competitions = [];
let archivedCompetitions = [];
let activeCompetition = null;

const deductions = {

"1":0.3,
"2":0.2,
"3":0.3,
"4":0.2,
"5":0.3,
"6":0.3,
"7":0.3,
"8":0.3,
"9":0.5,
"10":0.5

};

async function saveDatabase(){

await setDoc(
doc(db,"rollart","database"),
{
competitions,
archivedCompetitions
}
);

await updateLive();

}

async function loadDatabase(){

const snap =
await getDoc(
doc(db,"rollart","database")
);

if(snap.exists()){

competitions =
snap.data().competitions || [];

archivedCompetitions =
snap.data().archivedCompetitions || [];

}

renderCompetitions();
renderArchive();

}

async function updateLive(){

if(!activeCompetition)
return;

const currentRunner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

await setDoc(
doc(db,"rollart","live"),
{

competition:activeCompetition,

runner:currentRunner || null

}

);

}

function medal(place){

if(place==1)
return "🥇";

if(place==2)
return "🥈";

if(place==3)
return "🥉";

return "🏆";

}

function validateScore(value){

let num =
parseFloat(value);

if(isNaN(num))
return 0;

if(num<0.1)
num=0.1;

if(num>10)
num=10;

return Number(
num.toFixed(1)
);

}

function calculateAverage(values){

const sorted =
values
.filter(v=>!isNaN(v))
.sort((a,b)=>a-b);

if(sorted.length>=3){

sorted.shift();
sorted.pop();

}

if(sorted.length===0)
return 0;

return Number(

(
sorted.reduce((a,b)=>a+b,0)
/
sorted.length
).toFixed(2)

);

}

window.saveCompetition =
async function(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

from:
document.getElementById(
"competitionFrom"
).value,

to:
document.getElementById(
"competitionTo"
).value,

finished:false,

scoringSystem:
document.getElementById(
"competitionScoring"
).value,

categories:[],
runners:[]

});

await saveDatabase();

renderCompetitions();

};

window.openCompetition =
function(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();
renderLiveScoring();

};

window.archiveCompetition =
async function(id){

const comp =
competitions.find(
c=>c.id===id
);

if(!comp)return;

comp.finished = true;

archivedCompetitions.push(comp);

competitions =
competitions.filter(
c=>c.id!==id
);

await setDoc(
doc(db,"rollart","live"),
{

competition:null,
runner:null

}
);

await saveDatabase();

renderCompetitions();
renderArchive();

};

window.parseCompetitionText =
function(){

if(!activeCompetition)
return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

let currentCategory = null;

let globalStart = 1;

lines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =
line.match(
/^\d{2}:\d{2}/
);

if(categoryMatch){

const parts =
line.split(/\s+/);

currentCategory = {

id:Date.now()+Math.random(),

begin:parts[0],
end:parts[1],

name:
parts.slice(6).join(" ")

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(
/^(\d+)\s+(.+)$/
);

if(runnerMatch && currentCategory){

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:globalStart++,

name:runnerMatch[2],

club:"-",

category:
currentCategory.name,

categoryId:
currentCategory.id,

a1:0,
a2:0,
a3:0,

b1:0,
b2:0,
b3:0,

aScore:0,
bScore:0,

deduction:0,

total:0,

place:"",

confirmed:false,

liveActive:false

});

}

});

document.getElementById(
"competitionText"
).value="";

saveDatabase();

renderRunners();

};

function updateRanking(categoryId){

const ranking =

activeCompetition.runners

.filter(
r=>r.categoryId===categoryId
)

.sort(
(a,b)=>
Number(b.total)-Number(a.total)
);

ranking.forEach((r,i)=>{

r.place = i+1;

});

}

window.saveLiveScore =
function(){

const runner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner)return;

runner.a1 =
validateScore(
document.getElementById(
"live_a1"
).value
);

runner.a2 =
validateScore(
document.getElementById(
"live_a2"
).value
);

runner.a3 =
validateScore(
document.getElementById(
"live_a3"
).value
);

runner.b1 =
validateScore(
document.getElementById(
"live_b1"
).value
);

runner.b2 =
validateScore(
document.getElementById(
"live_b2"
).value
);

runner.b3 =
validateScore(
document.getElementById(
"live_b3"
).value
);

runner.deduction =
deductions[
document.getElementById(
"live_deduction"
).value
] || 0;

runner.aScore =
calculateAverage([
runner.a1,
runner.a2,
runner.a3
]);

runner.bScore =
calculateAverage([
runner.b1,
runner.b2,
runner.b3
]);

runner.bScore =
Number(
(
runner.bScore -
runner.deduction
).toFixed(2)
);

runner.total =
Number(
(
runner.aScore +
runner.bScore
).toFixed(2)
);

updateRanking(
runner.categoryId
);

saveDatabase();

renderRunners();
renderLiveScoring();

};

window.startCompetition =
function(){

if(!activeCompetition)
return;

activeCompetition.runners.forEach(r=>{

r.liveActive=false;

});

const first =
activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
)[0];

if(first){

first.liveActive=true;

}

saveDatabase();

renderRunners();
renderLiveScoring();

};

window.nextRunner =
function(){

if(!activeCompetition)
return;

const runners =

activeCompetition.runners.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

const current =
runners.find(
r=>r.liveActive===true
);

if(!current)return;

current.confirmed=true;
current.liveActive=false;

const next =
runners.find(
r=>!r.confirmed
);

if(next){

next.liveActive=true;

}else{

activeCompetition.finished=true;

}

saveDatabase();

renderRunners();
renderLiveScoring();

};

function renderLiveScoring(){

const output =
document.getElementById(
"liveScoring"
);

if(!activeCompetition){

output.innerHTML=
"Kein Wettbewerb";

return;

}

const runner =

activeCompetition.runners.find(
r=>r.liveActive===true
);

if(!runner){

output.innerHTML=
"🏁 Kein aktiver Läufer";

return;

}

output.innerHTML = `

<div class="card">

<b>${runner.name}</b>

<br><br>

⭐ Technik

<div class="scoreGrid">

<input id="live_a1"
placeholder="A1">

<input id="live_a2"
placeholder="A2">

<input id="live_a3"
placeholder="A3">

</div>

<br>

🎨 Kunst

<div class="scoreGrid">

<input id="live_b1"
placeholder="B1">

<input id="live_b2"
placeholder="B2">

<input id="live_b3"
placeholder="B3">

</div>

<input
id="live_deduction"
placeholder="Abzug">

<button onclick="saveLiveScore()">

💾 Speichern

</button>

</div>

`;

}

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

output.innerHTML="";

if(!activeCompetition)
return;

const categories = {};

activeCompetition.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

Object.keys(categories).forEach(cat=>{

output.innerHTML += `

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort((a,b)=>{

if(activeCompetition.finished){

return Number(a.place)-Number(b.place);

}

return Number(a.start)-Number(b.start);

})

.map(r=>`

<div class="resultItem

${r.liveActive?"live":""}

${r.confirmed?"done":""}

">

<div class="medal">

${medal(r.place)}

${r.place || r.start}

</div>

<br>

${r.name}

<br>

${r.club || "-"}

<br><br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

<br>

`;

});

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML="";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="resultItem">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.from}
-
${comp.to}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="archiveButton"
onclick="archiveCompetition(${comp.id})">

🏁 Archivieren

</button>

</div>

`;

});

}

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML="";

archivedCompetitions.forEach(comp=>{

const categories = {};

comp.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category]=[];

}

categories[r.category].push(r);

});

output.innerHTML += `

<div class="card">

<h3>

🏁 ${comp.name}

</h3>

${Object.keys(categories).map(cat=>`

<div class="categoryTitle">

📂 ${cat}

</div>

<div class="runnerGrid">

${categories[cat]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.map(r=>`

<div class="resultItem">

<div class="medal">

${medal(r.place)}

${r.place || "-"}

</div>

<br>

${r.name}

<br>

⭐ Technik:
${r.aScore || 0}

<br>

🎨 Kunst:
${r.bScore || 0}

<br>

🏆 Gesamt:
${r.total || 0}

</div>

`).join("")}

</div>

`).join("")}

</div>

`;

});

}

window.onload =
async function(){

await loadDatabase();

};

</script>

</head>

<body>

<div class="app">

<div class="card">

<h2>🏆 Wettbewerb</h2>

<input
type="text"
id="competitionName"
placeholder="Wettbewerb">

<input
type="text"
id="competitionPlace"
placeholder="Ort">

<input
type="date"
id="competitionFrom">

<input
type="date"
id="competitionTo">

<select id="competitionScoring">

<option value="rollart">
RollArt
</option>

</select>

<button onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div id="competitionList"
class="grid">
</div>

</div>

<div class="card">

<h2>📥 PDF Import</h2>

<textarea
id="competitionText"
rows="12"
placeholder="PDF Text hier einfügen">
</textarea>

<button onclick="parseCompetitionText()">

📥 Wettbewerb importieren

</button>

</div>

<div class="card">

<h2>🔴 Live Steuerung</h2>

<div id="liveScoring"></div>

<div class="grid">

<button
class="nextButton"
onclick="startCompetition()">

▶ Start

</button>

<button
class="nextButton"
onclick="nextRunner()">

➡ Weiter

</button>

</div>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList"></div>

</div>

<div class="card">

<h2>📂 Archiv</h2>

<div id="archiveList"></div>

</div>

</div>

</body>
</html>
