<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;
margin:auto;
padding:12px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

input,
button,
select,
textarea{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:14px;
box-sizing:border-box;
}

input,
textarea,
select{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.nextButton{
background:#16a34a;
}

.finishButton{
background:#ea580c;
}

.resetButton{
background:#7c3aed;
}

.deleteButton{
background:#dc2626;
}

.archiveButton{
background:#0891b2;
}

.resultItem{
background:#334155;
padding:8px;
border-radius:10px;
font-size:12px;
line-height:1.4;
}

.resultItem.live{
background:#16a34a;
}

.resultItem.done{
opacity:0.7;
}

.runnerGrid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));
gap:8px;
}

.categoryTitle{
background:#1e40af;
padding:10px;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
line-height:1.5;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:8px;
}

.medal{
font-size:18px;
font-weight:bold;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let competitions = [];
let archivedCompetitions = [];
let activeCompetition = null;

async function saveDatabase(){

await setDoc(
doc(db,"rollart","database"),
{
competitions,
archivedCompetitions
}
);

}

async function loadDatabase(){

const snap =
await getDoc(
doc(db,"rollart","database")
);

if(snap.exists()){

competitions =
snap.data().competitions || [];

archivedCompetitions =
snap.data().archivedCompetitions || [];

}

renderCompetitions();
renderArchive();

}

window.saveCompetition = async function(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

date:
document.getElementById(
"competitionDate"
).value,

finished:false,

categories:[],
runners:[]

});

await saveDatabase();

renderCompetitions();

};

window.openCompetition = function(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();

};

window.deleteCompetition =
async function(id){

if(!confirm(
"Wettbewerb löschen?"
)) return;

competitions =
competitions.filter(
c=>c.id!==id
);

await saveDatabase();

renderCompetitions();

};

window.archiveCompetition =
async function(id){

const comp =
competitions.find(
c=>c.id===id
);

if(!comp)return;

comp.finished = true;

archivedCompetitions.push(comp);

competitions =
competitions.filter(
c=>c.id!==id
);

await saveDatabase();

renderCompetitions();

renderArchive();

};

window.exportPDF = function(id){

const comp =
archivedCompetitions.find(
c=>c.id===id
);

if(!comp)return;

let content = "";

content += comp.name + "\n";
content += comp.place + "\n";
content += comp.date + "\n\n";

const categories = {};

comp.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category] = [];

}

categories[r.category].push(r);

});

Object.keys(categories).forEach(category=>{

content +=
"====================\n";

content +=
category + "\n";

content +=
"====================\n\n";

categories[category]

.sort(
(a,b)=>
Number(a.place)-Number(b.place)
)

.forEach(r=>{

content +=
r.place + ". ";

content +=
r.name + " ";

content +=
r.club + " ";

content +=
"Gesamt: " +
r.total +
"\n";

});

content += "\n";

});

const blob =
new Blob(
[content],
{type:"text/plain"}
);

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
comp.name + ".txt";

link.click();

};

window.parseCompetitionText = function(){

if(!activeCompetition)return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

let currentCategory = null;

lines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =
line.match(
/^\d{2}:\d{2}/
);

if(categoryMatch){

const parts =
line.split(/\s+/);

currentCategory = {

id:Date.now()+Math.random(),

name:
parts.slice(6).join(" "),

begin:parts[0],
end:parts[1]

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(
/^(\d+)\s+(.+)$/
);

if(runnerMatch && currentCategory){

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:runnerMatch[1],

name:runnerMatch[2],

club:"-",

category:
currentCategory.name,

categoryId:
currentCategory.id,

aScore:0,
bScore:0,
total:0,

place:"",
confirmed:false,
liveActive:false

});

}

});

document.getElementById(
"competitionText"
).value = "";

saveDatabase();

renderRunners();

};

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

if(!activeCompetition){

output.innerHTML =
"Kein Wettbewerb";

return;

}

const categories = {};

activeCompetition.runners.forEach(r=>{

if(!categories[r.category]){

categories[r.category] = [];

}

categories[r.category].push(r);

});

output.innerHTML = "";

Object.keys(categories).forEach(category=>{

output.innerHTML += `

<div class="categoryTitle">

📂 ${category}

</div>

<div class="runnerGrid">

${categories[category].map(r=>`

<div class="resultItem">

🏆 ${r.place || "-"}

<br><br>

${r.name}

<br>

${r.club}

<br><br>

⭐ ${r.total || 0}

</div>

`).join("")}

</div>

<br>

`;

});

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML = "";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="resultItem">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.date}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

<button
class="archiveButton"
onclick="archiveCompetition(${comp.id})">

🏁 Archivieren

</button>

<button
class="deleteButton"
onclick="deleteCompetition(${comp.id})">

🗑 Löschen

</button>

</div>

`;

});

}

function renderArchive(){

const output =
document.getElementById(
"archiveList"
);

output.innerHTML = "";

archivedCompetitions.forEach(comp=>{

output.innerHTML += `

<div class="resultItem">

<b>${comp.name}</b>

<br><br>

📍 ${comp.place}

<br>

📅 ${comp.date}

<br><br>

🏁 Archiviert

<button
class="archiveButton"
onclick="exportPDF(${comp.id})">

📄 Ergebnis Export

</button>

</div>

`;

});

}

window.onload =
async function(){

await loadDatabase();

};

</script>

</head>

<body>

<div class="app">

<div class="card">

<h2>🏆 Wettbewerb</h2>

<input
type="text"
id="competitionName"
placeholder="Wettbewerb">

<input
type="text"
id="competitionPlace"
placeholder="Ort">

<input
type="date"
id="competitionDate">

<button onclick="saveCompetition()">

💾 Wettbewerb speichern

</button>

</div>

<div class="card">

<h2>📋 Aktive Wettbewerbe</h2>

<div
id="competitionList"
class="grid">
</div>

</div>

<div class="card">

<h2>📥 PDF Import</h2>

<textarea
id="competitionText"
rows="12"
placeholder="PDF Text hier einfügen">
</textarea>

<button onclick="parseCompetitionText()">

📥 Wettbewerb importieren

</button>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div id="runnerList"></div>

</div>

<div class="card">

<h2>📂 Archiv</h2>

<div
id="archiveList"
class="grid">
</div>

</div>

</div>

</body>
</html>
