<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 RollArt Admin</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#2563eb">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.app{
max-width:1600px;
margin:auto;
padding:20px;
}

.logo{
width:120px;
height:120px;
object-fit:contain;
background:white;
padding:10px;
border-radius:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
}

.item{
background:#334155;
padding:15px;
border-radius:16px;
}

input,
textarea,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
box-sizing:border-box;
}

input,
textarea{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.liveRunner{
margin-top:20px;
padding:20px;
background:#334155;
border-radius:20px;
font-size:20px;
line-height:1.7;
}

.nextRunner{
margin-top:15px;
padding:15px;
background:#1d4ed8;
border-radius:18px;
font-size:18px;
}

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDtwZxklHFyqzEkhGbpBHKjcgLmPcD-oAU",
authDomain: "rollart-score-5319a.firebaseapp.com",
projectId: "rollart-score-5319a",
storageBucket: "rollart-score-5319a.firebasestorage.app",
messagingSenderId: "658963624980",
appId: "1:658963624980:web:2e4d153f5df087c4f42301",
measurementId: "G-7DXHCKP3QZ"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.doc = doc;
window.setDoc = setDoc;

window.saveOnline = async function(data){

await setDoc(
doc(db,"rollart","main"),
{
updated:Date.now(),
competitions:data
}
);

};

window.loadOnline = async function(){

const snap =
await getDoc(
doc(db,"rollart","main")
);

if(snap.exists()){

return snap.data().competitions || [];

}

return [];

};

</script>

</head>

<body>

<div class="app">

<img
src="./icon-512.png"
class="logo">

<div class="card">

<h2>🏆 Wettbewerb</h2>

<input
type="text"
id="competitionName"
placeholder="Wettbewerb">

<input
type="text"
id="competitionPlace"
placeholder="Ort">

<input
type="date"
id="competitionFrom">

<input
type="date"
id="competitionTo">

<button onclick="saveCompetition()">
💾 Wettbewerb speichern
</button>

</div>

<div class="card">

<h2>📋 Wettbewerbe</h2>

<div
id="competitionList"
class="grid">
</div>

</div>

<div class="card">

<h2>📥 Import</h2>

<textarea
id="competitionText"
rows="12">
</textarea>

<button onclick="parseCompetitionText()">
📥 Importieren
</button>

</div>

<div class="card">

<h2>👥 Läufer</h2>

<div
id="runnerList"
class="grid">
</div>

</div>

<div class="card">

<h2>⏱ Live</h2>

<input
type="number"
id="timeOffset"
value="0"
placeholder="Zeitkorrektur Minuten">

<div
id="liveClock"
style="
font-size:28px;
font-weight:bold;
margin-top:15px;
">
🕒 --:--
</div>

<div id="liveInfo"></div>

</div>

</div>

<script>

let competitions = [];
let activeCompetition = null;

const deductions = {

"1":0.3,
"2":0.2,
"3":0.3,
"4":0.2,
"5":0.3,
"6":0.3,
"7":0.3,
"8":0.3,
"9":0.5,
"10":0.5,
"11":0.3,
"12":0.3,
"13":0.3,
"14":0.3,
"15":0.3,
"16":0.5,
"17":0.2,
"18":0.5,
"19":0.5,
"20":0.5,
"21":0.3,
"22":0.5,
"23":0.2

};

const knownClubs = [

"TV Walsum-Aldenrade 07",
"TG Westhofen",
"RRD Wuppertal",
"Wattenscheider RSC",
"TV Datteln 09",
"RESG Walsum",
"1. RC Recklinghausen"

];

async function saveData(){

await saveOnline(competitions);

if(!activeCompetition)
return;

const liveCategory =
getCurrentCategory();

if(!liveCategory)
return;

const runners =

activeCompetition.runners

.filter(
r=>r.categoryId===liveCategory.id
)

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

/* ========================================= */
/* AKTUELLER LÄUFER */
/* ========================================= */

let liveRunner =

runners.find(
r=>!r.confirmed
);

/* ========================================= */

if(!liveRunner){

liveRunner =
runners[runners.length-1] || null;

}

/* ========================================= */

const currentIndex =

runners.findIndex(
r=>r.id===liveRunner?.id
);

/* ========================================= */
/* NÄCHSTER */
/* ========================================= */

let nextRunner =
runners[currentIndex+1] || null;

/* ========================================= */

await setDoc(

doc(db,"rollart","live"),

{
updated:Date.now(),
competition:activeCompetition,
category:liveCategory,
runner:liveRunner,
nextRunner:nextRunner
}

);

}

async function loadData(){

competitions =
await loadOnline();

renderCompetitions();

}

function saveCompetition(){

competitions.push({

id:Date.now(),

name:
document.getElementById(
"competitionName"
).value,

place:
document.getElementById(
"competitionPlace"
).value,

from:
document.getElementById(
"competitionFrom"
).value,

to:
document.getElementById(
"competitionTo"
).value,

categories:[],

runners:[]

});

saveData();

renderCompetitions();

}

function renderCompetitions(){

const output =
document.getElementById(
"competitionList"
);

output.innerHTML = "";

competitions.forEach(comp=>{

output.innerHTML += `

<div class="item">

<h3>${comp.name}</h3>

📍 ${comp.place || "-"}

<br><br>

📅 ${comp.from || "-"}
bis
${comp.to || "-"}

<button onclick="openCompetition(${comp.id})">

📂 Öffnen

</button>

</div>

`;

});

}

function openCompetition(id){

activeCompetition =
competitions.find(
c=>c.id===id
);

renderRunners();

renderLiveInfo();

}

function parseCompetitionText(){

if(!activeCompetition)return;

const text =
document.getElementById(
"competitionText"
).value;

const lines =
text.split("\n");

let currentCategory = null;

lines.forEach(line=>{

line = line.trim();

if(!line)return;

const categoryMatch =

line.match(
/(\d{2}:\d{2})\s+(\d{2}:\d{2}).*?([A-Za-zÄÖÜäöüß0-9\s.-]+)$/
);

if(categoryMatch){

currentCategory = {

id:Date.now()+Math.random(),

begin:categoryMatch[1],

end:categoryMatch[2],

name:categoryMatch[3]
.replace(
/^\d+\s+\d+\s+\d+\s+/,
""
)
.trim()

};

activeCompetition.categories.push(
currentCategory
);

return;

}

const runnerMatch =
line.match(
/^(\d+)\s+(.+)$/
);

if(runnerMatch && currentCategory){

let rest = runnerMatch[2];

let club = "-";

let name = rest;

knownClubs.forEach(c=>{

if(rest.endsWith(c)){

club = c;

name =
rest.replace(c,"").trim();

}

});

activeCompetition.runners.push({

id:Date.now()+Math.random(),

start:runnerMatch[1],

name:name,

club:club,

category:currentCategory.name,

categoryId:currentCategory.id,

a1:"",
a2:"",
a3:"",
b1:"",
b2:"",
b3:"",

deductionNumber:"",
deduction:0,
total:0,
place:"",
confirmed:false

});

}

});

saveData();

renderRunners();

}

function renderRunners(){

const output =
document.getElementById(
"runnerList"
);

output.innerHTML = "";

if(!activeCompetition)return;

activeCompetition.runners.forEach(
runner=>{

output.innerHTML += `

<div class="item">

<h3>Start ${runner.start}</h3>

👤 ${runner.name}

<br><br>

🏢 ${runner.club}

<br><br>

📂 ${runner.category}

<div class="scoreGrid">

<input
id="a1_${runner.id}"
placeholder="A"
value="${runner.a1 || ''}">

<input
id="a2_${runner.id}"
placeholder="A"
value="${runner.a2 || ''}">

<input
id="a3_${runner.id}"
placeholder="A"
value="${runner.a3 || ''}">

</div>

<div class="scoreGrid">

<input
id="b1_${runner.id}"
placeholder="B"
value="${runner.b1 || ''}">

<input
id="b2_${runner.id}"
placeholder="B"
value="${runner.b2 || ''}">

<input
id="b3_${runner.id}"
placeholder="B"
value="${runner.b3 || ''}">

</div>

<div class="scoreGrid">

<input
id="deduction_${runner.id}"
placeholder="Abzug"
value="${runner.deductionNumber || ''}">

<input
disabled
value="-${runner.deduction}">

<input
disabled
value="${runner.total}">

</div>

<button onclick="saveRunnerScore('${runner.id}')">

💾 Speichern

</button>

</div>

`;

});

}

function saveRunnerScore(id){

const runner =
activeCompetition.runners.find(
r=>r.id==id
);

runner.a1 =
parseFloat(document.getElementById(`a1_${id}`).value) || 0;

runner.a2 =
parseFloat(document.getElementById(`a2_${id}`).value) || 0;

runner.a3 =
parseFloat(document.getElementById(`a3_${id}`).value) || 0;

runner.b1 =
parseFloat(document.getElementById(`b1_${id}`).value) || 0;

runner.b2 =
parseFloat(document.getElementById(`b2_${id}`).value) || 0;

runner.b3 =
parseFloat(document.getElementById(`b3_${id}`).value) || 0;

runner.deductionNumber =
document.getElementById(`deduction_${id}`).value;

runner.deduction =
deductions[
runner.deductionNumber
] || 0;

runner.total = Number((

runner.a1 +
runner.a2 +
runner.a3 +

runner.b1 +
runner.b2 +
runner.b3 -

runner.deduction

).toFixed(2));

runner.confirmed = true;

updateRanking(
runner.categoryId
);

saveData();

renderRunners();

renderLiveInfo();

}

function updateRanking(categoryId){

const runners =

activeCompetition.runners

.filter(
r=>r.categoryId===categoryId
)

.sort(
(a,b)=>b.total-a.total
);

runners.forEach((r,index)=>{

r.place = index+1;

});

}

function getCurrentCategory(){

if(!activeCompetition)
return null;

const now =
new Date();

const offset =
parseInt(
document.getElementById(
"timeOffset"
).value
) || 0;

now.setMinutes(
now.getMinutes() + offset
);

const currentTime =
now.toTimeString()
.substring(0,5);

let active = null;

activeCompetition.categories.forEach(
cat=>{

if(
currentTime >= cat.begin &&
currentTime <= cat.end
){

active = cat;

}

});

return active;

}

function updateClock(){

const now =
new Date();

const time =
now.toLocaleTimeString(
"de-DE",
{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
}
);

document.getElementById(
"liveClock"
).innerHTML =
"🕒 " + time;

}

function renderLiveInfo(){

const output =
document.getElementById(
"liveInfo"
);

if(!activeCompetition)return;

const category =
getCurrentCategory();

if(!category){

output.innerHTML =
"Keine aktive Kategorie";

return;

}

const runners =

activeCompetition.runners

.filter(
r=>r.categoryId===category.id
)

.sort(
(a,b)=>
Number(a.start)-Number(b.start)
);

/* ========================================= */

let current =

runners.find(
r=>!r.confirmed
);

/* ========================================= */

if(!current){

current =
runners[runners.length-1] || null;

}

/* ========================================= */

const currentIndex =
runners.findIndex(
r=>r.id===current?.id
);

const nextRunner =
runners[currentIndex+1] || null;

/* ========================================= */

if(!current)return;

output.innerHTML = `

<div class="liveRunner">

🏆 AKTUELL

<br><br>

👤 ${current.name}

<br>

🏢 ${current.club}

<br>

📂 ${current.category}

<br><br>

⭐ ${current.total}

</div>

<div class="nextRunner">

➡ NÄCHSTER:

<br><br>

${nextRunner?.name || "-"}

</div>

`;

}

setInterval(()=>{

renderLiveInfo();

saveData();

},3000);

setInterval(
updateClock,
1000
);

window.onload =
async function(){

await loadData();

};

</script>

</body>
</html>
